<title>Forge — My Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Sora:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--coal:#141210;--panel:#211E1B;--panel-2:#2A2622;--line:#3A342E;--ember:#D55C13;--hot:#FFC93C;--slate:#B8B4AD;--white:#F5F1EA;--good:#7FD98A;--bad:#FF5A5A}
[data-theme="light"]{--coal:#FAFAF8;--panel:#FFFFFF;--panel-2:#F3F2EF;--line:#E0DDD8;--ember:#E5550F;--hot:#C88500;--slate:#6B6660;--white:#1A1816;--good:#1B8C2A;--bad:#D42D2D}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--coal);color:var(--slate);font-family:'Sora',sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;color:var(--white);line-height:1.1;letter-spacing:-.015em}
.mono{font-family:'JetBrains Mono',monospace}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px}
.tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ember)}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;color:var(--white);text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:28px}
.logo .spark{width:9px;height:9px;background:linear-gradient(135deg,var(--hot),var(--ember));border-radius:2px;transform:rotate(45deg);box-shadow:0 0 10px rgba(255,107,44,.7)}
.theme-toggle{background:var(--panel);border:1px solid var(--line);color:var(--slate);font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer;position:fixed;top:20px;right:20px;z-index:99}
.join-input{width:100%;padding:12px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--white);font-family:'Sora',sans-serif;font-size:15px;margin-bottom:14px;text-transform:uppercase}
.join-input:focus{outline:none;border-color:var(--ember)}
.join-input::placeholder{color:#7A756E;text-transform:none}
.join-btn{width:100%;padding:13px;border-radius:9px;background:var(--ember);color:#fff;border:none;font-family:'Sora',sans-serif;font-weight:600;font-size:15px;cursor:pointer}
.join-btn:hover{background:var(--hot)}
.join-btn:disabled{opacity:.5;cursor:wait}
.join-err{color:var(--bad);font-size:13px;margin-top:10px;display:none}
/* ── Profile tabs ── */
.prof-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;width:fit-content}
.prof-tab{font-size:13px;font-weight:600;font-family:'Sora',sans-serif;padding:8px 16px;border-radius:9px;border:none;background:none;color:var(--slate);cursor:pointer;transition:all .15s}
.prof-tab.active{background:var(--ember);color:#fff}
.prof-tab:hover:not(.active){color:var(--white)}
/* ── Profile header card ── */
.prof-header{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px 28px;margin-bottom:20px}
.prof-header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.prof-name{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;color:var(--white)}
.prof-subject{font-size:13px;color:var(--slate);margin-top:2px}
.always-updating{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ember)}
/* ── Stat row ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{text-align:center;padding:4px 0}
.stat-n{font-family:'Bricolage Grotesque',sans-serif;font-size:32px;font-weight:800;display:block;line-height:1}
.stat-l{font-size:10px;color:#8A857E;margin-top:6px;display:block;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
/* ── Two-column overview ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px}
.card-title{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
/* ── Focus items ── */
.focus-item{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:13px 14px;margin-bottom:8px}
.focus-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.focus-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:3px 10px;border-radius:5px}
.focus-acc{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
.focus-detail{font-size:13px;color:var(--slate);line-height:1.5}
.focus-tag{font-size:11px;color:var(--coal);background:var(--hot);padding:2px 8px;border-radius:5px;font-weight:600;font-family:'JetBrains Mono',monospace}
/* ── Strengths ── */
.strength-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
.strength-item:last-child{border-bottom:none}
.strength-label{color:var(--white)}
.strength-acc{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--good)}
/* ── Grade + rank ── */
.grade-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.grade-letter{font-family:'Bricolage Grotesque',sans-serif;font-size:52px;font-weight:800;line-height:1;min-width:80px;text-align:center}
.grade-info{flex:1;min-width:180px}
.grade-acc{min-width:80px;text-align:center}
.grade-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#8A857E;margin-bottom:4px}
.grade-tracking{font-size:15px;font-weight:600;color:var(--white);margin-bottom:6px}
.grade-desc{font-size:13px;color:var(--slate)}
.grade-caveat{font-size:11px;font-family:'JetBrains Mono',monospace;color:#8A857E;margin-top:6px}
.rank-display{text-align:center;padding:22px;background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:16px}
.rank-title{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800}
.rank-xp{font-family:'JetBrains Mono',monospace;font-size:13px;color:#8A857E;margin-top:4px}
.xp-bar-wrap{height:5px;background:var(--line);border-radius:3px;margin:12px 0 4px}
.xp-bar-fill{height:5px;border-radius:3px;background:linear-gradient(90deg,var(--hot),var(--ember))}
.xp-bar-label{display:flex;justify-content:space-between;font-size:11px;font-family:'JetBrains Mono',monospace;color:#8A857E}
/* ── Anvil list ── */
.mc-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line);margin-bottom:6px;font-size:13px}
.mc-detail{flex:1;color:var(--slate)}
.mc-fires{font-family:'JetBrains Mono',monospace;font-size:12px}
.empty{text-align:center;padding:28px 20px;color:var(--slate)}
.empty h3{color:var(--white);margin-bottom:8px}
.prof-footer{font-size:13px;color:var(--slate);margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
.nav-links{display:none} /* replaced by tabs */
.nav-link{}
[data-theme="light"] .focus-tag{color:#fff}
[data-theme="light"] .join-btn{color:#fff}
[data-theme="light"] .prof-tab.active{color:#fff}
@media(max-width:600px){.stat-row{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}.prof-tabs{width:100%;flex-wrap:wrap}}
[data-theme="light"] .forge-logo-dark{display:none!important}[data-theme="light"] .forge-logo-light{display:inline!important}</style>
</head>
<body>
<button class="theme-toggle" onclick="(function(){var h=document.documentElement,b=document.querySelector('.theme-toggle');if(h.getAttribute('data-theme')==='light'){h.removeAttribute('data-theme');b.textContent='\u2600 Light';localStorage.setItem('forge-theme','dark');}else{h.setAttribute('data-theme','light');b.textContent='\u263E Dark';localStorage.setItem('forge-theme','light');}})()">&#9728; Light</button>
<script>if(localStorage.getItem('forge-theme')==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').textContent='\u263E Dark';}</script>

var RANKS = [
  {name:'Apprentice',min:0,max:300,color:'var(--slate)',bg:'var(--panel-2)'},
  {name:'Journeyman',min:300,max:1500,color:'var(--hot)',bg:'rgba(255,201,60,.12)'},
  {name:'Craftsman',min:1500,max:5000,color:'var(--ember)',bg:'rgba(255,107,44,.12)'},
  {name:'Forged',min:5000,max:15000,color:'var(--good)',bg:'rgba(127,217,138,.12)'},
  {name:'Master',min:15000,max:99999,color:'var(--coal)',bg:'linear-gradient(100deg,var(--hot),var(--ember))'}
];

function getRank(xp){
  for(var i=RANKS.length-1;i>=0;i--){if(xp>=RANKS[i].min)return RANKS[i];}
  return RANKS[0];
}

function calcGrade(acc, activeMCs, totalMCs) {
  // acc: overall accuracy 0-100
  // activeMCs: number of unresolved misconceptions
  // totalMCs: total unique misconceptions ever fired
  var mcClearance = totalMCs > 0 ? Math.max(0, 1 - (activeMCs / totalMCs)) : 1;
  var score = (acc * 0.6) + (mcClearance * 100 * 0.4);
  if (score >= 85) return {grade:'A*', next:null,    color:'#ffd700', desc:'Exam-ready. Maintain accuracy and keep the Anvil clear.'};
  if (score >= 72) return {grade:'A',  next:'A*',   color:'var(--good)', desc:'Strong. Clear your remaining misconceptions to break into A*.'};
  if (score >= 60) return {grade:'B',  next:'A',    color:'var(--hot)', desc:'Consistent. Accuracy and Anvil work will push this to an A.'};
  if (score >= 50) return {grade:'C',  next:'B',    color:'var(--ember)', desc:'Building. Focus on the Anvil — misconceptions are costing marks.'};
  if (score >= 40) return {grade:'D',  next:'C',    color:'#b45309', desc:'Keep going. Daily sessions and re-forge work will move this.'};
  if (score >= 30) return {grade:'E',  next:'D',    color:'var(--slate)', desc:'Early stage. More questions and misconception rework needed.'};
  return             {grade:'U',  next:'E',    color:'var(--bad)', desc:'Not enough data yet — complete more sessions to get a reliable band.'};
}

function calcXP(responses){
  var xp=0;
  responses.forEach(function(r){
    if(r.question_id&&r.question_id.endsWith('-CRU')&&r.is_correct) xp+=30;
    else if(r.reforge_attempted&&r.reforge_correct) xp+=20;
    else if(r.is_correct&&!r.reforge_attempted) xp+=10;
    if(r.question_id&&r.question_id.endsWith('-ANVIL')&&r.is_correct) xp+=30; // treat anvil correct as 30
  });
  return xp;
}

  var acc=total>0?Math.round((correct/total)*100):0;
  var accCol=acc>=75?'var(--good)':acc>=50?'var(--hot)':'var(--bad)';
  var xp=calcXP(responses);
  var rank=getRank(xp);
  var nextRank=RANKS[RANKS.indexOf(rank)+1];
  var streak=calcStreak(responses);
  var resolved=responses.filter(function(r){return r.reforge_attempted&&r.reforge_correct;}).length;

  // Misconception data — must process chronologically (oldest first) so streak accumulates correctly
  var mcData={};
  var chronological = responses.slice().sort(function(a,b){
    return (a.created_at||'') < (b.created_at||'') ? -1 : 1;
  });
  chronological.forEach(function(r){
    if(!r.misconception_tag)return;
    var tag=r.misconception_tag;
    if(!mcData[tag])mcData[tag]={fires:0,reforgeCorrect:0,streak:0};
    if(r.reforge_attempted){
      if(r.reforge_correct){mcData[tag].reforgeCorrect++;mcData[tag].streak++;}
      else mcData[tag].streak=0;
    } else if(!r.is_correct){
      mcData[tag].fires++;mcData[tag].streak=0;
    }
  });
  var activeMCs=Object.keys(mcData).filter(function(t){return mcData[t].fires>0&&mcData[t].streak<3;});
  activeMCs.sort(function(a,b){return mcData[b].fires-mcData[a].fires;});
  var totalMCs=Object.keys(mcData).filter(function(t){return mcData[t].fires>0;}).length;
  var grade=calcGrade(acc,activeMCs.length,totalMCs);

        var sd = subjectData[subj];
        var sacc = sd.total>0 ? Math.round((sd.correct/sd.total)*100) : 0;
        var scol = sacc>=75?'var(--good)':sacc>=50?'var(--hot)':'var(--bad)';
        var topMC = Object.keys(sd.mcs).sort(function(a,b){return sd.mcs[b]-sd.mcs[a];})[0]||null;
        var topMCLabel = topMC?(MC_LABELS[topMC]||topMC):null;
        var bankCount = Object.keys(sd.banks).length;
        h += '<tr style="border-bottom:1px solid var(--line)">';
        h += '<td style="padding:10px 8px;color:var(--white);font-weight:600">'+(SUBJ_LABELS[subj]||subj)+'</td>';
        h += '<td style="padding:10px 8px;text-align:right;font-family:\'JetBrains Mono\',monospace;font-size:12px;color:var(--slate)">'+sd.total+'<span style="color:#8A857E;font-size:10px"> / '+bankCount+' bank'+(bankCount!==1?'s':'')+'</span></td>';
        h += '<td style="padding:10px 8px;text-align:right;font-family:\'JetBrains Mono\',monospace;font-size:13px;font-weight:600;color:'+scol+'">'+sacc+'%</td>';
        h += '<td style="padding:10px 8px;min-width:90px"><div style="height:5px;background:var(--line);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+sacc+'%;background:'+scol+';border-radius:3px"></div></div></td>';
        h += '<td style="padding:10px 8px;font-size:12px">';
        if (topMCLabel) {
          h += '<span style="font-family:\'JetBrains Mono\',monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(255,90,90,.1);border:1px solid rgba(255,90,90,.2);color:var(--bad);margin-right:5px">'+topMC+'</span>';
          h += '<span style="color:#8A857E">'+topMCLabel.slice(0,38)+(topMCLabel.length>38?'…':'')+'</span>';
        } else {
          h += '<span style="color:var(--good);font-size:11px">✓ None yet</span>';
        }
        h += '</td></tr>';
      });
      h += '</tbody></table></div>';
    }

  } else if(activeTab==='forgemode'){
    // ── FORGE MODE TAB ──
    h+='<div class="card">';
    h+='<div class="card-title" style="color:var(--ember)">Forge mode — daily accuracy</div>';
    // Recent session breakdown
    var recentMain=responses.filter(function(r){return !r.reforge_attempted;}).slice(-30);
    if(recentMain.length===0){
      h+='<div class="empty"><h3>No sessions yet</h3><p>Complete your first quiz session to see Forge mode data.</p></div>';
    } else {
      var recentCorrect=recentMain.filter(function(r){return r.is_correct;}).length;
      var recentAcc=Math.round((recentCorrect/recentMain.length)*100);
      var recentCol=recentAcc>=75?'var(--good)':recentAcc>=50?'var(--hot)':'var(--bad)';
      h+='<div style="display:flex;gap:24px;margin-bottom:20px;flex-wrap:wrap">';
      h+='<div class="stat"><span class="stat-n" style="color:'+recentCol+'">'+recentAcc+'%</span><span class="stat-l">Last 30 questions</span></div>';
      h+='<div class="stat"><span class="stat-n" style="color:var(--ember)">'+streak+'</span><span class="stat-l">Day streak 🔥</span></div>';
      h+='<div class="stat"><span class="stat-n" style="color:var(--white)">'+xp.toLocaleString()+'</span><span class="stat-l">Total XP</span></div>';
      h+='</div>';
      // Grade prediction
      h+='<div class="grade-card" style="margin-bottom:0">';
      h+='<div class="grade-letter" style="color:'+grade.color+'">'+grade.grade+'</div>';
      h+='<div class="grade-info">';
      h+='<div class="grade-eyebrow">Predicted A Level grade</div>';
      if(grade.next){
        h+='<div class="grade-tracking">Tracking for <b style="color:'+grade.color+'">'+grade.grade+'</b> &rarr; stretch target: <b style="color:var(--white)">'+grade.next+'</b></div>';
      } else {
        h+='<div class="grade-tracking" style="color:'+grade.color+'">Top band ✦</div>';
      }
      h+='<div class="grade-desc">'+grade.desc+'</div>';
      if(total<20){h+='<div class="grade-caveat">Based on '+total+' questions — grows more accurate as your bank builds</div>';}
      h+='</div></div>';
    }
    h+='</div>';
    // Rank
    var xpToNext=nextRank?nextRank.min-xp:0;
    var pct=nextRank?Math.round(((xp-rank.min)/(nextRank.min-rank.min))*100):100;
    h+='<div class="rank-display">';
    h+='<p class="tag" style="margin-bottom:8px">'+st.studentName+' — Forge Rank</p>';
    h+='<div class="rank-title" style="color:'+rank.color+'">'+rank.name+'</div>';
    h+='<div class="rank-xp">'+xp.toLocaleString()+' XP</div>';
    h+='<div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:'+pct+'%"></div></div>';
    if(nextRank){h+='<div class="xp-bar-label"><span>'+rank.name+'</span><span>'+xpToNext.toLocaleString()+' XP to '+nextRank.name+'</span></div>';}
    else{h+='<div style="font-size:12px;color:var(--hot);margin-top:4px">Maximum rank achieved ✦</div>';}
    h+='</div>';

  } else if(activeTab==='anvil'){
    // ── ANVIL TAB ──
    h+='<div class="card">';
    h+='<div class="card-title"><span style="color:var(--bad)">Your Anvil — misconceptions to rework</span></div>';
    if(activeMCs.length===0){
      h+='<div class="empty"><h3>Anvil is clear ✓</h3><p>No active misconceptions right now. Keep going to maintain this.</p></div>';
    } else {
      activeMCs.forEach(function(tag){
        var d=mcData[tag];
        var label=MC_LABELS[tag]||tag;
        h+='<div class="mc-item">';
        h+='<span class="focus-tag">'+tag+'</span>';
        h+='<span class="mc-detail">'+label+'</span>';
        h+='<span class="mc-fires" style="color:var(--bad)">'+d.fires+'×</span>';
        h+='</div>';
      });
      h+='<a href="anvil.html" style="display:inline-block;margin-top:14px;font-size:13px;color:var(--ember);font-family:JetBrains Mono,monospace;text-decoration:none;font-weight:600">Rework these in the Anvil →</a>';
      h+='<div style="margin-top:10px;font-size:12px;color:#8A857E;font-family:JetBrains Mono,monospace">After clearing misconceptions in the Anvil, <a href="profile.html" style="color:#8A857E">refresh this page</a> to update your list.</div>';
    }
    h+='</div>';
    // Resolved
    var resolvedTags=Object.keys(mcData).filter(function(t){return mcData[t].fires>0&&mcData[t].streak>=3;});
    if(resolvedTags.length>0){
      h+='<div class="card">';
      h+='<div class="card-title" style="color:var(--good)">✓ Cleared from Anvil</div>';
      resolvedTags.forEach(function(tag){
        var label=MC_LABELS[tag]||tag;
        h+='<div class="strength-item"><span class="strength-label">'+label+'</span><span class="strength-acc">cleared</span></div>';
      });
      h+='</div>';
    }

  } else if(activeTab==='crucible'){
    // ── CRUCIBLE TAB ──
    var crucibleResponses=responses.filter(function(r){return r.question_id&&r.question_id.endsWith('-CRU');});
    h+='<div class="card">';
    h+='<div class="card-title" style="color:var(--bad)">The Crucible — exam pressure sessions</div>';
    if(crucibleResponses.length===0){
      h+='<div class="empty"><h3>No Crucible sessions yet</h3><p>Complete a Crucible session to see your timed performance here.</p></div>';
    } else {
      var cCorrect=crucibleResponses.filter(function(r){return r.is_correct;}).length;
      var cAcc=Math.round((cCorrect/crucibleResponses.length)*100);
      var cCol=cAcc>=75?'var(--good)':cAcc>=50?'var(--hot)':'var(--bad)';
      h+='<div class="stat-row" style="max-width:400px;margin-bottom:20px">';
      h+='<div class="stat"><span class="stat-n" style="color:'+cCol+'">'+cAcc+'%</span><span class="stat-l">Crucible accuracy</span></div>';
      h+='<div class="stat"><span class="stat-n" style="color:var(--white)">'+crucibleResponses.length+'</span><span class="stat-l">Questions done</span></div>';
      h+='</div>';
      h+='<p style="font-size:13px;color:var(--slate)">The Crucible fires real exam conditions — no hints, no scaffolds. Your accuracy here is the closest prediction of exam day performance.</p>';
      h+='<a href="crucible.html" style="display:inline-block;margin-top:14px;font-size:13px;color:var(--bad);font-family:JetBrains Mono,monospace;text-decoration:none;font-weight:600">Enter the Crucible →</a>';
    }
    h+='</div>';
  }

  app.innerHTML=h;
  // Wire tab buttons via event delegation (avoids inline onclick quote issues)
  app.querySelectorAll('.prof-tab').forEach(function(btn){
    btn.addEventListener('click',function(){
      st.activeTab=this.getAttribute('data-tab');
      renderProfile();
    });
  });
}

function calcStreak(responses){
  if(!responses.length) return 0;
  var dates=new Set(responses.map(function(r){return r.created_at?r.created_at.substring(0,10):''}));
  var today=new Date().toISOString().substring(0,10);
  var streak=0;
  var d=new Date();
  while(true){
    var key=d.toISOString().substring(0,10);
    if(dates.has(key)){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}

function forgeSignOut(){
  try { localStorage.removeItem('forge-student'); } catch(e) {}
  try { localStorage.removeItem('forge-free-session'); } catch(e) {}
  ForgeAuth.signOut();
  location.reload();
}

// ===== SHARED SESSION RESTORE =====
(function(){
  if (ForgeAuth.hasSession()) {
    ForgeAuth.getSession().then(function(result) {
      if (result && result.subscriber) {
        var sub    = result.subscriber;
        var access = result.access;
        st.studentName = sub.name;
        st.isPaid      = access === 'pro';
        st.isTrial     = access === 'trial';
        st.trialDaysLeft = result.daysLeft || 0;
        st.paidSubjects  = sub.subjects || [];
        // Check paid student cache first
        try {
          var paidCache = JSON.parse(localStorage.getItem('forge-paid-student') || 'null');
          if (paidCache && paidCache.studentId) st.studentId = paidCache.studentId;
        } catch(e) {}
        // Check for linked student record
        var saved = null;
        try { saved = JSON.parse(localStorage.getItem('forge-student') || 'null'); } catch(e) {}
        if (saved && saved.studentId && !st.studentId) {
          st.studentId = saved.studentId;
          st.classId   = saved.classId || null;
        }

        function loadProfileWithId() {
          var token = ForgeAuth.accessToken();
          var authUser = ForgeAuth.currentUser();
          if (token && authUser) {
            // Load responses from ALL student rows for this auth user
            fetch(SUPABASE_URL + '/rest/v1/students?select=id&auth_user_id=eq.' + authUser.id, {
              headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token }
            }).then(function(r) { return r.json(); }).then(function(studentRows) {
              if (!Array.isArray(studentRows) || studentRows.length === 0) {
                renderProfile(); return;
              }
              var ids = studentRows.map(function(r) { return r.id; });
              var filter = ids.length === 1
                ? 'student_id=eq.' + ids[0]
                : 'student_id=in.(' + ids.join(',') + ')';
              supaGet('responses', filter + '&order=created_at.desc').then(function(r) {
                st.responses = r || [];
                renderProfile();
              }).catch(function() { renderProfile(); });
            }).catch(function() { renderProfile(); });
          } else if (st.studentId) {
            supaGet('responses','student_id=eq.'+st.studentId+'&order=created_at.desc').then(function(r){
              st.responses = r || [];
              renderProfile();
            }).catch(function(){ renderProfile(); });
          } else {
            renderProfile();
          }
        }

        // If still no studentId, look up by auth_user_id
        if (!st.studentId && ForgeAuth.currentUser()) {
          (function() {
            var _token = ForgeAuth.accessToken();
            var _uid = ForgeAuth.currentUser() ? ForgeAuth.currentUser().id : null;
            if (!_token || !_uid) return Promise.resolve([]);
            return fetch(SUPABASE_URL + '/rest/v1/students?select=*&auth_user_id=eq.' + _uid + '&order=created_at.asc&limit=1', {
              headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + _token }
            }).then(function(r) { return r.json(); });
          })().then(function(rows) {
            if (rows && rows.length > 0) {
              st.studentId = rows[0].id;
              try { localStorage.setItem('forge-paid-student', JSON.stringify({ studentId: rows[0].id, name: sub.name })); } catch(e) {}
            }
            loadProfileWithId();
          }).catch(function() { loadProfileWithId(); });
        } else {
          loadProfileWithId();
        }
      } else {
        checkLocalSessionProfile();
      }
    }).catch(function() { checkLocalSessionProfile(); });
  } else {
    checkLocalSessionProfile();
  }

  function checkLocalSessionProfile() {
    // Check free session
    var freeSession = null;
    try { freeSession = JSON.parse(localStorage.getItem('forge-free-session') || 'null'); } catch(e) {}
    if (freeSession && freeSession.studentId) {
      st.studentId   = freeSession.studentId;
      st.studentName = freeSession.name;
      st.classId     = null;
      supaGet('responses','student_id=eq.'+freeSession.studentId+'&order=created_at.desc').then(function(r){
        st.responses = r || [];
        renderProfile();
      }).catch(function(){ renderProfile(); });
      return;
    }
    // Check class session
    var saved = null;
    try { saved = JSON.parse(localStorage.getItem('forge-student') || 'null'); } catch(e) {}
    if (saved && saved.studentId) {
      st.studentId   = saved.studentId;
      st.classId     = saved.classId;
      st.studentName = saved.studentName;
      supaGet('responses','student_id=eq.'+st.studentId+'&order=created_at.desc').then(function(r){
        st.responses = r || [];
        renderProfile();
      }).catch(function(){ renderLogin(); });
    } else {
      renderLogin();
    }
  }
})();
</script>
