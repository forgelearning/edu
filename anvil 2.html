      stem:"A student identifies the following in a poem about war: 'blood', 'wounds', 'battlefield', 'carnage', 'fallen'. They write: 'The poet uses imagery of death and violence.' Which response would earn more marks?",
      options:{
        A:"The student is correct — identifying the imagery is sufficient for AO1.",
        B:"The student should identify this as a semantic field — a cluster of lexis from the same conceptual domain. Naming it as 'semantic field of death/violence' is more precise and earns AO2 marks by showing the deliberate lexical patterning rather than treating each word in isolation.",
        C:"The student should call it a metaphor, since the words create a vivid picture.",
        D:"The student should use the term 'motif' as these words recur throughout the poem."
      },
      correct:"B",tag:"MC-ENG-01",
      scaffold:"Semantic field (also called lexical field): a group of words related in meaning that belong to the same conceptual domain. Identifying a semantic field is analytically stronger than saying 'imagery' because it shows the pattern of deliberate lexical choice across the text. 'Imagery' usually refers to figurative language (metaphor, simile, personification) creating a mental picture — it requires a comparison or non-literal meaning. A list of war words is a semantic field, not imagery unless they function figuratively. AO2 rewards precision: 'semantic field of violence creates a cumulative effect of inevitability' > 'imagery of death makes it vivid'. Examiner reports consistently note that top responses name the pattern, not just the individual word.",
      reforge:{stem:"A student says: 'The writer uses the imagery of money — gold, coin, debt, worth, price — to suggest the character's greed.' What should the student say instead?",options:{A:"The writer uses a metaphor of money to suggest greed.",B:"The writer creates a semantic field of finance and commerce — gold, coin, debt, worth, price — to reveal the character's preoccupation with monetary value, suggesting greed shapes their entire worldview.",C:"The imagery is a motif that appears throughout the text.",D:"The writer uses personification of money to suggest greed."},correct:"B"}
    },
    {
      id:"ENG-02",
      stem:"In a third-person novel, the narrator writes: 'She would go to the party, she supposed. What was the point, really? Nobody ever talked to her anyway.' The student writes: 'The narrator tells us the character feels lonely.' Which term and analysis is most precise?",
      options:{
        A:"This is stream of consciousness — the narrator records the character's unfiltered thoughts.",
        B:"This is free indirect discourse — the narrator's voice merges with the character's consciousness without speech marks or reporting verbs, allowing the reader to inhabit the character's perspective while the narrator maintains subtle distance. The rhetorical question ('What was the point, really?') and the colloquial 'supposed' are hallmarks of the technique.",
        C:"This is an interior monologue — the character speaks directly to the reader.",
        D:"This is dramatic monologue — the character reveals themselves through speech."
      },
      correct:"B",tag:"MC-ENG-02",
      scaffold:"Free indirect discourse (FID): a technique where the narrator's third-person voice merges with a character's thoughts and speech patterns without using reporting verbs ('she thought') or speech marks. Hallmarks: rhetorical questions, colloquialisms, exclamations, hedging language — stylistic features that belong to the character, not a detached narrator. Effect: creates intimacy and sympathy while maintaining the narrator's ironic distance. Contrast with: (1) stream of consciousness — unstructured, associative, minimal punctuation (Woolf, Joyce); (2) interior monologue — first-person thought, explicit ('I thought...'); (3) dramatic monologue — poetic form, one speaker addressed to a silent listener (Browning). AO2 mark: naming FID + identifying the character's voice within the narrator's syntax + analysing the effect of the merger earns top band.",
      reforge:{stem:"'He was perfectly happy, of course he was. Why would he feel guilty? He'd done nothing wrong.' What technique is this and what is its effect?",options:{A:"Stream of consciousness — the thoughts are unstructured and associative.",B:"Free indirect discourse — the narrator adopts the character's defensive voice and rhetorical questioning, creating dramatic irony as the reader senses guilt the character denies, and maintaining distance through the third person even as it inhabits his perspective.",C:"Interior monologue — the character speaks directly without a narrator.",D:"Soliloquy — the character thinks aloud for the audience's benefit."},correct:"B"}
    },
    {
      id:"ENG-03",
      stem:"A student annotates: 'And the thunder, and the lightning, and the rain all fell at once' as 'repetition for emphasis.' What is the more precise term and what does using it add to the analysis?",
      options:{
        A:"Anaphora — the repetition of 'and' at the start of each clause. Naming it as polysyndeton is wrong because polysyndeton refers to something else.",
        B:"Polysyndeton — the deliberate use of multiple coordinating conjunctions ('and...and...and') in close succession. It is more precise than 'repetition' because it identifies the specific syntactic pattern and its effect: slowing the pace to create a sense of accumulation, weight, or relentlessness — here, the storm elements pile up as if unstoppable.",
        C:"Asyndeton — the deliberate omission of conjunctions to speed up the rhythm.",
        D:"Syndeton — the standard grammatical use of conjunctions, no different from normal prose."
      },
      correct:"B",tag:"MC-ENG-03",
      scaffold:"Polysyndeton: deliberate multiplication of coordinating conjunctions (and, or, but) beyond grammatical necessity — 'and this and that and the other'. Effect: accumulation, weight, breathlessness, relentlessness, the sense of things piling up or being catalogued. Biblical register. Contrast with asyndeton: deliberate omission of conjunctions — 'I came, I saw, I conquered'. Effect: speed, urgency, staccato impact, compression. Both are syntactic/structural choices, not lexical ones — the effect comes from sentence architecture, not word meaning. Common error: calling polysyndeton 'repetition' — technically accurate but analytically imprecise. AO2 marks come from naming the pattern, describing the syntactic effect, and connecting it to meaning: 'polysyndeton slows the rhythm so each element of the storm accumulates, overwhelming the reader as it overwhelms the landscape.'",
      reforge:{stem:"'She ran and stumbled and fell and got up and ran again.' What is the technique and its effect?",options:{A:"Asyndeton — the omission of conjunctions creates a breathless pace.",B:"Polysyndeton — the repeated 'and' connects each action without pause, creating a relentless, exhausting rhythm that mirrors the character's desperate physical and psychological state: she cannot stop even to punctuate her own escape.",C:"Anaphora — 'and' is repeated at the start of each clause.",D:"Repetition — 'and' is used multiple times for emphasis."},correct:"B"}
    },
    {
      id:"ENG-04",
      stem:"A student studying AQA English Language & Literature writes: 'The writer uses deixis to point to things.' Which response shows a more sophisticated understanding?",
      options:{
        A:"The student is correct — deixis means pointing and that is the full definition.",
        B:"Deixis refers to words and phrases whose meaning depends entirely on context — particularly on who is speaking, where, and when. Personal deixis (I/you/we), spatial deixis (here/there/this/that), and temporal deixis (now/then/yesterday) all anchor the reader in a specific position relative to the text. The effect is often to position the reader as insider or outsider — 'we' includes or excludes, 'here' implies presence or distance.",
        C:"Deixis is the same as anaphora — it refers back to earlier parts of the text.",
        D:"Deixis is a feature of spoken language only — it cannot appear in written texts."
      },
      correct:"B",tag:"MC-ENG-04",
      scaffold:"Deixis (from Greek: 'pointing'): words whose reference shifts depending on context of utterance — they point to the speech situation rather than carrying fixed meaning. Three types: (1) Personal — I, you, we, they (who is included/excluded?); (2) Spatial — here, there, this, that (where is the reader positioned?); (3) Temporal — now, then, yesterday, soon (what is the temporal viewpoint?). AQA 7707 Lang/Lit specifically requires linguistic frameworks applied to literary texts — deixis is one of the highest-value terms students rarely use. Effect analysis: 'The repeated use of we positions the reader as part of a community the writer is constructing, creating solidarity' or 'the demonstrative this brings the reader into immediate proximity with the described scene, creating intimacy.' Distinguish from anaphora (referring back to a previously mentioned item within the text — cohesive device, not deictic).",
      reforge:{stem:"A wartime speech opens: 'We shall fight on the beaches, we shall fight on the landing grounds, we shall fight in the fields.' A student notes 'the use of we.' What deictic analysis would earn AO2 marks?",options:{A:"The personal deixis 'we' is used for emphasis.",B:"The personal deixis 'we' includes both speaker and audience in a unified collective, constructing national solidarity and shared obligation — Churchill positions himself not as commander but as fellow combatant, erasing hierarchy at the moment of greatest crisis. Combined with anaphora and polysyndeton, the deictic 'we' becomes the grammatical embodiment of collective resistance.",C:"'We' is used to avoid saying 'I', which would seem arrogant.",D:"'We' is an example of the royal plural — Churchill refers only to himself."},correct:"B"}
    },
    {
      id:"ENG-05",
      stem:"A student writes: 'The poem ends with bathos — after describing the hero's great deeds, it ends with him eating toast.' Is the student using the term correctly?",
      options:{
        A:"Yes — any anticlimactic ending is bathos.",
        B:"Partially — bathos requires the descent to be deliberately comic or deflating, not merely anticlimactic. If the mundane ending undermines the heroic tone for ironic or comic effect, it is bathos. But if the mundane ending is simply realistic or melancholic — a hero returning to ordinary life after trauma — it may be deliberately bathetic in register but not in the classical rhetorical sense. The student needs to show the tonal descent is intentional and that it produces irony or comedy, not just surprise.",
        C:"No — bathos only applies when the writer makes a deliberate error and falls from high style accidentally.",
        D:"No — bathos refers to a sustained low or humble style throughout, not a sudden descent."
      },
      correct:"B",tag:"MC-ENG-05",
      scaffold:"Bathos (from Greek: 'depth'): an abrupt, jarring descent from the elevated or serious to the trivial or mundane, producing a comic, deflating, or ironic effect. Originally described by Alexander Pope as an unintentional failure of sublimity; now used for deliberate comic deflation too. Key test: is the descent producing irony, comedy, or puncturing of pretension? If yes → bathos. If the mundane ending is simply realistic without comic intent → anticlimax or tonal contrast, not necessarily bathos. Examples: Austen's ironic social commentary often uses bathos to deflate pomposity; Eliot's Prufrock ('I have measured out my life with coffee spoons') uses bathos to contrast heroic aspiration with mundane reality. AO2 mark: name the device + describe the tonal descent + analyse why the writer chooses deflation at this moment (irony? subversion of genre expectations? comic relief?).",
      reforge:{stem:"'She had survived the war, crossed three borders, rebuilt her life from nothing — and now she couldn't find her keys.' Is this bathos, anticlimax, or something else?",options:{A:"Bathos — it descends from the serious to the trivial.",B:"This is potentially bathos if the lost keys produce ironic comedy or puncture heroic register, or anticlimax if the intent is to show ordinary life reasserting itself after trauma. The distinction depends on tone: comedy and deflation = bathos; melancholy domesticity = tonal anticlimax. Without the surrounding text, the term cannot be applied with confidence — AO2 requires contextual evidence of intent.",C:"Anticlimax — the story ends disappointingly.",D:"Juxtaposition — the serious and trivial are placed together."},correct:"B"}
    },
    {
      id:"ENG-06",
      stem:"A student writes: 'The play uses dramatic irony when the character makes a mistake.' Is this correct?",
      options:{
        A:"Yes — dramatic irony is when a character makes an error the audience can see.",
        B:"No — dramatic irony requires the audience to possess knowledge that a character on stage lacks, creating tension or comedy from the gap between what the character believes and what the audience knows. The character's mistake is a consequence that may result from dramatic irony, but the mistake itself is not the irony. The irony is the knowledge gap, not the error.",
        C:"Partially — dramatic irony applies only to tragedy, not comedy.",
        D:"No — dramatic irony is when two characters misunderstand each other on stage."
      },
      correct:"B",tag:"MC-ENG-06",
      scaffold:"Dramatic irony: the audience knows something a character does not, creating a gap between the character's understanding and the audience's knowledge. Three effects: (1) Tension — we know the danger the character walks into; (2) Pathos — we watch helplessly as the character makes a fateful choice; (3) Comedy — we laugh at the character's misplaced confidence. Distinguish from: situational irony (the outcome is the opposite of what was expected, for characters AND audience); verbal irony (saying the opposite of what you mean — irony of statement); cosmic irony (fate working against a character's desires). Common exam error: using 'dramatic irony' as a synonym for 'irony' or 'something ironic happens'. AO2 mark: identify who knows what, when — then analyse what effect the knowledge gap creates at that specific moment in the text.",
      reforge:{stem:"In Macbeth, Duncan praises Macbeth's castle as 'pleasant' and a 'seat' worthy of his gratitude — moments before entering to be murdered there. What is the precise effect of the dramatic irony here?",options:{A:"The audience finds it funny that Duncan is so trusting.",B:"The dramatic irony creates devastating pathos — the audience, knowing the murder plan, hears Duncan's praise of the very site of his death as an unbearable marker of his innocence. Shakespeare compounds the irony through the imagery of hospitality and sanctuary ('seat', 'pleasant') — the language of welcome and trust frames the site of ultimate betrayal, deepening the horror of Macbeth's violation of the host-guest bond.",C:"Duncan's words are an example of dramatic irony because he makes a mistake.",D:"This is situational irony — the situation turns out opposite to what was expected."},correct:"B"}
    },
    {
      id:"ENG-07",
      stem:"A student defines register as 'formal or informal language.' How would an examiner improve this definition?",
      options:{
        A:"The student is correct — register simply means the level of formality in a text.",
        B:"Register is broader than formality: it encompasses the variety of language appropriate to a specific social situation, purpose, and relationship between participants. It includes: field (subject matter vocabulary), tenor (the relationship between writer and reader — formal, intimate, authoritative), and mode (spoken, written, digital). A legal document and a medical report are both formal but belong to different registers. Register choices reveal power dynamics, social positioning, and the writer's construction of their relationship with the audience.",
        C:"Register means accent and dialect — the geographical variety of language used.",
        D:"Register refers only to the vocabulary level — simple or complex words."
      },
      correct:"B",tag:"MC-ENG-07",
      scaffold:"Register: the variety of language appropriate to a particular social situation. Comprises three dimensions: (1) Field — the subject matter and specialist vocabulary it generates (legal register, medical register, sports commentary register); (2) Tenor — the relationship between participants and the degree of formality, intimacy, or authority it encodes (a letter to a friend vs to a judge — same writer, different tenor); (3) Mode — the channel of communication and its conventions (written, spoken, digital; planned vs spontaneous). Why it matters for AO2: register shifts within a text signal a change in purpose, relationship, or power. A politician shifting from formal to colloquial register is constructing accessibility; a character shifting from intimate to formal language is creating distance. AO2 mark: identify the register → describe its features (field, tenor, mode) → analyse what the register choice constructs about the relationship or power dynamic.",
      reforge:{stem:"A politician's speech opens with 'My fellow citizens' then shifts to 'Look, the thing is, we've all been there, haven't we?' What does the register shift achieve?",options:{A:"The shift from formal to informal register shows the politician is poorly educated.",B:"The shift from elevated civic register ('fellow citizens' — formal, distancing, constructing authority) to colloquial register ('look', 'the thing is', tag question 'haven't we?') performs a deliberate construction of democratic solidarity and accessibility. The tenor shifts from authority to peer — the politician positions themselves as one of the people, using the grammar of spoken conversation to simulate authenticity and intimacy.",C:"The politician uses informal language because they are nervous.",D:"The register is inconsistent — a sign of poor stylistic control."},correct:"B"}
    },

      id:"ENG-08",
      stem:"A student annotates every instance of 'darkness' in a Gothic novel and writes: 'The word darkness is repeated for emphasis.' What would a more analytical student write?",
      options:{
        A:"The student should call it 'repetition of a motif' which is more precise.",
        B:"The student should identify whether the repetition is: anaphora (repeated at the start of clauses), epistrophe (repeated at the end), or semantic field membership (lexical repetition building a conceptual cluster). They should then analyse the cumulative effect rather than simply noting the repetition — 'the recurring darkness lexis creates a semantic field of moral and physical obscurity, positioning the Gothic setting as a space where social norms are suspended and danger is ambient rather than located.'",
        C:"The student should say 'the motif of darkness symbolises evil — a common Gothic convention.'",

      correct:"B",tag:"MC-ENG-08",
      scaffold:"'Repetition for emphasis' is the weakest acceptable AO2 observation — it earns the bottom of the mark band because it names a technique but makes no analytical claim about how it creates meaning. Stronger analysis asks: (1) What type of repetition? Anaphora (same start), epistrophe (same end), anadiplosis (end of one clause = start of next), or lexical repetition across a text? (2) What is the cumulative effect of the pattern — not just 'emphasis' but what specific meaning does the repetition build? (3) How does the repetition interact with the rest of the text's form, structure, and context? AO2 mark scheme guidance: 'identifies technique' = lower band; 'analyses how technique shapes meaning with embedded textual evidence and exploration of effect' = higher band. Examiners consistently note that 'repetition for emphasis' without further analysis is the single most common reason students fall below Band 3.",
      reforge:{stem:"A poem ends each stanza with a variation of 'and still she waited.' A student writes: 'The repetition emphasises how long she waited.' What would improve this?",options:{A:"The student should say it is a refrain — a repeated line in poetry.",B:"The student should identify the structural repetition as functioning like an epistrophic refrain — its recurrence at each stanza's close creates a drumbeat of anticipation and stasis. The word 'still' carries dual weight: temporal ('continuing to wait') and physical ('motionless') — the repetition accumulates these meanings across the poem until waiting becomes the character's entire identity, her existence reduced to this single suspended action.",C:"The student should note that repetition is a common poetic technique.",D:"The student is correct that the repetition shows the long duration of waiting."},correct:"B"}

      reforge:{stem:"How does volenti differ from contributory negligence?",options:{A:"They are the same defence with different names.",B:"Volenti is a complete defence extinguishing liability entirely; contributory negligence is partial and reduces damages by the claimant's percentage of fault.",C:"Contributory negligence is a complete defence; volenti only reduces damages.",D:"Volenti applies only in criminal law."},correct:"B"}

      reforge:{stem:"A child trespasses onto a farm and is injured by unfenced machinery. Which Act is most relevant?",options:{A:"Occupiers' Liability Act 1957 — all entrants are covered.",B:"Occupiers' Liability Act 1984 — this Act governs the duty owed to trespassers.",C:"The law of contract, since the farmer impliedly invited the child.",D:"Neither Act — trespassers have no legal protection."},correct:"B"}

// Build a lookup: misconception tag -> array of questions that test it
var MC_QUESTIONS = {};
for(var bk in BANKS){
  BANKS[bk].questions.forEach(function(q){
    if(q.type || !q.options || !q.reforge) return; // skip non-MCQ
    var tag = q.tag;
    if(typeof tag === 'string'){
      if(!MC_QUESTIONS[tag]) MC_QUESTIONS[tag] = [];
      MC_QUESTIONS[tag].push(q);
    } else if(Array.isArray(tag)){
      tag.forEach(function(t){
        if(!MC_QUESTIONS[t]) MC_QUESTIONS[t] = [];
        MC_QUESTIONS[t].push(q);
      });
    }
  });
}

var CLEAR_THRESHOLD = 3; // consecutive correct to resolve
var app = document.getElementById('app');
var anvilState = { studentId:null, classId:null, studentName:null, classSubject:null, responses:[], misconceptions:{} };

function renderLogin(){
  var h='<div style="max-width:340px;margin:40px auto 0;text-align:center">';
  h+='<p class="tag" style="margin-bottom:6px">THE ANVIL</p>';
  h+='<h1 style="font-size:28px;margin-bottom:8px">Rework your weaknesses</h1>';
  h+='<p style="color:#8A857E;font-size:14px;margin-bottom:28px">Misconceptions that survived the re-forge land here. They don\u2019t leave until you prove you\u2019ve beaten them.</p>';
  h+='</div><div style="max-width:340px;margin:0 auto">';
  h+='<label style="font-size:13px;color:var(--slate);display:block;margin-bottom:4px">Your first name</label>';
  h+='<input id="a-name" class="join-input" type="text" placeholder="e.g. Alex" style="text-transform:none">';
  h+='<label style="font-size:13px;color:var(--slate);display:block;margin-bottom:4px">Class code</label>';
  h+='<input id="a-code" class="join-input" type="text" placeholder="e.g. ECON-Y12">';
  h+='<button class="join-btn" id="a-btn">Open my Anvil \u2192</button>';
  h+='<p class="join-err" id="a-err"></p>';
  h+='</div>';
  app.innerHTML=h;

  document.getElementById('a-btn').onclick=function(){
    var name=document.getElementById('a-name').value.trim();
    var code=document.getElementById('a-code').value.trim().toUpperCase();
    var err=document.getElementById('a-err');
    var btn=document.getElementById('a-btn');
    if(!name||!code){err.textContent='Enter your name and class code.';err.style.display='block';return;}
    btn.disabled=true;btn.textContent='Loading...';

    supaGet('classes','code=eq.'+encodeURIComponent(code)).then(function(classes){
      if(!Array.isArray(classes)||classes.length===0){
        err.textContent='Class not found.';err.style.display='block';
        btn.disabled=false;btn.textContent='Open my Anvil \u2192';return;
      }
      var cls=classes[0];
      // Find this student
      supaGet('students','class_id=eq.'+cls.id+'&name=eq.'+encodeURIComponent(name)).then(function(students){
        if(!Array.isArray(students)||students.length===0){
          err.textContent='Student not found. Make sure you\u2019ve done the quiz first.';err.style.display='block';
          btn.disabled=false;btn.textContent='Open my Anvil \u2192';return;
        }
        anvilState.studentId=students[0].id;
        anvilState.classId=cls.id;
        anvilState.studentName=name;
        anvilState.classSubject=cls.subject||null;
        try { localStorage.setItem('forge-student', JSON.stringify({studentId: anvilState.studentId, classId: anvilState.classId, studentName: anvilState.studentName, classSubject: anvilState.classSubject})); } catch(e) {}
        // Load their responses
        supaGet('responses','student_id=eq.'+anvilState.studentId+'&order=created_at.asc').then(function(responses){
          anvilState.responses=responses||[];
          buildMisconceptions();
          renderAnvilHome();
        });
      });
    });
  };
}

function buildMisconceptions(){
  var mc={};
  anvilState.responses.forEach(function(r){
    if(!r.misconception_tag) return;
    var tag=r.misconception_tag;
    if(!mc[tag]) mc[tag]={tag:tag,fires:0,reforgeAttempts:0,reforgeCorrect:0,streak:0,history:[]};

    if(r.reforge_attempted){
      mc[tag].reforgeAttempts++;
      if(r.reforge_correct){
        mc[tag].reforgeCorrect++;
        mc[tag].streak++;
        mc[tag].history.push(true);
      } else {
        mc[tag].streak=0;
        mc[tag].history.push(false);
      }
    } else if(!r.is_correct){
      mc[tag].fires++;
      mc[tag].streak=0;
      mc[tag].history.push(false);
    }
  });
  anvilState.misconceptions=mc;
}

function getActiveMCs(){
  var active=[];
  for(var tag in anvilState.misconceptions){
    var m=anvilState.misconceptions[tag];
    if(m.fires>0 && m.streak<CLEAR_THRESHOLD){
      active.push(m);
    }
  }
  active.sort(function(a,b){return b.fires-a.fires;});
  return active;
}

function getResolvedMCs(){
  var resolved=[];
  for(var tag in anvilState.misconceptions){
    var m=anvilState.misconceptions[tag];
    if(m.fires>0 && m.streak>=CLEAR_THRESHOLD){
      resolved.push(m);
    }
  }
  return resolved;
}

  var active=getActiveMCs();
  var resolved=getResolvedMCs();
  var total=active.length+resolved.length;

  var h='<button class="back-btn" onclick="'+(anvilState.classId ? 'renderLogin()' : 'window.location.href=\'forge-quiz.html\'')+'">\u2190 '+(anvilState.classId ? 'Log out' : 'Back to quiz')+'</button>';
  h+='<div class="center" style="margin-bottom:24px">';
  h+='<p class="tag" style="margin-bottom:4px">THE ANVIL</p>';
  h+='<h1 style="font-size:24px;margin-bottom:4px">'+anvilState.studentName+'</h1>';
  h+='<p style="color:#8A857E;font-size:14px">'+CLEAR_THRESHOLD+' correct in a row to clear a misconception</p>';
  h+='</div>';

  // Stats
  h+='<div class="stat-row">';
  h+='<div class="stat"><span class="stat-n" style="color:var(--bad)">'+active.length+'</span><span class="stat-l">Active</span></div>';
  h+='<div class="stat"><span class="stat-n" style="color:var(--good)">'+resolved.length+'</span><span class="stat-l">Resolved</span></div>';
  h+='<div class="stat"><span class="stat-n" style="color:var(--white)">'+total+'</span><span class="stat-l">Total tracked</span></div>';
  h+='</div>';

  if(active.length===0 && resolved.length===0){
    h+='<div class="empty"><h3>No misconceptions yet</h3><p>Do some quizzes first \u2014 any wrong answers will appear here for reworking.</p>';
    h+='<a href="forge-quiz.html" style="display:inline-block;margin-top:16px;padding:10px 20px;border-radius:8px;background:var(--ember);color:#fff;text-decoration:none;font-weight:600;font-size:14px">Go to the quiz \u2192</a>';
    h+='</div>';
    app.innerHTML=h + sessionBar();return;
  }

  if(active.length===0){
    h+='<div class="cleared-banner"><h2>\u2713 Anvil clear</h2><p style="color:var(--slate)">Every misconception has been resolved. Keep doing quizzes \u2014 new ones will land here if they fire.</p></div>';
  }

  // Active misconceptions
  if(active.length>0){
    h+='<p style="font-size:12px;color:var(--bad);font-family:JetBrains Mono,monospace;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">\u26a0 Active \u2014 tap to rework</p>';
    active.forEach(function(m){
      var label=MC_LABELS[m.tag]||m.tag;
      var hasQs=MC_QUESTIONS[m.tag]&&MC_QUESTIONS[m.tag].length>0;
      h+='<div class="anvil-card active-mc" '+(hasQs?'onclick="startRework(\''+m.tag+'\')"':'')+' style="'+(hasQs?'':'opacity:.5;cursor:default')+'">';
      h+='<div class="anvil-top"><span class="anvil-tag">'+m.tag+'</span><span class="mono" style="font-size:12px;color:var(--bad)">'+m.fires+' fires</span></div>';
      h+='<div class="anvil-label">'+label+'</div>';
      h+='<div class="anvil-meta"><span>Reforged '+m.reforgeCorrect+'/'+m.reforgeAttempts+'</span><span>Streak: '+m.streak+'/'+CLEAR_THRESHOLD+'</span></div>';
      // Streak dots
      h+='<div class="anvil-streak">';
      var recent=m.history.slice(-6);
      recent.forEach(function(ok){
        h+='<span class="streak-dot" style="background:'+(ok?'var(--good)':'var(--bad)')+'"></span>';
      });
      if(recent.length===0) h+='<span style="font-size:11px;color:#8A857E">No attempts yet</span>';
      h+='</div>';
      h+='</div>';
    });
  }

  // Resolved
  if(resolved.length>0){
    h+='<p style="font-size:12px;color:var(--good);font-family:JetBrains Mono,monospace;text-transform:uppercase;letter-spacing:.06em;margin:24px 0 10px">\u2713 Resolved</p>';
    resolved.forEach(function(m){
      var label=MC_LABELS[m.tag]||m.tag;
      h+='<div class="anvil-card resolved-mc">';
      h+='<div class="anvil-top"><span class="anvil-tag" style="background:var(--good)">'+m.tag+'</span><span class="mono" style="font-size:12px;color:var(--good)">\u2713 Cleared</span></div>';
      h+='<div class="anvil-label" style="text-decoration:line-through;color:var(--slate)">'+label+'</div>';
      h+='</div>';
    });
  }

  app.innerHTML=h;
}

window.startRework=function(tag){
  var questions=MC_QUESTIONS[tag];
  if(!questions||questions.length===0) return;
  // Shuffle so questions don't repeat in order
  var shuffled=questions.slice().sort(function(){return Math.random()-0.5;});
  renderReworkQuestion(tag,shuffled,0);
};

function renderReworkQuestion(tag,questions,qIdx){
  // Even indices: serve original question. Odd indices: serve reforge variant.
  // This doubles the effective pool and prevents identical question repeats.
  var baseQ = questions[Math.floor(qIdx/2) % questions.length];
  var useReforge = (qIdx % 2 === 1) && baseQ.reforge;
  var q = useReforge
    ? { id: baseQ.id+'-RF', stem: baseQ.reforge.stem, options: baseQ.reforge.options, correct: baseQ.reforge.correct, scaffold: baseQ.scaffold, tag: baseQ.tag }
    : baseQ;
  var label=MC_LABELS[tag]||tag;
  var m=anvilState.misconceptions[tag];
  var keys=Object.keys(q.options);

  var h='<button class="back-btn" onclick="renderAnvilHome()">\u2190 Back to Anvil</button>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">';
  h+='<div><span class="anvil-tag">'+tag+'</span><span style="color:var(--white);font-size:14px;font-weight:600;margin-left:10px">'+label+'</span></div>';
  h+='<span class="mono" style="font-size:12px;color:var(--slate)">Streak: '+m.streak+'/'+CLEAR_THRESHOLD+'</span>';
  h+='</div>';

  h+='<div class="stem">'+q.stem+'</div>';
  h+='<div class="options" id="rw-opts">';
  keys.forEach(function(k){
    h+='<button class="opt" data-k="'+k+'"><span class="letter">'+k+'</span><span>'+q.options[k]+'</span></button>';
  });
  h+='</div>';
  h+='<div id="rw-feedback"></div>';
  h+='<div class="clear"></div>';

  app.innerHTML=h;

  var opts=document.querySelectorAll('#rw-opts .opt');
  var answered=false;

  opts.forEach(function(o){
    o.onclick=function(){
      if(answered)return;
      answered=true;
      var k=o.dataset.k;
      var isCorrect=k===q.correct;

      // Log to Supabase
      supaInsert('responses',{
        student_id:anvilState.studentId,
        class_id:anvilState.classId,
        question_id:q.id+'-ANVIL',
        bank:tag,
        subject:'anvil',
        selected_option:k,
        is_correct:isCorrect,
        misconception_tag:tag,
        reforge_attempted:true,
        reforge_correct:isCorrect
      });

      // Update local state
      if(isCorrect){
        m.streak++;
        m.reforgeCorrect++;
        m.reforgeAttempts++;
        m.history.push(true);
      } else {
        m.streak=0;
        m.reforgeAttempts++;
        m.history.push(false);
      }

      opts.forEach(function(x){
        x.classList.add('answered');
        if(x.dataset.k===q.correct) x.classList.add('correct');
        else if(x===o&&!isCorrect) x.classList.add('wrong');
        else x.classList.add('dimmed');
      });

      var fb=document.getElementById('rw-feedback');
      var fh='';

      if(isCorrect && m.streak>=CLEAR_THRESHOLD){
        fh='<div class="cleared-banner" style="margin-top:20px"><h2>\u2713 Misconception cleared!</h2><p style="color:var(--slate)">'+tag+' \u2014 '+label+'<br>'+CLEAR_THRESHOLD+' correct in a row. This one is off your Anvil.</p></div>';
        fh+='<button class="next-btn" id="rw-next">Back to Anvil \u2192</button><div class="clear"></div>';
        fb.innerHTML=fh;
        document.getElementById('rw-next').onclick=function(){ renderAnvilHome(); };
      } else if(isCorrect){
        fh='<div class="praise-box">\u2713 Correct. Streak: '+m.streak+'/'+CLEAR_THRESHOLD+'</div>';
        fh+='<button class="next-btn" id="rw-next">Next question \u2192</button><div class="clear"></div>';
        fb.innerHTML=fh;
        document.getElementById('rw-next').onclick=function(){
          renderReworkQuestion(tag,questions,qIdx+1);
        };
      } else {
        fh='<div class="scaffold-box"><span class="stag">'+tag+'</span><p>'+q.scaffold+'</p></div>';
        fh+='<div style="margin-top:12px;font-size:14px;color:var(--bad);font-weight:600">Streak reset to 0/'+CLEAR_THRESHOLD+'</div>';
        fh+='<button class="next-btn" id="rw-next">Try again \u2192</button><div class="clear"></div>';
        fb.innerHTML=fh;
        document.getElementById('rw-next').onclick=function(){
          renderReworkQuestion(tag,questions,qIdx+1);
        };
      }
    };
  });
}

function forgeLogout(){
  try { localStorage.removeItem('forge-student'); } catch(e) {}
  try { localStorage.removeItem('forge-free-session'); } catch(e) {}
  ForgeAuth.signOut();
  location.reload();
}
function sessionBar(){
  if (!anvilState.studentId || !anvilState.studentName) return '';
  return '<div style="text-align:center;margin-top:26px;padding-top:14px;border-top:1px solid var(--line)"><span style="font-size:12px;color:#8A857E">Signed in as <b style="color:var(--slate)">' + anvilState.studentName + '</b> \u00b7 <a href="#" onclick="forgeLogout();return false" style="color:var(--ember);text-decoration:none">Not you? Switch student</a></span></div>';
}

// ===== SHARED SESSION RESTORE =====
function startAnvil(){
  if (ForgeAuth.hasSession()) {
    ForgeAuth.getSession().then(function(result) {
      if (result && result.subscriber) {
        var sub = result.subscriber;
        anvilState.studentName = sub.name;
        anvilState.studentId   = null;
        anvilState.classId     = null;
        anvilState.classSubject = null;
        // Check paid student cache first
        try {
          var paidCache = JSON.parse(localStorage.getItem('forge-paid-student') || 'null');
          if (paidCache && paidCache.studentId) anvilState.studentId = paidCache.studentId;
        } catch(e) {}
        // Then check for linked class student record
        var saved = null;
        try { saved = JSON.parse(localStorage.getItem('forge-student') || 'null'); } catch(e) {}
        if (saved && saved.studentId && !anvilState.studentId) {
          anvilState.studentId  = saved.studentId;
          anvilState.classId    = saved.classId || null;
        }

        function loadAnvilWithId() {
          var token = ForgeAuth.accessToken();
          var authUser = ForgeAuth.currentUser();
          if (token && authUser) {
            fetch(SUPABASE_URL + '/rest/v1/students?select=id&auth_user_id=eq.' + authUser.id, {
              headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token }
            }).then(function(r) { return r.json(); }).then(function(studentRows) {
              if (!Array.isArray(studentRows) || studentRows.length === 0) {
                buildMisconceptions(); renderAnvilHome(); return;
              }
              var ids = studentRows.map(function(r) { return r.id; });
              var filter = ids.length === 1
                ? 'student_id=eq.' + ids[0]
                : 'student_id=in.(' + ids.join(',') + ')';
              supaGet('responses', filter + '&order=created_at.asc').then(function(responses) {
                anvilState.responses = responses || [];
                buildMisconceptions();
                renderAnvilHome();
              }).catch(function() { buildMisconceptions(); renderAnvilHome(); });
            }).catch(function() { buildMisconceptions(); renderAnvilHome(); });
          } else if (anvilState.studentId) {
            supaGet('responses','student_id=eq.'+anvilState.studentId+'&order=created_at.asc').then(function(responses){
              anvilState.responses = responses || [];
              buildMisconceptions();
              renderAnvilHome();
            }).catch(function(){ buildMisconceptions(); renderAnvilHome(); });
          } else {
            buildMisconceptions();
            renderAnvilHome();
          }
        }

        // If still no studentId, look up by auth_user_id
        if (!anvilState.studentId && ForgeAuth.currentUser()) {
          (function() {
            var _token = ForgeAuth.accessToken();
            var _uid = ForgeAuth.currentUser() ? ForgeAuth.currentUser().id : null;
            if (!_token || !_uid) return Promise.resolve([]);
            return fetch(SUPABASE_URL + '/rest/v1/students?select=*&auth_user_id=eq.' + _uid + '&order=created_at.asc&limit=1', {
              headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + _token }
            }).then(function(r) { return r.json(); });
          })().then(function(rows) {
            if (rows && rows.length > 0) {
              anvilState.studentId = rows[0].id;
              try { localStorage.setItem('forge-paid-student', JSON.stringify({ studentId: rows[0].id, name: sub.name })); } catch(e) {}
            }
            loadAnvilWithId();
          }).catch(function() { loadAnvilWithId(); });
        } else {
          loadAnvilWithId();
        }
      } else {
        checkLocalSession();
      }
    }).catch(function() { checkLocalSession(); });
  } else {
    checkLocalSession();
  }
}

function checkLocalSession(){
  // Check free session
  var freeSession = null;
  try { freeSession = JSON.parse(localStorage.getItem('forge-free-session') || 'null'); } catch(e) {}
  if (freeSession && freeSession.studentId) {
    anvilState.studentId   = freeSession.studentId;
    anvilState.studentName = freeSession.name;
    anvilState.classId     = null;
    supaGet('responses','student_id=eq.'+anvilState.studentId+'&order=created_at.asc').then(function(responses){
      anvilState.responses = responses || [];
      buildMisconceptions();
      renderAnvilHome();
    }).catch(function(){ buildMisconceptions(); renderAnvilHome(); });
    return;
  }
  // Check class session
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem('forge-student') || 'null'); } catch(e) {}
  if (saved && saved.studentId) {
    anvilState.studentId   = saved.studentId;
    anvilState.classId     = saved.classId;
    anvilState.studentName = saved.studentName;
    anvilState.classSubject = saved.classSubject || null;
    supaGet('responses','student_id=eq.'+anvilState.studentId+'&order=created_at.asc').then(function(responses){
      anvilState.responses = responses || [];
      buildMisconceptions();
      renderAnvilHome();
    }).catch(function(){ renderLogin(); });
  } else {
    renderLogin();
  }
}
startAnvil();
</script>
