  el.innerHTML = out + '<button onclick="renderStarters(dashState.wrongResponses||[])" style="margin-top:12px;font-size:13px;color:var(--slate);background:none;border:1px solid var(--line);padding:6px 14px;border-radius:8px;cursor:pointer">&larr; Back to all starters</button>';
};

function renderClassOverview(responses, students) {
  var el = document.getElementById('panel-class');
  if (students.length === 0) {
    el.innerHTML = '<div class="empty"><h3>No students yet</h3><p>Students join using the class code on the quiz page.</p></div>';
    return;
  }

  // Per-student stats
  var perStudent = {};
  students.forEach(function(s) {
    perStudent[s.id] = { name: s.name, total: 0, correct: 0, misconceptions: {}, topMC: null, topMCcount: 0, weakBank: null, weakBankAcc: 101 };
  });

  responses.forEach(function(r) {
    var ps = perStudent[r.student_id];
    if (!ps) return;
    ps.total++;
    if (r.is_correct) ps.correct++;
    if (!r.is_correct && r.misconception_tag) {
      ps.misconceptions[r.misconception_tag] = (ps.misconceptions[r.misconception_tag] || 0) + 1;
    }
  });

  // Calculate per-student bank accuracy
  var bankByStudent = {};
  responses.forEach(function(r) {
    var key = r.student_id + '|' + r.bank;
    if (!bankByStudent[key]) bankByStudent[key] = { total: 0, correct: 0, bank: r.bank, student_id: r.student_id };
    bankByStudent[key].total++;
    if (r.is_correct) bankByStudent[key].correct++;
  });

  // Find weakest bank and top MC per student
  Object.keys(perStudent).forEach(function(sid) {
    var ps = perStudent[sid];
    // Top MC
    var maxMC = 0;
    for (var mc in ps.misconceptions) {
      if (ps.misconceptions[mc] > maxMC) { maxMC = ps.misconceptions[mc]; ps.topMC = mc; ps.topMCcount = maxMC; }
    }
    // Weakest bank (min accuracy, at least 2 answers)
    for (var key in bankByStudent) {
      var bs = bankByStudent[key];
      if (bs.student_id === sid && bs.total >= 2) {
        var bAcc = Math.round((bs.correct / bs.total) * 100);
        if (bAcc < ps.weakBankAcc) { ps.weakBankAcc = bAcc; ps.weakBank = bs.bank; }
      }
    }
  });

  // Sort by accuracy ascending (struggling students first)
  var sorted = Object.keys(perStudent).sort(function(a, b) {
    var accA = perStudent[a].total > 0 ? perStudent[a].correct / perStudent[a].total : 1;
    var accB = perStudent[b].total > 0 ? perStudent[b].correct / perStudent[b].total : 1;
    return accA - accB;
  });

  var h = '<div class="card"><div class="card-title">Students \u2014 sorted by accuracy (lowest first) <span style="float:right;font-family:Sora,sans-serif;font-size:11px;color:#8A857E;font-weight:400;text-transform:none;letter-spacing:0">Click a student to see their full profile</span></div>';
  h += '<table class="class-table"><thead><tr>';
  h += '<th>Student</th><th>Answered</th><th>Accuracy</th><th>Weakest topic</th><th>Top misconception</th><th>Access</th>';
  h += '</tr></thead><tbody>';

  sorted.forEach(function(sid) {
    var ps = perStudent[sid];
    var acc = ps.total > 0 ? Math.round((ps.correct / ps.total) * 100) : 0;
    var accColor = acc >= 75 ? 'var(--good)' : acc >= 50 ? 'var(--hot)' : 'var(--bad)';
    var student = dashState.students.find(function(s) { return s.id === sid; }) || {};
    var extraTime = student.extra_time || 0;
    var displayName = student.display_name || ps.name;

    h += '<tr>';
    h += '<td onclick="renderStudent(\'' + sid + '\')" style="cursor:pointer">';
    h += '<span class="student-name-display" data-sid="' + sid + '">' + displayName + '</span>';
    if (extraTime > 0) h += '<span class="extra-time-badge">+' + extraTime + '%</span>';
    h += '</td>';
    h += '<td onclick="renderStudent(\'' + sid + '\')" style="cursor:pointer">' + ps.total + '</td>';
    h += '<td class="acc" style="color:' + accColor + ';cursor:pointer" onclick="renderStudent(\'' + sid + '\')">' + acc + '%</td>';
    h += '<td class="mono" style="font-size:12px;cursor:pointer" onclick="renderStudent(\'' + sid + '\')">' + (ps.weakBank || '\u2014') + '</td>';
    h += '<td class="mono" style="font-size:12px;cursor:pointer" onclick="renderStudent(\'' + sid + '\')">' + (ps.topMC ? ps.topMC + ' \u00d7' + ps.topMCcount : '\u2014') + '</td>';
    h += '<td style="white-space:nowrap">';
    h += '<select class="extra-time-select" data-sid="' + sid + '" style="padding:4px 6px;border-radius:7px;border:1px solid var(--line);background:var(--panel);color:var(--slate);font-family:Sora,sans-serif;font-size:12px;cursor:pointer">';
    h += '<option value="0"' + (extraTime === 0 ? ' selected' : '') + '>Standard</option>';
    h += '<option value="25"' + (extraTime === 25 ? ' selected' : '') + '>+25%</option>';
    h += '<option value="50"' + (extraTime === 50 ? ' selected' : '') + '>+50%</option>';
    h += '</select>';
    h += '</td>';
    h += '</tr>';
  });

  h += '</tbody></table></div>';

  // Rename section below table
  h += '<div class="card" style="margin-top:14px"><div class="card-title">Rename a student</div>';
  h += '<p style="font-size:13px;color:#8A857E;margin-bottom:12px">If a student has used an inappropriate name, select them and enter a replacement. The original name is preserved in the database.</p>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
  h += '<select id="rename-select" style="padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--white);font-family:Sora,sans-serif;font-size:13px;flex:1;min-width:140px">';
  h += '<option value="">Select student…</option>';
  sorted.forEach(function(sid) {
    var student = dashState.students.find(function(s) { return s.id === sid; }) || {};
    var displayName = student.display_name || perStudent[sid].name;
    h += '<option value="' + sid + '">' + displayName + '</option>';
  });
  h += '</select>';
  h += '<input type="text" id="rename-input" class="rename-input" placeholder="New display name">';
  h += '<button id="rename-btn" class="join-btn" style="padding:7px 16px;margin:0;width:auto">Save</button>';
  h += '<p class="join-err" id="rename-err"></p>';
  h += '</div></div>';

  el.innerHTML = h;

  // Wire extra time selects
  el.querySelectorAll('.extra-time-select').forEach(function(sel) {
    sel.onchange = function() {
      var sid = sel.getAttribute('data-sid');
      var val = parseInt(sel.value, 10);
      var prevVal = sel.getAttribute('data-prev') || '0';
      sel.setAttribute('data-prev', sel.value);
      sel.disabled = true;
      supaPatch('students', sid, { extra_time: val }).then(function(result) {
        var student = dashState.students.find(function(s) { return s.id === sid; });
        if (student) student.extra_time = val;
        sel.disabled = false;
        // Update badge inline
        var nameCell = el.querySelector('.student-name-display[data-sid="' + sid + '"]');
        if (nameCell) {
          var badge = nameCell.nextElementSibling;
          if (badge && badge.classList.contains('extra-time-badge')) badge.remove();
          if (val > 0) {
            var newBadge = document.createElement('span');
            newBadge.className = 'extra-time-badge';
            newBadge.textContent = '+' + val + '%';
            nameCell.parentNode.insertBefore(newBadge, nameCell.nextSibling);
          }
        }
      }).catch(function(e) {
        sel.disabled = false;
        sel.value = prevVal;
        alert('Could not save extra time. Make sure the RLS policy allows teacher updates — run: CREATE POLICY "Teachers can update student records" ON students FOR UPDATE TO anon USING (true) WITH CHECK (true);');
      });
    };
    // Store initial value
    sel.setAttribute('data-prev', sel.value);
  });

  // Wire rename
  var renameBtn = document.getElementById('rename-btn');
  if (renameBtn) {
    renameBtn.onclick = function() {
      var sid = document.getElementById('rename-select').value;
      var newName = document.getElementById('rename-input').value.trim();
      var err = document.getElementById('rename-err');
      err.style.display = 'none';
      if (!sid) { err.textContent = 'Select a student.'; err.style.display = 'block'; return; }
      if (!newName) { err.textContent = 'Enter a name.'; err.style.display = 'block'; return; }
      renameBtn.disabled = true; renameBtn.textContent = 'Saving…';
      supaPatch('students', sid, { display_name: newName }).then(function() {
        var student = dashState.students.find(function(s) { return s.id === sid; });
        if (student) student.display_name = newName;
        renameBtn.disabled = false; renameBtn.textContent = 'Save';
        document.getElementById('rename-input').value = '';
        document.getElementById('rename-select').value = '';
        renderClassOverview(dashState.responses, dashState.students);
      }).catch(function() { renameBtn.disabled = false; renameBtn.textContent = 'Save'; alert('Could not save.'); });
    };
  }
}

window.renderStudent = function(studentId) {
  // Hide tabs panels, show student detail
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  var el = document.getElementById('panel-student');
  el.style.display = 'block';

  var studentObj = dashState.students.find(function(s) { return s.id === studentId; }) || {};
  var studentName = studentObj.display_name || studentObj.name || '';
  var extraTime = studentObj.extra_time || 0;

  var allStudentResponses = dashState.responses.filter(function(r) { return r.student_id === studentId; });
  var studentResponses = dashState.classSubject
    ? allStudentResponses.filter(function(r) {
        var cs = dashState.classSubject;
        var rs = r.subject;
        var engMatch = (cs === 'englit' || cs === 'engll') && (rs === 'englit' || rs === 'engll');
        var isReforge = r.reforge_attempted || rs === 'anvil' || rs === 'crucible';
        return rs === cs || engMatch || isReforge || rs === null || rs === 'unknown' || !rs;
      })
    : allStudentResponses;
  var total = studentResponses.length;
  var correct = studentResponses.filter(function(r) { return r.is_correct; }).length;
  var acc = total > 0 ? Math.round((correct / total) * 100) : 0;

  // Misconception breakdown
  var mcData = {};
  studentResponses.forEach(function(r) {
    if (!r.is_correct && r.misconception_tag && !r.reforge_attempted) {
      if (!mcData[r.misconception_tag]) mcData[r.misconception_tag] = { fires: 0, reforgeAttempts: 0, reforgeCorrect: 0 };
      mcData[r.misconception_tag].fires++;
    }
    if (r.reforge_attempted && r.misconception_tag) {
      if (!mcData[r.misconception_tag]) mcData[r.misconception_tag] = { fires: 0, reforgeAttempts: 0, reforgeCorrect: 0 };
      mcData[r.misconception_tag].reforgeAttempts++;
      if (r.reforge_correct) mcData[r.misconception_tag].reforgeCorrect++;
    }
  });

  var reforgeTotal = studentResponses.filter(function(r) { return r.reforge_attempted; }).length;
  var reforgePass = studentResponses.filter(function(r) { return r.reforge_attempted && r.reforge_correct; }).length;
  var activeMCs = Object.keys(mcData).filter(function(mc) { return mcData[mc].reforgeCorrect < mcData[mc].fires; });
  var resolvedMCs = Object.keys(mcData).filter(function(mc) { return mcData[mc].fires > 0 && mcData[mc].reforgeCorrect >= mcData[mc].fires; });

  var h = '<button class="back-btn" onclick="document.getElementById(\'panel-student\').style.display=\'none\';document.getElementById(\'panel-class\').classList.add(\'active\');document.querySelectorAll(\'.tab\')[1].classList.add(\'active\')">\u2190 Back to class</button>';

  h += '<div class="dash-header" style="margin-bottom:16px"><div><p class="tag" style="margin-bottom:4px">Student Profile</p><h1>' + studentName + (extraTime > 0 ? ' <span class="extra-time-badge" style="font-size:14px;padding:3px 10px">+' + extraTime + '% time</span>' : '') + '</h1></div></div>';

  h += '<div class="stat-row">';
  h += '<div class="stat"><span class="stat-n" style="color:' + (acc >= 70 ? 'var(--good)' : acc >= 50 ? 'var(--hot)' : 'var(--bad)') + '">' + acc + '%</span><span class="stat-l">Accuracy</span></div>';
  h += '<div class="stat"><span class="stat-n" style="color:var(--white)">' + total + '</span><span class="stat-l">Questions</span></div>';
  h += '<div class="stat"><span class="stat-n" style="color:var(--hot)">' + activeMCs.length + '</span><span class="stat-l">Active misconceptions</span></div>';
  h += '<div class="stat"><span class="stat-n" style="color:var(--good)">' + reforgePass + '/' + reforgeTotal + '</span><span class="stat-l">Reforges passed</span></div>';
  h += '</div>';

  // Active misconceptions (Anvil)
  if (activeMCs.length > 0) {
    h += '<div class="card" style="border-color:rgba(255,90,90,.3)"><div class="card-title" style="color:var(--bad)">Anvil \u2014 still active</div>';
    activeMCs.sort(function(a, b) { return mcData[b].fires - mcData[a].fires; });
    activeMCs.forEach(function(mc) {
      var d = mcData[mc];
      var label = MC_LABELS[mc] || mc;
      h += '<div class="mc-item">';
      h += '<span class="heat-tag">' + mc + '</span>';
      h += '<span class="mc-detail">' + label + '</span>';
      h += '<span class="mc-fires" style="color:var(--bad)">Fired ' + d.fires + '\u00d7 \u00b7 Reforged ' + d.reforgeCorrect + '/' + d.reforgeAttempts + '</span>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Resolved
  if (resolvedMCs.length > 0) {
    h += '<div class="card" style="border-color:rgba(127,217,138,.3)"><div class="card-title" style="color:var(--good)">Resolved \u2014 reforged successfully</div>';
    resolvedMCs.forEach(function(mc) {
      var d = mcData[mc];
      var label = MC_LABELS[mc] || mc;
      h += '<div class="mc-item" style="opacity:.7">';
      h += '<span class="heat-tag" style="background:var(--good)">' + mc + '</span>';
      h += '<span class="mc-detail" style="text-decoration:line-through">' + label + '</span>';
      h += '<span class="mc-fires" style="color:var(--good)">Resolved \u2713</span>';
      h += '</div>';
    });
    h += '</div>';
  }

  if (activeMCs.length === 0 && resolvedMCs.length === 0) {
    h += '<div class="empty"><h3>No misconception data yet</h3><p>This student needs to answer more questions.</p></div>';
  }

  // Spec point breakdown
  var specData = {};
  studentResponses.forEach(function(r) {
    var sp = r.spec_point || MC_TO_SPEC[r.misconception_tag] || null;
    if (!sp || sp === 'TECH') return;
    if (!specData[sp]) specData[sp] = { total: 0, correct: 0 };
    specData[sp].total++;
    if (r.is_correct) specData[sp].correct++;
  });
  var specKeys = Object.keys(specData).sort();
  if (specKeys.length > 0) {
    h += '<div class="card"><div class="card-title">Spec Point Breakdown</div>';
    h += '<table style="width:100%;border-collapse:collapse;font-size:13px">';
    h += '<thead><tr style="color:#8A857E;text-align:left"><th style="padding:6px 0">Spec</th><th>Subject</th><th>Questions</th><th>Accuracy</th><th style="min-width:80px">Bar</th></tr></thead><tbody>';
    specKeys.forEach(function(sp) {
      var d = specData[sp];
      var spAcc = Math.round((d.correct / d.total) * 100);
      var col = spAcc >= 70 ? 'var(--good)' : spAcc >= 50 ? 'var(--hot)' : 'var(--bad)';
      h += '<tr style="border-top:1px solid var(--line)">';
      h += '<td style="padding:7px 0;font-family:JetBrains Mono,monospace;font-size:12px;color:var(--ember)">' + sp + '</td>';
      h += '<td style="font-size:12px;color:#8A857E">' + (SPEC_TO_SUBJECT[sp] || '—') + '</td>';
      h += '<td style="color:#8A857E">' + d.total + '</td>';
      h += '<td style="font-weight:700;color:' + col + '">' + spAcc + '%</td>';
      h += '<td><div style="background:var(--line);border-radius:2px;height:6px;width:80px"><div style="background:' + col + ';border-radius:2px;height:6px;width:' + spAcc + '%"></div></div></td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  el.innerHTML = h;
};

renderLogin();
</script>
