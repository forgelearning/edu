BANKS["PHYS-1"] = {
  label: "Mechanics",
  color: "#1d4ed8",
  questions: [
    {
      id:"PHYS-01",stem:"A student writes: 'A car travelling at constant velocity has no forces acting on it.' Why is this wrong?",
      options:{A:"It is correct — constant velocity means no forces.",B:"Constant velocity means the car is accelerating.",C:"Constant velocity means the resultant force is zero, not that no forces act",D:"Forces only act when objects are stationary."},
      correct:"C",tag:"MC-PHYS-01",
      scaffold:"Newton's First Law: an object continues at constant velocity (or rest) when the resultant force is zero. This does NOT mean no forces act — it means forces are balanced. A car at constant speed has: driving force (engine) balanced by friction and air resistance. Students confuse 'no resultant force' with 'no forces.'",
      reforge:{stem:"A skydiver falls at terminal velocity. Which statement correctly describes the forces?",options:{A:"No forces act on the skydiver.",B:"Weight equals air resistance — the resultant force is zero so velocity is constant.",C:"Weight is greater than air resistance, causing acceleration.",D:"Air resistance is greater than weight."},correct:"B"}
    },
    {
      id:"PHYS-02",stem:"A ball is thrown horizontally from a cliff. Ignoring air resistance, which correctly describes its motion?",
      options:{A:"It moves in a straight line diagonally downward.",B:"It decelerates horizontally because gravity pulls it back.",C:"Horizontal and vertical motion cannot be analysed separately.",D:"Horizontal velocity remains constant"},
      correct:"D",tag:"MC-PHYS-02",
      scaffold:"Projectile motion: horizontal and vertical components are independent. Horizontal: no force (ignoring air resistance) → constant velocity. Vertical: gravitational force → constant acceleration downward (g = 9.81 m/s²). Combined: parabolic trajectory. Common error: students think horizontal velocity decreases due to gravity — gravity only acts vertically.",
      reforge:{stem:"A projectile is launched at 30° to the horizontal with speed 20 m/s. What is the initial vertical component of velocity?",options:{A:"20 m/s",B:"10 m/s (20 × sin30° = 20 × 0.5 = 10 m/s)",C:"17.3 m/s",D:"20 × cos30°"},correct:"B"}
    },
    {
      id:"PHYS-03",stem:"Which of the following correctly states the work-energy theorem?",
      options:{A:"The net work done on an object equals the change in its kinetic energy: W_net = ΔKE = ½mv²",B:"Work done equals the force applied multiplied by time.",C:"Work done is always equal to the gain in potential energy.",D:"Work equals power multiplied by force."},
      correct:"A",tag:"MC-PHYS-03",
      scaffold:"Work-energy theorem: W_net = ΔKE. Work done = force × displacement (in direction of force): W = Fd cosθ. If net work is positive, KE increases; if negative, KE decreases. Distinct from conservation of energy (which also includes PE). Common errors: confusing work with impulse (Ft), or assuming work = ΔPE only.",
      reforge:{stem:"A 2 kg object accelerates from 3 m/s to 7 m/s. What is the net work done on it?",options:{A:"8 J",B:"40 J (ΔKE = ½×2×7² − ½×2×3² = 49 − 9 = 40 J)",C:"20 J",D:"80 J"},correct:"B"}
    },
    {
      id:"PHYS-04",stem:"A student uses s = ut + ½at² to find displacement but gets the wrong answer because they forgot to check something. What is the most likely error?",
      options:{A:"They forgot to square t.",B:"They used inconsistent sign conventions",C:"SUVAT equations only work for horizontal motion.",D:"They should have used v = u + at instead."},
      correct:"B",tag:"MC-PHYS-04",
      scaffold:"SUVAT equations require consistent sign conventions throughout the calculation. Choose a positive direction (usually up or right) and stick to it. If upward is positive: initial upward velocity = +u, g = −9.81 m/s². If a ball is thrown upward and comes back, displacement is eventually negative (below start). Mixing signs is the single most common SUVAT error in AQA mark schemes.",
      reforge:{stem:"A ball is thrown upward at 15 m/s. Taking upward as positive, what is its displacement after 4 seconds? (g = 9.81 m/s²)",options:{A:"60 m",B:"−18.5 m (s = 15×4 + ½×(−9.81)×16 = 60 − 78.5 = −18.5 m — it has gone above and come back below the start)",C:"18.5 m",D:"0 m"},correct:"B"}
    },
    {
      id:"PHYS-05",stem:"Hooke's Law states that F = kx. A student says: 'This means a stiffer spring stores more energy.' Is this always correct?",
      options:{A:"Yes — higher k always means more energy stored.",B:"Hooke's Law doesn't apply to energy calculations.",C:"Not necessarily. Elastic potential energy = ½kx²",D:"Stiffer springs always store less energy."},
      correct:"C",tag:"MC-PHYS-05",
      scaffold:"EPE = ½kx² = F²/(2k). For the same extension: stiffer spring stores more energy (higher k). For the same force: stiffer spring extends less, stores less energy (F²/2k decreases as k increases). The question of 'which stores more' depends on whether you fix force or extension. AQA examiners test this distinction.",
      reforge:{stem:"Spring A has k = 200 N/m, Spring B has k = 50 N/m. Both are extended by 0.1 m. Which stores more elastic potential energy?",options:{A:"Spring B stores more.",B:"Spring A stores more (EPE_A = ½×200×0.01 = 1 J; EPE_B = ½×50×0.01 = 0.25 J — stiffer spring stores more for the same extension).",C:"Both store equal energy.",D:"Cannot be determined without knowing the force."},correct:"B"}
    },
    {
      id:"PHYS-06",stem:"The principle of conservation of momentum states that:",
      options:{A:"Momentum is always conserved in elastic collisions only.",B:"Momentum and kinetic energy are both conserved in all collisions.",C:"Momentum is conserved only when objects stick together.",D:"The total momentum of a closed system remains constant provided no external resultant force acts"},
      correct:"D",tag:"MC-PHYS-06",
      scaffold:"Momentum conservation: applies to ALL collisions (elastic and inelastic) in a closed system (no external net force). Kinetic energy is only conserved in perfectly elastic collisions. In inelastic collisions, KE is lost as heat/sound/deformation — but momentum is always conserved. Students frequently confuse momentum conservation with KE conservation.",
      reforge:{stem:"Two objects collide and stick together (perfectly inelastic collision). Which quantities are conserved?",options:{A:"Both kinetic energy and momentum.",B:"Momentum only — kinetic energy is lost in an inelastic collision as heat, sound, or deformation.",C:"Kinetic energy only.",D:"Neither is conserved."},correct:"B"}
    },
    {
      id:"PHYS-07",stem:"A student confuses 'scalar' and 'vector' quantities. Which list correctly separates them?",
      options:{A:"Scalars: speed, distance, mass, energy, temperature. Vectors: velocity",B:"Scalars: velocity, force, acceleration. Vectors: speed, distance, energy.",C:"Scalars and vectors are interchangeable — the distinction doesn't matter in calculations.",D:"All physical quantities are vectors."},
      correct:"A",tag:"MC-PHYS-07",
      scaffold:"Scalars have magnitude only (speed, distance, mass, energy, time, temperature, pressure). Vectors have magnitude AND direction (velocity, displacement, force, acceleration, momentum, weight). Practical implication: two forces of 5 N can give a resultant of anything from 0 N to 10 N depending on direction. Adding scalars uses arithmetic; adding vectors requires geometry (parallelogram or component method).",
      reforge:{stem:"A car travels 3 km north then 4 km east. Its total distance travelled is 7 km. What is the magnitude of its displacement?",options:{A:"7 km",B:"5 km (displacement is a vector — use Pythagoras: √(3²+4²) = 5 km at a bearing NE)",C:"1 km",D:"3.5 km"},correct:"B"}
    },
    {
      id:"PHYS-08",stem:"Which correctly explains why a heavier object and a lighter object dropped from the same height hit the ground at the same time (ignoring air resistance)?",
      options:{A:"The heavier object has more gravitational force pulling it, so it falls faster.",B:"Gravitational acceleration (g) is independent of mass",C:"Air resistance makes the difference negligible.",D:"Objects in free fall have no weight."},
      correct:"B",tag:"MC-PHYS-08",
      scaffold:"F = mg. Newton's 2nd law: a = F/m = mg/m = g. Mass cancels — acceleration is independent of mass. This is Galileo's insight. Heavier object: more force BUT more inertia to overcome. The ratio is always g. Air resistance does differentiate them in reality (depends on cross-section and mass), but in a vacuum, ALL objects fall identically regardless of mass.",
      reforge:{stem:"On the Moon, where g = 1.6 m/s², a 1 kg and a 10 kg object are dropped simultaneously. Which hits the ground first?",options:{A:"The 10 kg object — more gravitational force.",B:"They hit simultaneously — gravitational acceleration on the Moon is 1.6 m/s² for all objects regardless of mass, since acceleration = F/m = mg/m = g.",C:"The 1 kg object — less inertia.",D:"Cannot be determined without knowing the height."},correct:"B"}
    }
  ]
};

BANKS["POL-1"] = {
  label: "UK Government & Politics",
  color: "#1e3a5f",
  questions: [
    {
      id:"POL-01",stem:"A student describes the UK constitution as 'written in a single document.' Why is this wrong?",
      options:{A:"It is correct — the UK constitution is codified.",B:"The UK constitution is entirely unwritten.",C:"The UK has an uncodified constitution",D:"Constitutions are only found in republican states."},
      correct:"C",tag:"MC-POL-01",
      scaffold:"Uncodified (not unwritten): key sources include statute law (Parliament Acts 1911/49, Human Rights Act 1998, Fixed-term Parliaments Act 2011), constitutional conventions (collective cabinet responsibility, Salisbury convention), common law, royal prerogative, and authoritative texts (Erskine May, Bagehot's 'The English Constitution'). Unlike the US (1787) or Germany (1949), no single document contains all constitutional principles.",
      reforge:{stem:"Which of the following is an example of a constitutional convention rather than a statute in the UK?",options:{A:"The Human Rights Act 1998",B:"The principle that the Prime Minister must command a majority in the House of Commons and must resign if they lose a vote of no confidence.",C:"The Parliament Act 1911",D:"The Fixed-term Parliaments Act 2011"},correct:"B"}
    },
    {
      id:"POL-02",stem:"First-past-the-post (FPTP) elections are criticised primarily for:",
      options:{A:"Producing too many small parties and unstable coalitions.",B:"Being too slow to produce a result.",C:"Allowing too much voter choice.",D:"Disproportionality"},
      correct:"D",tag:"MC-POL-02",
      scaffold:"FPTP weaknesses: disproportional outcomes (2019: Conservatives won 56% of seats with 44% of votes), wasted votes (all votes beyond plurality in each constituency), safe seats reduce competition, two-party squeeze (smaller parties dramatically under-represented), tactical voting distorts true preferences. AV (2011 referendum rejected), PR systems avoid many of these. Edexcel questions often ask you to evaluate FPTP against specific alternatives.",
      reforge:{stem:"In the 2015 UK general election, UKIP won 12.6% of the national vote but only 1 seat. The SNP won 4.7% of the vote but 56 seats. Which feature of FPTP explains this?",options:{A:"UKIP's votes were invalid due to party registration errors.",B:"FPTP rewards concentration of votes in constituencies — UKIP votes were spread nationally (never a plurality anywhere); SNP votes were concentrated in Scottish seats where they won pluralities.",C:"Proportional representation applied to UKIP but not the SNP.",D:"Only registered parties can win multiple seats under FPTP."},correct:"B"}
    },
    {
      id:"POL-03",stem:"Parliamentary sovereignty means that:",
      options:{A:"Parliament is the supreme legal authority in the UK",B:"The monarch has ultimate authority over Parliament.",C:"The Prime Minister controls all parliamentary business.",D:"The Supreme Court can strike down Acts of Parliament."},
      correct:"A",tag:"MC-POL-03",
      scaffold:"Dicey's three principles of parliamentary sovereignty: Parliament can legislate on anything; no Parliament can bind its successors; no body can override Parliament. Challenges: EU membership (1972–2020, EU law supremacy — Factortame case), devolution (created powerful sub-national bodies), Human Rights Act (courts issue declarations of incompatibility — but Parliament need not act), referendums (political but not legally binding). Brexit reasserted parliamentary sovereignty.",

      reforge:{stem:"Which evidence would MOST effectively challenge a pluralist account of UK democracy?",options:{A:"The existence of many different pressure groups in the UK.",B:"Evidence that wealthy corporate donors disproportionately influence party policy and that some groups (e.g. the homeless) have minimal political access — suggesting power is not evenly distributed among competing groups.",C:"The fact that elections are held every five years.",D:"The presence of a free press in the UK."},correct:"B"}

      reforge:{stem:"A question asks: 'Evaluate the power of the Prime Minister.' A top answer would use examples from:",options:{A:"Only the current Prime Minister's term in office.",B:"Multiple Prime Ministers across different contexts — showing when PM power is strong (large majority, economic growth, united party) AND when it is constrained (hung parliament, backbench rebellions, economic crisis) — demonstrating genuine evaluative understanding.",C:"Only foreign policy examples where PMs have most freedom.",D:"The Monarch's constitutional relationship with the PM."},correct:"B"}

    {
      id:"POL-07",stem:"Which of the following best describes a 'pressure group' as distinct from a political party?",

      correct:"A",tag:"MC-POL-07",
      scaffold:"Pressure groups vs parties: parties seek power (government), pressure groups seek influence. Insider groups: consulted by government, formal access (BMA on health policy). Outsider groups: excluded or choose exclusion, use direct action, media campaigns (Extinction Rebellion). Grant's distinction: sectional (self-interest — trade unions) vs cause groups (public interest — Amnesty International). AQA/Edexcel expect you to evaluate whether pressure groups enhance or threaten democracy.",
      reforge:{stem:"Extinction Rebellion blockading roads is an example of an outsider pressure group tactic because:",options:{A:"They lobby MPs directly in Westminster.",B:"They use direct action to generate media attention and public pressure rather than working within formal channels — either by choice or because they lack insider access to government.",C:"They represent a section of society rather than a cause.",D:"Their membership is too small to qualify as an insider group."},correct:"B"}

    {
      id:"POL-08",stem:"Evaluate the view that referendums are a threat to representative democracy in the UK. (Essay plan — 30 marks)",
      type:"short_answer",
      model_answer:"For (threat): bypass Parliament (undermines parliamentary sovereignty), can be used tactically (Cameron's Brexit gamble to manage party), simplify complex issues to binary choice (Brexit — multiple leave options collapsed), tyranny of majority can harm minorities, result may reflect campaign misinformation rather than informed choice (£350m bus claim). Against: increase legitimacy of constitutional change, direct mandate stronger than parliamentary vote, force politicians to engage public on major issues (AV 2011, Scottish Independence 2014), turnout often higher than elections. Evaluation: context matters — referendums on constitutional questions (devolution, Brexit) have stronger justification than use as party management tools. UK's uncodified constitution means no formal rule on when to hold them — this is the deeper problem. Judgement: they are not inherently a threat but depend on how and why they are called — executive discretion over timing and framing is the real risk.",

      scaffold:"Chain rule: dy/dx = n·(inner)^(n−1) · d/dx(inner). Outer → 5(3x+2)⁴, inner derivative = 3. Multiply: 5(3x+2)⁴ × 3 = 15(3x+2)⁴. Forgetting to multiply by the inner derivative is the most common chain rule error.",
      reforge:{stem:"Differentiate y = (2x − 1)⁶.",options:{A:"6(2x − 1)⁵",B:"12(2x − 1)⁵",C:"6(2)⁵",D:"2(2x − 1)⁵"},correct:"B"}

      correct:"A",tag:"MC-MATH-04",
      scaffold:"(x + b/2)² − (b/2)² + c. Here: (x+3)² − 9 + 11 = (x+3)² + 2. The constant inside the bracket is half the coefficient of x; the correction outside removes the extra square you added.",

      reforge:{stem:"Given f(x) = x² − 4x + 3, which equation gives the x-coordinate of the minimum point?",options:{A:"x² − 4x + 3 = 0",B:"f′(x) = 2x − 4 = 0, giving x = 2.",C:"f(0) = 3",D:"f(x) = 1"},correct:"B"}

    {
      id:"MATH-06",stem:"A student writes: log(a + b) = log(a) + log(b). Is this correct?",

      scaffold:"Log laws: log(ab) = log(a) + log(b), log(a/b) = log(a) − log(b), log(aⁿ) = n·log(a). log(a + b) cannot be simplified — this is one of the most-penalised errors in A Level Maths.",

    },
    {
      id:"MATH-07",stem:"In the binomial expansion of (1 + x)⁵, what is the coefficient of x³?",
      options:{A:"10",B:"5",C:"15",D:"20"},
      correct:"A",tag:"MC-MATH-07",
      scaffold:"Use ⁿCᵣ for the coefficient: ⁵C₃ = 5! / (3! × 2!) = (5 × 4) / (2 × 1) = 10. Common error: confusing r with n − r, or mis-applying the formula. Always identify which term you need and apply ⁿCᵣ carefully.",
      reforge:{stem:"In (2 + x)⁴, what is the coefficient of x²?",options:{A:"6",B:"24, since ⁴C₂ × 2² = 6 × 4 = 24.",C:"12",D:"4"},correct:"B"}
    },
    {
      id:"MATH-08",stem:"A proof by contradiction starts: 'Assume √2 is irrational.' What is wrong with this opening?",
      options:{A:"that is the correct assumption.",B:"Proof by contradiction requires assuming the opposite of what you want to prove",C:"The proof must begin with a definition.",D:"Contradiction cannot be used for irrational numbers."},
      correct:"B",tag:"MC-MATH-08",
      scaffold:"Structure: (1) State what you want to prove. (2) Assume the negation. (3) Derive a logical contradiction through valid steps. (4) Conclude the assumption is false, so the original statement must be true. The assumption must be stated explicitly — this earns a mark.",
      reforge:{stem:"To prove there are infinitely many primes by contradiction, you start by assuming:",options:{A:"There are infinitely many primes.",B:"There are finitely many primes — then construct a number not divisible by any of them, producing a contradiction.",C:"2 is not prime.",D:"All odd numbers are prime."},correct:"B"}

    {
      id:"RS-01",stem:"Aquinas's Cosmological Argument concludes that there must be an 'Unmoved Mover'. What is the key logical move that makes this necessary?",
      options:{A:"Everything requires a cause, and the universe is beautiful, so God must exist.",B:"The universe is contingent, and contingent things could not have always existed.",C:"An infinite regress of causes is impossible, so there must be a first, uncaused cause",D:"Design implies a designer, so the universe must have been caused."},
      correct:"C",tag:"MC-RS-01",
      scaffold:"Aquinas's First Way: motion requires a mover → cannot regress to infinity → must be a first mover, itself unmoved. The infinite regress problem is the key move. Don't confuse with the Ontological Argument (a priori) or the argument from contingency (Leibniz's form). Examiners penalise conflation of the five ways.",
      reforge:{stem:"Which philosopher argued that the universe could be 'brute fact' — simply existing without a cause — as a direct challenge to the Cosmological Argument?",options:{A:"Aquinas",B:"Bertrand Russell — denying the need for a first cause outside the universe.",C:"Descartes",D:"Kant"},correct:"B"}
    },
    {
      id:"RS-02",stem:"Paley's Teleological Argument uses the analogy of a watch. What is Hume's most direct criticism of this analogical argument?",
      options:{A:"The universe is not complex enough to need a designer.",B:"Paley did not account for the existence of evil.",C:"The watch analogy proves the universe is eternal.",D:"An analogy between the universe and a watch is too weak"},
      correct:"D",tag:"MC-RS-02",
      scaffold:"Hume (Dialogues Concerning Natural Religion): analogical arguments only work where the two things compared are sufficiently similar. The universe differs from a watch in almost every relevant respect — it is unique, we have no experience of universe-creation. Hume also notes the argument, even if valid, might support a committee of gods or a very imperfect designer. Don't confuse Hume's critique with Darwin's (evolution provides a non-designer explanation).",
      reforge:{stem:"Darwin's theory of evolution is used against the Teleological Argument primarily because it:",options:{A:"Proves the universe is 14 billion years old.",B:"Provides a non-intentional explanation for apparent design in living things — natural selection, not a designer, produces complexity.",C:"Shows God could not have known the outcome of creation.",D:"Establishes that the universe had no beginning."},correct:"B"}
    },
    {
      id:"RS-03",stem:"Anselm's Ontological Argument claims God must exist because God is 'that than which nothing greater can be conceived'. What is Kant's objection?",
      options:{A:"'Existence' is not a predicate",B:"God is beyond human understanding.",C:"The argument works in logic but not in the real world.",D:"Anselm's God is too limited to be a true deity."},
      correct:"A",tag:"MC-RS-03",
      scaffold:"Kant: existence is not a real predicate — it doesn't add to our concept of a thing. Saying '100 thalers exist' tells us nothing about the nature of 100 thalers that 'possible 100 thalers' doesn't. The Ontological Argument treats existence as a perfection/property, which Kant denies. Gaunilo's objection is different: same logic would prove a perfect island exists.",
      reforge:{stem:"Gaunilo's 'Lost Island' objection to Anselm argues that:",options:{A:"Islands cannot be perfect because they are material.",B:"If Anselm's logic were valid, we could prove the existence of a perfect island — which is absurd; therefore the logic is flawed.",C:"God is not the greatest conceivable being.",D:"The argument requires empirical evidence."},correct:"B"}
    },
    {
      id:"RS-04",stem:"A student writes: 'The Problem of Evil proves God does not exist.' What is the most precise philosophical challenge to this claim?",
      options:{A:"Evil is an illusion — it does not really exist.",B:"The logical Problem of Evil concludes God and evil are logically incompatible",C:"God created evil on purpose to test humans.",D:"Evil only proves God is not all-knowing."},
      correct:"B",tag:"MC-RS-04",
      scaffold:"Distinguish: Logical PoE (Mackie) — contradiction between God's attributes and evil's existence. Evidential PoE (Rowe) — even if not logically impossible, the quantity/nature of evil makes God's existence unlikely. Theodicies (Irenaeus/Hick: soul-making; Augustinian: free will and the fall) attempt reconciliation. A top 15-mark answer identifies the form of the PoE and evaluates specific theodicies.",
      reforge:{stem:"Hick's 'soul-making' theodicy argues that evil and suffering exist because:",options:{A:"God is not powerful enough to remove them.",B:"They are necessary conditions for humans to develop virtues — moral and spiritual growth requires a challenging environment, not a paradise.",C:"Humans caused evil through the Fall.",D:"Evil is an absence of good, not a real thing."},correct:"B"}
    },
    {
      id:"RS-05",stem:"In Kantian Ethics, what is the fundamental principle of the Categorical Imperative's first formulation?",
      options:{A:"Act so as to produce the greatest happiness for the greatest number.",B:"Always treat others as you would wish to be treated.",C:"Act only according to a maxim that you could",D:"Act in accordance with your duty to God."},
      correct:"C",tag:"MC-RS-05",
      scaffold:"Kant's first formulation: universalisability. Test: could I consistently will everyone to act on this maxim? Lying fails — if everyone lied, the practice of truth-telling (on which lying depends) would collapse. This is a priori — derived from reason, not consequences. Don't confuse with the second formulation (humanity as end in itself) or the Golden Rule (which is consequentialist in spirit).",
      reforge:{stem:"A student says 'Kantian ethics is too rigid — it ignores consequences.' Which is the most precise evaluation of this criticism?",options:{A:"Kant is wrong because consequences always matter more than duty.",B:"This is a genuine strength of Kantianism — consistency and duty-based rules prevent manipulation of outcomes — but it can lead to counter-intuitive results (e.g. Kant says you must not lie even to a murderer asking where your friend is hiding).",C:"Kant did consider consequences — he just weighted them less.",D:"Rigidity is not a criticism because all ethical theories are rigid."},correct:"B"}
    },
    {
      id:"RS-06",stem:"Bentham's Utilitarianism judges actions by the 'hedonic calculus'. What is Mill's main refinement to Bentham's position?",
      options:{A:"Mill rejected pleasure as a criterion and replaced it with duty.",B:"Mill argued that only the pleasure of the majority should count.",C:"Mill replaced the hedonic calculus with the principle of utility.",D:"Mill introduced a qualitative distinction between pleasures"},
      correct:"D",tag:"MC-RS-06",
      scaffold:"Bentham: quantity only — any pleasure counts equally. Mill: quality matters — 'better to be Socrates dissatisfied than a fool satisfied.' Higher pleasures: intellectual, aesthetic, moral. Lower pleasures: bodily. Key evaluative point: Mill's distinction may be elitist and hard to measure. Mill also introduces Rule Utilitarianism (rules that tend to maximise utility) vs. Bentham's Act Utilitarianism.",
      reforge:{stem:"Which scenario best illustrates a critique of Act Utilitarianism?",options:{A:"Telling a small lie that prevents significant harm.",B:"Punishing an innocent person to prevent a riot that would harm more people — which Act Utilitarianism could in principle justify, despite our strong moral intuitions against it.",C:"Following a rule against lying even when lying would help.",D:"Calculating the greatest happiness for a small group only."},correct:"B"}
    },
    {
      id:"RS-07",stem:"What does 'religious experience as proof of God's existence' most fundamentally rely on for its validity?",
      options:{A:"The Principle of Credulity (Swinburne)",B:"The experience must be shared by multiple people simultaneously.",C:"Scientific instruments must be able to verify the experience.",D:"The experience must alter the person's behaviour permanently."},
      correct:"A",tag:"MC-RS-07",
      scaffold:"Swinburne's two principles: (1) Principle of Credulity — rational to believe what experience seems to show, absent defeaters. (2) Principle of Testimony — rational to believe what others sincerely report experiencing. Key challenges: religious experiences may be hallucinations, explicable through psychology (Freud — wish-fulfilment; Persinger — temporal lobe stimulation), or culturally conditioned. James's four marks (ineffability, noetic quality, transience, passivity) describe but don't verify.",
      reforge:{stem:"Freud's explanation of religious belief suggests that:",options:{A:"Religion is a rational response to observable design in the universe.",B:"Religious belief is a projection — an illusion rooted in unconscious wishes (security, father-figure) — not evidence of God's actual existence.",C:"Religious experience is impossible to explain scientifically.",D:"Religion evolved as a tool for social cohesion only."},correct:"B"}
    },
    {
      id:"RS-08",stem:"A student writes: 'Natural Law theory says whatever is natural is morally right.' Why is this an inadequate account of Aquinas's Natural Law?",
      options:{A:"Natural Law is entirely based on divine commands revealed through scripture.",B:"Aquinas's Natural Law is about God-given rational purposes (telos) in human nature, not what happens naturally.",C:"Aquinas did not believe natural processes had any moral or theological significance.",D:"Natural Law applies exclusively to sexual ethics and reproduction."},
      correct:"B",tag:"MC-RS-08",
      scaffold:"Key distinction: Natural Law ≠ 'whatever animals do' or 'whatever is statistically normal'. It refers to rational, teleological purposes embedded in human nature by God: preserve life, reproduce, educate children, live in community, know God. The primary precepts are absolute; secondary precepts apply them to specific situations. Moore's 'naturalistic fallacy' (is/ought gap) is a distinct challenge — you cannot derive moral 'ought' from natural 'is'.",
      reforge:{stem:"Which of the following would Aquinas's Natural Law most clearly prohibit, and why?",options:{A:"Drinking alcohol — because it is a natural substance.",B:"Deliberately killing an innocent person — because it violates the primary precept to preserve life, a fundamental God-given rational end.",C:"Competing in sport — because it risks injury.",D:"Eating meat — because it harms animals."},correct:"B"}

      correct:"C",tag:"MC-HSC-05",
      scaffold:"Maslow's hierarchy (bottom to top): Physiological (food, water, sleep, warmth) → Safety (security, stability, freedom from fear) → Love/Belonging (relationships, friendship, intimacy) → Esteem (achievement, recognition, respect) → Self-Actualisation (realising potential). Application in H&SC: a service user experiencing homelessness (physiological/safety deficits) cannot focus on esteem or self-actualisation until basic needs are addressed. Person-centred care aims to meet needs across all levels.",
      reforge:{stem:"A residential care home ensures residents have nutritious meals, safe living conditions, regular social activities, and opportunities to pursue hobbies. Which needs are being addressed, from bottom to top?",options:{A:"Self-actualisation only.",B:"Physiological (meals), Safety (safe conditions), Love/Belonging (social activities), and Esteem/Self-actualisation (hobbies) — all levels addressed.",C:"Only physiological and safety needs.",D:"Esteem needs only, via activities."},correct:"B"}
    },
    {
      id:"HSC-06",stem:"A care worker provides care that reflects the individual's preferences, values and choices rather than the organisation's convenience. What principle does this best illustrate?",
      options:{A:"Duty of care.",B:"Safeguarding.",C:"Equality of opportunity.",D:"Person-centred care"},
      correct:"D",tag:"MC-HSC-06",
      scaffold:"Person-centred care (Rogers-influenced in H&SC): individualism, rights, choice, privacy, independence, dignity, respect. Contrast with paternalistic or task-centred care. In exam answers: name the principle, explain what it means in this context, link to impact on the individual's wellbeing (PIES). Care plans should reflect individual preferences: always say what it looks like in practice, not just the label.",
      reforge:{stem:"A nurse ignores a patient's wish to refuse a particular treatment because 'it is for their own good'. Which value is being violated?",options:{A:"Confidentiality.",B:"Autonomy and the principle of person-centred care — the patient's right to make informed decisions about their own care is not being respected.",C:"Equality.",D:"Duty of care — the nurse is prioritising safety."},correct:"B"}
    },
    {
      id:"HSC-07",stem:"During late adulthood (65+), which physical change is most directly linked to increased falls risk?",
      options:{A:"Reduced muscle mass (sarcopenia) and declining bone density increase falls risk directly.",B:"Decreased lung capacity causes breathlessness but is not linked to falls risk.",C:"Greying hair and skin changes are normal ageing but unrelated to falls risk.",D:"Reduced metabolic rate affects energy but is not a primary falls risk factor."},
      correct:"A",tag:"MC-HSC-07",
      scaffold:"Physical changes in late adulthood relevant to H&SC practice: decreased muscle mass → reduced strength and balance; decreased bone density → increased fracture risk; reduced reaction time → slower responses; sensory decline (vision, hearing) → communication barriers. Application: care plans should include falls risk assessments, physiotherapy referrals, appropriate footwear, environmental adaptations. Link physical change to impact on independence and emotional wellbeing (PIES interconnection).",
      reforge:{stem:"Which care intervention most directly addresses the increased falls risk associated with physical changes in late adulthood?",options:{A:"Encouraging intellectual hobbies such as reading.",B:"A multifactorial falls prevention programme: strength and balance exercises, medication review (some medications affect balance), vision check, and home hazard assessment.",C:"Nutritional support to prevent weight loss.",D:"Social activities to reduce loneliness."},correct:"B"}
    },
    {
      id:"HSC-08",stem:"A student uses the term 'service user' throughout their answer. Why might examiners credit 'individual' or the specific role (resident, patient, client) instead?",
      options:{A:"'Service user' is an outdated term that H&SC no longer uses.",B:"Person-centred care values recognise the importance of not reducing people to their relati",C:"'Service user' can only refer to adults, not children.",D:"'Service user' implies the person is dependent, which contradicts empowerment."},
      correct:"B",tag:"MC-HSC-08",
      scaffold:"Exam technique: OCR H604 mark schemes reward application of care values in language as well as content. Higher-band answers: name the individual using their given name or role (e.g. 'Aisha, the service user, stated...'), reference specific care values by name, link theory to individual impact. Generic descriptions of 'service users receiving care' are lower-band. The 8-mark and 10-mark extended questions require this level of application to reach Band 3/4.",
      reforge:{stem:"An exam question gives a scenario about 'James, a 78-year-old with early-stage dementia living in a care home.' A top-band answer would:",options:{A:"Describe dementia symptoms in general.",B:"Refer to James by name throughout, link theories and care values directly to his specific situation, and reach a reasoned judgement about the most appropriate care approach for his circumstances.",C:"List all the PIES changes that occur in late adulthood.",D:"Explain all of Maslow's hierarchy without reference to James."},correct:"B"}
    }
  ]

BANKS["FR-1"] = {
  label: "Listening, Reading & Translation",
  color: "#1d4ed8",
  questions: [
    {
      id:"FR-01",stem:"'Je suis allé à Paris avec mon ami.' Which grammatical feature does this sentence correctly demonstrate?",
      options:{A:"The use of avoir as auxiliary with 'aller'.",B:"The imperfect tense for a past action.",C:"The use of être as auxiliary with 'aller' in the passé composé",D:"The use of a reflexive verb."},
      correct:"C",tag:"MC-FR-01",
      scaffold:"Passé composé: most verbs use avoir + past participle. Être verbs (movement/state): Devenir, Revenir, Monter, Rester, Sortir, Venir, Aller, Naître, Descendre, Entrer, Retourner, Tomber, Rentrer, Arriver, Mourir, Partir (DR MRS VANDERTRAMP). All reflexive verbs also take être. Agreement: the past participle agrees with the subject in gender and number when être is the auxiliary. Examiner error: students use 'avoir' with aller, or forget agreement ('je suis allée' for female speaker).",
      reforge:{stem:"'Elles sont parti au marché.' What is the error?",options:{A:"'Sont' should be 'ont' — aller takes avoir.",B:"The past participle 'parti' must agree with the plural feminine subject: 'parties'.",C:"'Au marché' should be 'à le marché'.",D:"No error."},correct:"B"}
    },
    {
      id:"FR-02",stem:"A student translates 'I used to go to school by bus' as 'J'ai allé à l'école en bus.' What is wrong?",
      options:{A:"'École' requires an article before it.",B:"'En bus' is incorrect — the preposition should be 'par'.",C:"'J'ai allé' is wrong because 'aller' takes 'être' — use 'je suis allé'.",D:"Habitual past actions require the imparfait: 'J'allais à l'école en bus.'"},
      correct:"D",tag:"MC-FR-02",
      scaffold:"Imparfait vs passé composé: imparfait = ongoing states, habits, descriptions in the past ('I used to', 'I was doing', 'it was raining'). Passé composé = completed, specific events ('I went', 'she said'). Trigger words: 'used to', 'would', 'was/were doing' → imparfait. 'Yesterday', 'suddenly', 'one day', 'on Monday' → passé composé. Examiner reports flag tense confusion as a top-tier error.",
      reforge:{stem:"Which sentence correctly uses both tenses?",options:{A:"Quand j'étais jeune, j'ai joué au football tous les jours.",B:"Quand j'étais jeune, je jouais au football tous les jours. — Imparfait for both ongoing state (being young) and habitual action (playing).",C:"Quand j'ai été jeune, je jouais au football.",D:"Quand j'étais jeune, j'ai joué hier."},correct:"B"}
    },
    {
      id:"FR-03",stem:"Error in: 'Je veux que tu viens avec moi.'",
      options:{A:"After 'que' following expressions of wanting",B:"'Tu' should be 'vous'.",C:"'Veux' should be in the imperfect.",D:"No error — 'viens' is correct."},
      correct:"A",tag:"MC-FR-03",
      scaffold:"The subjunctive is triggered by: (1) expressions of wanting/wishing (vouloir, désirer, souhaiter), (2) expressions of emotion (être content, regretter, avoir peur), (3) expressions of doubt/possibility (douter, il est possible), (4) impersonal expressions (il faut que, il est important que), (5) certain conjunctions (bien que, pour que, avant que). Key subjunctive forms: être → soit, avoir → ait, aller → aille, faire → fasse, venir → vienne. Examiners note this as the most frequently missed A Level grammar point.",
      reforge:{stem:"Which sentence correctly uses the subjunctive?",options:{A:"Il est possible qu'il vient demain.",B:"Il est possible qu'il vienne demain. — Impersonal expression of possibility requires subjunctive.",C:"Il est possible qu'il est venu demain.",D:"Il est possible qu'il viendra demain."},correct:"B"}
    },
    {
      id:"FR-04",stem:"Translate: 'The book that she gave me was interesting.' A student writes: 'Le livre qu'elle m'a donné était intéressant.' Is this correct?",
      options:{A:"No — 'qu'' should be 'qui' because 'livre' is the subject.",B:"Yes",C:"No — 'était' should be in the passé composé.",D:"No — 'donné' should be 'donnée' to agree with 'elle'."},
      correct:"B",tag:"MC-FR-04",
      scaffold:"Relative pronouns: 'qui' = subject of the relative clause (who/which does something). 'Que/qu'' = object of the relative clause (who/which something is done to). Past participle agreement with avoir: when the direct object precedes the verb, the past participle agrees. 'Le livre que j'ai lu' → 'lu' (masc sg, no change). 'La lettre que j'ai lue' → 'lue' (fem sg). Examiner error: using 'qui' when 'que' is required, or vice versa.",
      reforge:{stem:"Fill in the gap: 'La chanson ___ il a composée est magnifique.'",options:{A:"qui — the song is the subject.",B:"que — the song is the object of 'composée'; 'il' is the subject. Past participle agrees: 'composée' (feminine).",C:"dont — indicating possession.",D:"où — indicating place."},correct:"B"}
    },
    {
      id:"FR-05",stem:"'Si j'aurais plus d'argent, j'achèterais une voiture.' What is the error?",
      options:{A:"'Achèterais' should be replaced with the future tense 'achètera'.",B:"'Une voiture' requires the definite article: 'la voiture'.",C:"'Si' clauses take the imparfait, not the conditionnel: 'Si j'avais plus d'argent...'",D:"No error — the sentence is grammatically correct."},
      correct:"C",tag:"MC-FR-05",
      scaffold:"Conditional sentences: Si + imparfait → conditionnel présent (hypothetical/unreal present). Si + plus-que-parfait → conditionnel passé (hypothetical past: 'if I had had..., I would have...'). NEVER: si + conditionnel. NEVER: si + futur (in hypothetical clauses). Real/open conditions: Si + présent → futur ('if I have time, I will come'). The 'si + conditional' error is reported in almost every Edexcel examiner report.",
      reforge:{stem:"Which is the only correct conditional sentence?",options:{A:"Si j'aurais su, je serais venu.",B:"Si j'avais su, je serais venu. — Si + plus-que-parfait → conditionnel passé (correct past hypothetical).",C:"Si je saurais, je viendrais.",D:"Si j'ai su, je serais venu."},correct:"B"}
    },
    {
      id:"FR-06",stem:"A student's translation contains 'beaucoup de les étudiants'. What is the error?",
      options:{A:"'Beaucoup' should be 'très' before a noun.",B:"'Étudiants' should be 'étudiant'.",C:"No error.",D:"After expressions of quantity, use 'de/d'' + noun with no article: 'beaucoup d'étudiants'"},
      correct:"D",tag:"MC-FR-06",
      scaffold:"Expressions of quantity take 'de/d'' + noun (no article): beaucoup de, peu de, assez de, trop de, tant de. Exception: 'la plupart des' retains the article. Contraction rules: de + le = du; de + les = des. But after quantity expressions the article is dropped entirely — 'beaucoup d'étudiants', not 'beaucoup des étudiants'.",
      reforge:{stem:"Which is correct for 'most students'?",options:{A:"La plupart d'étudiants",B:"La plupart des étudiants — 'la plupart' is an exception: it retains the definite article.",C:"Beaucoup des étudiants",D:"La majorité d'étudiants"},correct:"B"}
    },
    {
      id:"FR-07",stem:"'Malgré il pleuvait, nous sommes sortis.' What is wrong?",
      options:{A:"'Malgré' (despite) must be followed by a noun or pronoun, not a conjugated verb",B:"'Sommes sortis' should use 'avons'.",C:"'Il pleuvait' is the wrong tense.",D:"No error."},
      correct:"A",tag:"MC-FR-07",
      scaffold:"Prepositions followed by nouns (not clauses): malgré + noun. Conjunctions followed by subjunctive clauses: bien que, quoique, pour que, avant que, à moins que. Mixing up 'malgré' (preposition + noun) and 'bien que' (conjunction + subjunctive) is a common A Level error that examiners flag.",
      reforge:{stem:"Which is correct for 'despite being tired'?",options:{A:"Bien qu'être fatigué",B:"Malgré sa fatigue — 'malgré' + noun phrase, not a clause.",C:"Malgré il était fatigué",D:"Bien qu'il est fatigué"},correct:"B"}
    },
    {
      id:"FR-08",stem:"An Edexcel A Level French reading question asks students to identify a writer's attitude. What does a top-band response require beyond identifying the attitude as 'positive' or 'negative'?",
      options:{A:"A translation of every sentence in the passage.",B:"Specific textual evidence (a word or phrase from the passage) linked to an explanation of its connotation or effect",C:"A personal opinion about whether the attitude is justified.",D:"Use of literary terminology such as metaphor or simile."},
      correct:"B",tag:"MC-FR-08",
      scaffold:"Edexcel 9FR0 reading papers: identifying attitude questions require AO2 (understanding and interpretation). Top marks: name the attitude + quote the specific language evidence + explain the connotation. Lower marks: 'The writer is negative.' Inference questions ('What does the writer imply?') require going beyond surface meaning.",
      reforge:{stem:"A student answers: 'The writer is pessimistic about the future.' How should this be improved to access higher marks?",options:{A:"Mention the length of the passage.",B:"Add textual evidence and explain the connotation — e.g. 'The writer uses the word «sans espoir» (hopeless), suggesting profound pessimism about any possibility of improvement.'",C:"Translate the whole paragraph instead.",D:"Compare it to another text."},correct:"B"}
    }
  ]

BANKS["RS-2"] = {
  label: "Religion & Ethics — Applied",
  color: "#065f46",
  questions: [
    {
      id:"RS-09",stem:"Fletcher's Situation Ethics claims there is only one intrinsically good thing. What is it?",
      options:{A:"Agape — selfless, unconditional love; every rule can be set aside if love is better served.",B:"Happiness — the greatest pleasure for the greatest number of people.",C:"Obedience to God's revealed commands in scripture.",D:"Virtue — a settled disposition of good character built through habit."},
      correct:"A",tag:"MC-RS-09",
      scaffold:"Fletcher: agape is the sole intrinsic good; everything else is instrumentally good. Four working principles: pragmatism, relativism, positivism, personalism. Six propositions include: love is the only norm, love and justice are the same, love wills the neighbour's good. Key criticism: how do we predict which act is most loving? It collapses into a form of act utilitarianism with love replacing pleasure.",
      reforge:{stem:"A critic says Situation Ethics is 'really just utilitarianism with love substituted for happiness.' What feature of Fletcher's theory does this criticism target?",options:{A:"Its reliance on scripture as the final authority.",B:"Its consequentialist structure — judging each act by predicted outcomes.",C:"Its claim that rules can never be broken.",D:"Its focus on building character over time."},correct:"B"}
    },
    {
      id:"RS-10",stem:"The Euthyphro dilemma poses a problem for Divine Command Theory. Which pair of options captures the dilemma?",
      options:{A:"Either God exists or morality exists — Plato argues the two are mutually exclusive.",B:"Either scripture is literal or metaphorical — the dilemma concerns biblical interpretation.",C:"Either things are good independently of God (limiting his authority)",D:"Either humans are free or God is omniscient — the classic free will versus foreknowledge problem."},
      correct:"C",tag:"MC-RS-10",
      scaffold:"From Plato's Euthyphro. Horn 1: if God commands what is already good, goodness exists independently and God is not the source of morality. Horn 2: if things are good merely because God commands them, morality is arbitrary — cruelty could have been good had God commanded it. Responses: the 'third way' (God's nature IS goodness — Aquinas), or biting the bullet on divine sovereignty (Ockham).",
      reforge:{stem:"Aquinas's response to the Euthyphro dilemma argues that:",options:{A:"Morality is entirely independent of God.",B:"God's commands are arbitrary but must still be obeyed.",C:"The dilemma is unanswerable and Divine Command Theory fails.",D:"The dilemma is false — goodness is neither prior to God nor arbitrary, because God's own unchanging nature is the standard of goodness."},correct:"D"}
    },
    {
      id:"RS-11",stem:"A student writes: 'Aristotle's golden mean tells us always to act moderately.' Why is this inaccurate?",
      options:{A:"Aristotle rejected the idea of a mean entirely — that virtue concept belongs to Plato.",B:"The golden mean applies only to intellectual virtues such as wisdom, not moral ones.",C:"The mean is arithmetic — the exact midpoint between the two extreme vices in every case.",D:"The mean is relative to the person and situation"},
      correct:"D",tag:"MC-RS-11",
      scaffold:"The doctrine of the mean: virtue lies between excess and deficiency (courage between rashness and cowardice), but it is the mean 'relative to us', judged by practical wisdom (phronesis), not a mathematical midpoint. Some actions are intrinsically wrong with no mean. Virtue is acquired by habituation and aims at eudaimonia (flourishing). Common exam error: treating the mean as 'always be moderate'.",
      reforge:{stem:"For Aristotle, a person becomes courageous primarily by:",options:{A:"Repeatedly performing courageous acts until courage becomes a settled disposition of character.",B:"Learning the correct definition of courage.",C:"Following the commands of a moral authority.",D:"Calculating which acts produce the best outcomes."},correct:"A"}
    },
    {
      id:"RS-12",stem:"In the euthanasia debate, the 'sanctity of life' and 'quality of life' positions differ fundamentally on:",
      options:{A:"Whether pain relief should ever be given to patients who are near death.",B:"Whether life has intrinsic value regardless of condition, or whether its value depends on",C:"Whether euthanasia should be administered by doctors or authorised family members.",D:"Whether the law should formally distinguish active from passive euthanasia in sentencing."},
      correct:"B",tag:"MC-RS-12",
      scaffold:"Sanctity of life (religious roots): life is a sacred gift from God, intrinsically valuable, not ours to end — supported by imago dei and 'do not kill'. Quality of life: value depends on the person's experience — autonomy, suffering, capacity for meaningful life (Singer, Glover). Middle positions: doctrine of double effect (pain relief that foreseeably shortens life), ordinary vs extraordinary means. Strong answers apply BOTH lenses to the same case.",
      reforge:{stem:"The doctrine of double effect permits a doctor to give life-shortening pain relief when:",options:{A:"The patient has signed a consent form requesting death.",B:"The family agrees that death is in the patient's interests.",C:"The intention is to relieve pain, death is a foreseen but unintended side effect, and the relief is proportionate to the suffering.",D:"The patient has fewer than six months to live."},correct:"C"}
    },
    {
      id:"RS-13",stem:"Ayer's emotivism claims that moral statements such as 'stealing is wrong' are:",
      options:{A:"True or false depending on the consequences of stealing.",B:"Commands issued by society to control behaviour.",C:"Expressions of emotion — closer to 'boo to stealing!' than to factual claims",D:"Statements about God's will expressed in secular language."},
      correct:"C",tag:"MC-RS-13",
      scaffold:"Ayer (Language, Truth and Logic): the verification principle — meaningful statements are either analytic or empirically verifiable. Moral claims are neither, so they lack factual meaning; they express approval/disapproval ('boo/hurrah theory'). Criticisms: the verification principle fails its own test; moral disagreement seems to be about more than feelings (we argue with reasons); Hare's prescriptivism refines this — moral language also prescribes universalisable action.",
      reforge:{stem:"A standard objection to the verification principle underlying emotivism is that:",options:{A:"The principle itself is neither analytic nor empirically verifiable, so by its own standard it is meaningless.",B:"It makes all scientific claims meaningless.",C:"It proves that moral statements are objectively true.",D:"It was rejected by Ayer before he published it."},correct:"A"}
    },
    {
      id:"RS-14",stem:"Moore's 'naturalistic fallacy' in meta-ethics is the error of:",
      options:{A:"The naturalistic fallacy is the belief that whatever occurs in nature is morally good.",B:"Defining 'good' in natural terms (e.g. pleasure or survival) fails",C:"The naturalistic fallacy is deriving natural laws directly from moral principles.",D:"The naturalistic fallacy claims moral facts do not exist in any objective sense."},
      correct:"B",tag:"MC-RS-14",
      scaffold:"Moore (Principia Ethica): 'good' cannot be defined in natural terms. Open question argument: for any proposed definition ('good = pleasant'), it remains an open, sensible question whether that thing is good — so the definition fails. Related but distinct: Hume's is/ought gap (cannot derive prescriptive conclusions from descriptive premises alone). Students often conflate the two — Moore targets definitions; Hume targets inferences.",
      reforge:{stem:"Hume's is/ought gap differs from Moore's naturalistic fallacy because Hume's point concerns:",options:{A:"The definition of the word 'good'.",B:"Whether goodness is a natural property.",C:"The existence of God as a source of morality.",D:"The logical move from descriptive premises (what is) to prescriptive conclusions (what ought to be) — no valid inference connects them without a moral premise."},correct:"D"}
    },
    {
      id:"RS-15",stem:"Hard determinism holds that free will is an illusion because every choice is fully caused by prior events. What follows for moral responsibility on this view?",
      options:{A:"Moral responsibility collapses under hard determinism — praise and blame lose their desert-based justification.",B:"People remain fully responsible because they subjectively experience their choices as free.",C:"Only criminals lose moral responsibility under determinism; law-abiding people are exempt.",D:"Responsibility transfers entirely from individuals to God as the first cause of all events."},
      correct:"A",tag:"MC-RS-15",
      scaffold:"Hard determinism (e.g. d'Holbach; Clarence Darrow's legal defences): universal causation + incompatibilism → no free will → no desert-based responsibility. Libertarianism: genuine agent causation exists (Kant's noumenal self; conscience as evidence). Compatibilism (Hume, Ayer): freedom means acting according to your own desires without external constraint — free will and determinism are compatible. Exam trap: treating compatibilism as a weak halfway house rather than a distinct redefinition of freedom.",
      reforge:{stem:"A compatibilist would say a person acts freely when:",options:{A:"Their action has no prior cause whatsoever.",B:"They act on their own desires without external coercion — even if those desires were themselves causally determined.",C:"They could have done otherwise in an absolute, uncaused sense.",D:"A random quantum event initiates their decision."},correct:"B"}
    },
    {
      id:"RS-16",stem:"An Eduqas evaluation question asks: 'Ethical theories are of no practical use in moral decision-making.' Discuss. What does a top-band response require?",
      options:{A:"A description of every ethical theory on the specification, listed in order.",B:"A firm personal opinion stated clearly in the introduction and repeated in the conclusion.",C:"Sustained evaluation of the claim against specific theories and cases",D:"Equal paragraph lengths for each side, presenting both views without taking any position."},
      correct:"C",tag:"MC-RS-16",
      scaffold:"AO2 band descriptors reward: sustained argument, evaluation of the actual claim (not just describing theories), use of scholarly views as tools of argument, counter-argument handled rather than listed, and a conclusion that follows from the reasoning. Common failure: 'juxtaposition' — describing one view, then another, without ever weighing them. Phrases that signal evaluation: 'this succeeds only if...', 'the force of this depends on...', 'a stronger objection is...'.",
      reforge:{stem:"Which sentence shows genuine AO2 evaluation rather than AO1 description?",options:{A:"Kant believed we should act only on universalisable maxims.",B:"Utilitarianism was developed by Bentham and refined by Mill.",C:"There are many different ethical theories that people use.",D:"Kant's refusal to permit lying even to save a life suggests the theory prizes consistency over the very persons it claims to respect — a tension Kantians must resolve."},correct:"D"}
    }
  ]
};

BANKS["HSC-2"] = {
  label: "Care Values, Communication & Safeguarding",
  color: "#be185d",
  questions: [
    {
      id:"HSC-09",stem:"A care worker says to a distressed resident: 'I understand this feels overwhelming for you right now.' Their colleague says: 'You poor thing, how awful.' What distinction do these responses illustrate?",
      options:{A:"Empathy means reflecting the person's feelings from their perspective; sympathy means feeling sorry for them from the outside.",B:"Active listening versus passive listening — one involves full attention, the other does not.",C:"Formal versus informal communication registers used in professional and personal settings.",D:"Verbal versus non-verbal communication — words compared to body language and gesture."},
      correct:"A",tag:"MC-HSC-09",
      scaffold:"Empathy: entering the person's frame of reference, communicating understanding of THEIR experience — central to person-centred practice (Rogers). Sympathy: observer's own emotional reaction, which can feel patronising and positions the person as pitiable. Exam application: link empathy to outcomes — trust, disclosure, emotional wellbeing (PIES). Higher bands name the value AND show its impact on the individual.",
      reforge:{stem:"Why is empathy generally preferred over sympathy in professional care relationships?",options:{A:"Empathy takes less time to express during busy shifts.",B:"Sympathy is illegal in regulated care settings.",C:"Empathy maintains the person's dignity and supports trust, while sympathy can feel patronising and creates distance.",D:"Empathy avoids any emotional involvement with the individual."},correct:"C"}
    },
    {
      id:"HSC-10",stem:"A young person discloses to a support worker that they are being harmed at home, then says 'promise you won't tell anyone.' What is the correct professional response to this request?",
      options:{A:"Promise confidentiality — trust is the foundation of any caring relationship.",B:"Explain honestly that this cannot be kept secret: safety comes first",C:"Refuse to listen further until the designated safeguarding lead is physically present.",D:"Tell the young person they must report it directly to the police themselves."},
      correct:"B",tag:"MC-HSC-10",
      scaffold:"Confidentiality is a core care value but is NOT absolute: it can and must be breached where there is risk of significant harm, especially safeguarding concerns. Best practice: never promise secrecy; be honest about what must happen next; share on a need-to-know basis; record accurately; follow the setting's safeguarding procedure and report to the designated safeguarding lead. Exam trap: treating confidentiality as an unbreakable rule.",
      reforge:{stem:"The principle governing who information is shared with after a safeguarding disclosure is:",options:{A:"Whole-team transparency — everyone in the setting should be informed.",B:"Family first — parents must always be told immediately.",C:"Manager's discretion — the manager decides based on convenience.",D:"Need-to-know — information is shared only with those whose role requires it to keep the person safe."},correct:"D"}
    },
    {
      id:"HSC-11",stem:"Which behaviour best demonstrates active listening in a one-to-one with a service user?",
      options:{A:"Maintaining steady eye contact while internally planning what you will say next.",B:"Taking comprehensive written notes throughout so every word is captured accurately.",C:"Paraphrasing, reflecting feelings, open body language, and allowing silences",D:"Nodding continuously and verbally agreeing with every statement the person makes."},
      correct:"C",tag:"MC-HSC-11",
      scaffold:"Active listening (SOLER: Squarely face, Open posture, Lean in, Eye contact, Relax): paraphrasing, reflecting, summarising, minimal encouragers, tolerating silence, clarifying questions. Constant note-taking breaks connection; constant agreement is not listening. Link to communication cycle (Argyle): message sent → received → decoded → feedback. Application marks come from linking the technique to the individual's needs — e.g. slower pace for someone with dementia.",
      reforge:{stem:"Argyle's communication cycle suggests communication fails most often when:",options:{A:"A message is decoded differently from how it was intended and no feedback loop exists to catch the misunderstanding.",B:"Two people speak different first languages.",C:"The message is delivered too slowly.",D:"Written communication is used instead of spoken."},correct:"A"}
    },
    {
      id:"HSC-12",stem:"A consultant tells a patient: 'Your MI presented atypically, so we're starting dual antiplatelet therapy post-PCI.' Which barrier to communication does this illustrate, and what is the appropriate adjustment?",
      options:{A:"A physical barrier — the solution is a quieter room.",B:"Jargon — technical language excludes the patient",C:"An emotional barrier — the solution is postponing the conversation.",D:"A cultural barrier — the solution is an interpreter."},
      correct:"B",tag:"MC-HSC-12",
      scaffold:"Barriers: language/jargon, sensory impairment, environmental (noise, privacy), emotional (fear, distress), cultural, cognitive (dementia, learning disability). Each barrier has matched adjustments: plain language + teach-back for jargon; hearing loops/BSL for sensory; advocacy and easy-read for cognitive. Top-band answers name barrier + specific adjustment + impact on the individual (empowerment, informed consent, reduced anxiety).",
      reforge:{stem:"The 'teach-back' method checks understanding by:",options:{A:"Testing the patient with a written quiz after the appointment.",B:"Having a relative confirm they understood on the patient's behalf.",C:"Asking the person to explain in their own words what they have understood, so gaps can be corrected immediately.",D:"Repeating the same explanation twice at a slower speed."},correct:"C"}

    {
      id:"HSC-13",stem:"A care assistant notices a colleague roughly handling residents and mocking them. Reporting this concern through the organisation's procedures is known as:",
      options:{A:"Grievance — a complaint about your own employment terms.",B:"Mediation — resolving the dispute informally between colleagues.",C:"Supervision — discussing practice with your line manager at a scheduled meeting.",D:"Whistleblowing — raising concerns about wrongdoing or poor practice that puts others at risk"},
      correct:"D",tag:"MC-HSC-13",
      scaffold:"Whistleblowing: reporting concerns about danger, illegality, or poor practice affecting others — protected disclosure. Distinct from a grievance (about your own situation). Route: line manager or designated safeguarding lead first, escalating to regulator if unaddressed. Duty of care requires acting — witnessing and not reporting is itself a failure. Exam link: connect to the individual impact (abuse prevented, dignity protected) and to organisational culture.",
      reforge:{stem:"Why does a duty of care mean the care assistant MUST act rather than stay silent?",options:{A:"Staying silent while aware of harm makes the observer complicit in the risk to residents — duty of care extends to acting on concerns, not just personal conduct.",B:"Because colleagues who report receive a financial reward.",C:"Because all conversations in care homes are recorded.",D:"Because the colleague would eventually report themselves."},correct:"A"}
    },
    {
      id:"HSC-14",stem:"A day centre gives every attendee identical printed activity schedules. A visually impaired attendee cannot read theirs. The manager says 'we treat everyone the same here.' What principle is being misunderstood?",
      options:{A:"Confidentiality — printed activity schedules should not be shared with all attendees.",B:"Equality means equal access through different provision, not identical treatment",C:"Safeguarding — printed schedules create a data protection risk for vulnerable adults.",D:"Independence — attendees should create their own personalised activity schedules."},
      correct:"B",tag:"MC-HSC-14",
      scaffold:"Equality vs uniformity: treating people 'the same' can produce unequal outcomes when needs differ. Reasonable adjustments give equal ACCESS. Equity: adjusting provision to need. Link to values: dignity, inclusion, anti-discriminatory practice. Strong answers use the concrete adjustment (large print, braille, audio, digital screen reader) and its impact: participation, independence, self-esteem.",
      reforge:{stem:"Which scenario shows equitable rather than merely identical provision?",options:{A:"All residents receive the same standard meal regardless of dietary needs.",B:"Every patient is allocated exactly ten minutes with the GP.",C:"All notices are displayed at the same height in the same font.",D:"A hospital provides interpreters for patients who need them while others attend appointments unsupported — different provision, equal access to care."},correct:"D"}
    },
    {
      id:"HSC-15",stem:"An elderly man with capacity refuses medication that his family insists he should take. Care staff continue offering information but respect his refusal. Which two principles are being balanced?",
      options:{A:"Empowerment and autonomy (his right to decide) balanced against duty of care (staff's obligation to inform and review).",B:"Confidentiality against data protection — both legal frameworks govern care decisions.",C:"Safeguarding against whistleblowing — the two overlap in this scenario.",D:"Equality against diversity — the care home must treat all residents consistently."},
      correct:"A",tag:"MC-HSC-15",
      scaffold:"A person with capacity has the right to refuse treatment even where refusal seems unwise — autonomy is not conditional on making the choice professionals prefer. Duty of care is met by informing, documenting, reviewing, and keeping the offer open — not by overriding. Family wishes do not override the individual's decision. Capacity is decision-specific and assumed unless assessed otherwise. Classic exam scenario: distinguish respecting refusal from neglect.",
      reforge:{stem:"If the same man were assessed as LACKING capacity for this decision, what changes?",options:{A:"Nothing — refusal is always final regardless of capacity.",B:"Decisions would be made in his best interests, involving him as far as possible, choosing the least restrictive option, and consulting those who know him.",C:"His family would gain the automatic legal right to decide everything.",D:"Staff could administer any treatment without consultation."},correct:"B"}
    },
    {
      id:"HSC-16",stem:"An exam scenario describes 'Priya, a support worker, helping Tomas, who has early-stage dementia, choose his own clothes each morning even though dressing him would be quicker.' The question asks you to explain the care value shown. Which answer earns application marks?",
      options:{A:"Priya is showing a care value, which is important in health and social care settings.",B:"The care value shown is independence, which all workers must demonstrate in practice.",C:"Priya promotes Tomas's independence by supporting choice rather than doing it for him",D:"Priya is being kind, which makes Tomas happy and reflects good professional conduct."},
      correct:"C",tag:"MC-HSC-16",
      scaffold:"Application formula: name the value → show it in THIS scenario (use the names, quote the action) → explain the impact on THIS individual (link to PIES or condition). Generic answers ('this is important in care') score AO1 only. The dementia link matters: retaining skills and autonomy slows learned helplessness and supports identity. This structure applies to every scenario question in the paper.",

      reforge:{stem:"'Elle attend le bus depuis vingt minutes.' The correct translation is:",options:{A:"She waited for the bus for twenty minutes.",B:"She waits for the bus every twenty minutes.",C:"She has been waiting for the bus for twenty minutes — present tense + depuis for a continuing action.",D:"She will wait twenty minutes for the bus."},correct:"C"}

      reforge:{stem:"'After arriving (f.), she called her mother.' Which is correct?",options:{A:"Après arriver, elle a appelé sa mère.",B:"Après être arrivée, elle a appelé sa mère — être verb, past participle agrees with the feminine subject.",C:"Après avoir arrivé, elle a appelé sa mère.",D:"Après arrivée, elle a appelé sa mère."},correct:"B"}

      correct:"A",tag:"MC-DE-12",

    {
      id:"DE-13",stem:"'Die Brücke wird gebaut' vs 'Die Brücke ist gebaut'. What is the difference in meaning?",

      reforge:{stem:"A student writes: 'Owen uses the simile \"like a devil's sick of sin\" to describe the gas victim — this shows the man is in terrible pain and looks frightening.' What analysis would earn Band 4?",options:{A:"The student should quote more of the poem to support their point.",B:"The student needs to unpack the theological paradox of the simile: a devil who is sick of sin has exhausted the very substance of its identity — the comparison positions the victim beyond even hellish suffering, in a register that transcends pain into existential horror. The inversion (devil = the creature defined by sin, now repelled by it) enacts the war's moral inversion: the battlefield has created suffering so extreme it sickens the agent of evil. Owen implicates the reader ('you') who has been complicit in the lie of dulce et decorum est, making the simile an accusation as much as a description.",C:"The student should find a critic who has written about this simile.",D:"The student should explain that Owen was a soldier who experienced gas attacks."},correct:"B"}

      reforge:{stem:"A student asked to 'explore how Shakespeare presents power in Othello' writes a detailed close reading of Iago's language in Act 1. What is missing?",options:{A:"The student needs to write about more scenes from the play.",B:"The student has analysed one character's use of language but 'explore' requires multiple perspectives on power — how Brabantio's racial power, Othello's military authority, Desdemona's social constraints, and the Senate's institutional power all create a complex web. A single character's language cannot constitute exploration of how power is 'presented' across the text. The response also needs to address what different readers/audiences — Jacobean and contemporary — might make of Shakespeare's construction of these power dynamics.",C:"The student needs to include a named critic's view on Iago.",D:"The student should focus on Othello's language rather than Iago's since he is the title character."},correct:"B"}

      stem:"A student's AO1 is consistently praised but they plateau at Band 3. Their responses are well-written and accurate but examiners note: 'clearly knows the text but does not offer a personal, evaluative response.' What are they missing?",
      options:{
        A:"They need to include more quotations from the text.",
        B:"They are meeting AO1 (accurate, well-written expression with terminology) and AO2 (technique analysis) but not AO5 — the requirement for an informed personal response that goes beyond describing what the writer does to evaluating its effectiveness, exploring alternative interpretations, or challenging the text's assumptions. Band 4 requires the student's voice to emerge as a reader who has formed views, not just as an analyst reporting findings.",
        C:"They need to write longer responses — Band 3 responses are usually too short.",
        D:"They should include more biographical context about the author."
      },
      correct:"B",tag:"MC-ENG-14",
      scaffold:"AO5 (personal response / creativity) is the most under-taught assessment objective. Students are often told not to write 'I think' or 'In my opinion' — which they interpret as meaning personal response is penalised. In fact, AO5 requires an evaluative, independent, argued position — but expressed through the analytical voice rather than first-person assertion. Signs of strong AO5: (1) The student weighs alternative interpretations ('while some readers might read X as Y, the structural positioning of Z suggests...'); (2) The student evaluates effectiveness ('the metaphor is particularly effective because...'); (3) The student challenges the text or considers the limits of a reading ('this reading is complicated by...'); (4) The student brings a distinctive angle that could only come from their engagement with the text. AO5 is the difference between a response that any well-trained student could produce and one that shows this student has genuinely thought about this text. Examiner language: 'engaged', 'convincing', 'independent', 'evaluative', 'flair'.",
      reforge:{stem:"Which of these sentences demonstrates AO5 most effectively?",options:{A:"'The writer uses symbolism to show the theme of isolation.'",B:"'While the lighthouse functions straightforwardly as a symbol of Woolf's own unresolved grief for her mother, reading it only biographically risks reducing the novel's formal complexity to autobiography — the lighthouse is more productively read as a figure for the impossibility of arrival: what draws us forward always recedes as we approach, which is Woolf's larger claim about desire, completion, and the nature of time itself.'",C:"'I think the lighthouse represents hope because it guides ships to safety.'",D:"'The lighthouse is significant throughout the novel and appears at key moments.'"},correct:"B"}
    },
    {
      id:"ENG-15",
      stem:"A student is asked to write about language in an unseen prose extract for AQA English Language & Literature. They begin: 'This extract uses many different language techniques including metaphor, alliteration, and personification.' What is wrong with this opening?",
      options:{
        A:"The student has identified the wrong techniques — they should focus on syntax.",
        B:"The opening catalogues techniques without analysis — it tells the examiner what devices are present rather than demonstrating any understanding of how they create meaning. A list of techniques is not analysis. The student should open with an analytical claim about the extract's overall effect or purpose, then use specific techniques as evidence for that claim.",
        C:"The student should not identify techniques at the beginning — save them for the body paragraphs.",
        D:"The student is correct to establish the techniques present before analysing them."
      },
      correct:"B",tag:"MC-ENG-15",
      scaffold:"The technique-catalogue opening ('this text uses X, Y, and Z') is the single most common structural error in unseen language analysis. It signals to the examiner that the student is listing rather than analysing — they have spotted devices but haven't yet made a claim about what the text does. Strong unseen analysis starts with an interpretive claim: what is the extract's overall effect, purpose, or dominant impression? Then individual techniques are used as evidence for that claim. Structure: [Interpretive claim about the whole extract] → [First technique + specific example + how it constructs that effect] → [Second technique + how it develops or complicates the effect] → [Structural/form observation about how the extract is organised]. AQA 7707 mark scheme: 'methods identified without analysis of effect' = Band 1-2. 'Detailed analysis of how methods create meanings and effects' = Band 4-5.",
      reforge:{stem:"Rewrite this opening to earn Band 4 marks: 'This extract uses personification of the sea, short sentences, and direct address to the reader.'",options:{A:"'This extract is about the sea and uses many techniques to describe it effectively.'",B:"'The extract constructs the sea as an active, predatory force through sustained personification — the ocean does not simply exist but watches, pursues, and threatens. This anthropomorphisation is intensified by the staccato rhythm of short declarative sentences, which enact the sudden violence of waves, and by the direct address ('you'), which implicates the reader in the speaker's vulnerability rather than positioning them as a safe observer.'",C:"'The writer uses personification because it makes the sea seem alive and threatening.'",D:"'The techniques used in this extract include personification, short sentences, and direct address, which are all effective.'"},correct:"B"}
    },
    {
      id:"ENG-16",
      stem:"A student's essay on a poem earns high AO2 marks but their teacher notes: 'You analyse lines in isolation — you need to address form and structure.' What does this feedback mean in practice?",
      options:{
        A:"The student needs to write about the rhyme scheme and count the syllables in each line.",
        B:"The student is doing close analysis of individual words and phrases (micro-level AO2) but not addressing how the poem is organised at the macro level — how the stanza structure shapes the argument, how enjambment and caesura control pace and emphasis, where the poem's volta (turn) occurs and what it enacts, how the ending relates to the beginning. Form and structure analysis asks: why is this poem shaped this way, and what does the architecture of the whole contribute to meaning?",
        C:"The student should write about the poet's life and why they chose this form.",
        D:"The student needs to compare the poem's form to other poems in the collection."
      },
      correct:"B",tag:"MC-ENG-16",
      scaffold:"Form and structure are consistently under-addressed in AO2 responses. Students tend to work line-by-line through quotations (micro-analysis) without stepping back to ask how the poem's overall architecture contributes to meaning. Key form and structure questions: (1) Stanza structure — are stanzas regular or irregular? Does regularity create control/constraint or does fragmentation enact psychological disintegration? (2) Enjambment vs end-stopped lines — does meaning spill across line breaks (creating momentum, connection, breathlessness) or is each line contained (creating finality, separation, emphasis)? (3) Caesura — where does the poem pause mid-line and why? Does the pause enact hesitation, contrast, shock? (4) Volta — where does the poem turn? What does the turn enact? (5) Opening and closing — how does the ending respond to or subvert the opening? (6) Form choices — sonnet, free verse, dramatic monologue — what does the chosen form contribute that another form could not? AO2 mark: micro-analysis without macro-structure = Band 3 ceiling.",
      reforge:{stem:"A student analyses Duffy's 'War Photographer' line by line but doesn't mention that the poem is four regular sestets with an irregular final stanza. Why does this omission matter?",options:{A:"It doesn't — the quality of the language analysis is what earns marks.",B:"The structural observation is analytically significant: the three regular sestets enact the photographer's routine, disciplined work — developing images, cataloguing atrocities — while the final stanza's rhythmic disruption mirrors the breakdown of that professional distance as the images emerge. The form itself enacts the poem's argument: order cannot contain the disorder of war. Missing this means the student has analysed the trees while missing the shape of the forest.",C:"The student should mention the form briefly as a separate paragraph.",D:"Duffy's form choices are less important than her word choices."},correct:"B"}
    }
  ]

BANKS["ENG-TERM-1"] = {
