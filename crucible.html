<title>Forge — The Crucible</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Sora:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--coal:#141210;--panel:#211E1B;--panel-2:#2A2622;--line:#3A342E;--ember:#FF6B2C;--hot:#FFC93C;--slate:#B8B4AD;--white:#F5F1EA;--good:#7FD98A;--bad:#FF5A5A}
[data-theme="light"]{--coal:#FAFAF8;--panel:#FFFFFF;--panel-2:#F3F2EF;--line:#E0DDD8;--ember:#E5550F;--hot:#C88500;--slate:#6B6660;--white:#1A1816;--good:#1B8C2A;--bad:#D42D2D}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--coal);color:var(--slate);font-family:'Sora',sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;color:var(--white);line-height:1.1;letter-spacing:-.015em}
.mono{font-family:'JetBrains Mono',monospace}
.wrap{max-width:680px;margin:0 auto;padding:28px 20px}
.tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ember)}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;color:var(--white);text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:28px}
.logo .spark{width:9px;height:9px;background:linear-gradient(135deg,var(--hot),var(--ember));border-radius:2px;transform:rotate(45deg);box-shadow:0 0 10px rgba(255,107,44,.7)}
.theme-toggle{background:var(--panel);border:1px solid var(--line);color:var(--slate);font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer;position:fixed;top:20px;right:20px;z-index:99}
.theme-toggle:hover{color:var(--white);border-color:var(--ember)}

/* join */
.join-input{width:100%;padding:12px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--white);font-family:'Sora',sans-serif;font-size:15px;margin-bottom:14px}
.join-input:focus{outline:none;border-color:var(--ember)}
.join-input::placeholder{color:#7A756E}
.join-btn{width:100%;padding:13px;border-radius:9px;background:var(--ember);color:#fff;border:none;font-family:'Sora',sans-serif;font-weight:600;font-size:15px;cursor:pointer}
.join-btn:hover{background:var(--hot)}
.join-btn:disabled{opacity:.5;cursor:wait}
.join-err{color:var(--bad);font-size:13px;margin-top:10px;display:none}
.center{text-align:center}
.back-btn{background:none;border:none;cursor:pointer;font-size:13px;color:#8A857E;font-family:'Sora',sans-serif;margin-bottom:16px;padding:0;display:block}
.back-btn:hover{color:var(--white)}

/* subject/bank picker */
.subject-list,.bank-list{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.pick-btn{padding:16px 18px;border-radius:10px;border:1.5px solid var(--line);background:var(--panel);cursor:pointer;text-align:left;font-family:'Sora',sans-serif;transition:border-color .15s}
.pick-btn:hover{border-color:var(--ember)}
.pick-btn h3{font-size:16px;color:var(--white);margin-bottom:2px}
.pick-btn .sub{font-size:12px;color:#8A857E}

/* timer ring */
.timer-wrap{position:relative;width:120px;height:120px;margin:0 auto 20px}
.timer-svg{transform:rotate(-90deg)}
.timer-bg{fill:none;stroke:var(--line);stroke-width:6}
.timer-ring{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .5s linear,stroke .5s}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;color:var(--white)}
.timer-text.urgent{color:var(--bad)}

/* progress bar */
.progress-bar{height:3px;background:var(--line);border-radius:2px;margin-bottom:20px}
.progress-fill{height:3px;border-radius:2px;background:var(--bad);transition:width .3s}

/* question */
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px;color:#8A857E}
.q-id{font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,90,90,.12);color:var(--bad);padding:2px 8px;border-radius:4px}
.stem{font-size:16px;line-height:1.55;color:var(--white);margin-bottom:20px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;border:1.5px solid var(--line);background:var(--panel-2);color:var(--white);cursor:pointer;text-align:left;font-family:'Sora',sans-serif;font-size:15px;line-height:1.45;transition:border-color .15s,background .15s,opacity .15s;width:100%}
.opt:hover:not(.answered){border-color:var(--bad)}
.opt .letter{font-weight:700;min-width:20px;color:#8A857E}
.opt.answered{cursor:default}
.opt.correct{border-color:var(--good);background:rgba(127,217,138,.08)}
.opt.correct .letter{color:var(--good)}
.opt.wrong{border-color:var(--bad);background:rgba(255,90,90,.07)}
.opt.wrong .letter{color:var(--bad)}
.opt.dimmed{opacity:.4}
.no-scaffold{margin-top:14px;padding:12px 14px;border-radius:10px;background:rgba(255,90,90,.06);border:1px solid rgba(255,90,90,.2);font-size:13px;color:var(--slate)}
.no-scaffold b{color:var(--bad)}
.next-btn{margin-top:18px;padding:10px 24px;border-radius:8px;background:var(--bad);color:#fff;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:'Sora',sans-serif;float:right}
.clear{clear:both}
.time-up-banner{margin-top:16px;padding:14px;border-radius:10px;background:rgba(255,90,90,.08);border:1px solid rgba(255,90,90,.3);color:var(--bad);font-weight:600;font-size:14px;text-align:center}

/* results */
.results-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px;text-align:center;margin-bottom:20px;position:relative}
.results-card::before{content:"";position:absolute;inset:-1px;border-radius:16px;padding:1px;background:linear-gradient(160deg,rgba(255,90,90,.5),rgba(255,107,44,.2) 50%,transparent 70%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.big-pct{font-family:'Bricolage Grotesque',sans-serif;font-size:80px;font-weight:900;line-height:1}
.results-detail{font-size:14px;color:var(--slate);margin:8px 0 20px}
.result-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;text-align:left}
.result-row:last-child{border-bottom:none}
.result-icon{font-size:16px;min-width:20px}
.result-info{flex:1;color:var(--white)}
.result-mc{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 7px;border-radius:4px;background:rgba(255,90,90,.12);color:var(--bad)}
.result-mc.correct{background:rgba(127,217,138,.12);color:var(--good)}
.results-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.results-btns button{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:'Sora',sans-serif}
.btn-danger{background:var(--bad);color:#fff}
.btn-ghost{background:var(--panel-2);color:var(--white);border:1px solid var(--line)!important}

[data-theme="light"] .join-btn,[data-theme="light"] .next-btn,[data-theme="light"] .btn-danger{color:#fff}
@media(max-width:600px){.big-pct{font-size:60px}}
[data-theme="light"] .forge-logo-dark{display:none!important}[data-theme="light"] .forge-logo-light{display:inline!important}</style>

      reforge:{stem:"Ball (1994) argued that marketisation benefits middle-class parents because:",options:{A:"League tables are too complicated for working-class parents.",B:"Middle-class parents possess the cultural and economic capital to navigate the system — researching schools, moving near them, appealing admissions — making 'parental choice' a mechanism for reproducing class advantage rather than genuine equality of opportunity.",C:"Working-class parents don't care about education.",D:"All schools are identical so choice is meaningless."},correct:"B"}

      reforge:{stem:"In a 20-mark essay on 'Assess the functionalist view of education,' a top-band answer would:",options:{A:"Only describe functionalist ideas in great detail.",B:"Explain functionalist views (Durkheim, Parsons, Davis & Moore), then evaluate using Marxist, feminist, interactionist, and/or New Right critiques, with evidence, reaching a reasoned conclusion about the strength of the functionalist position.",C:"Reject all perspectives as equally valid.",D:"Focus entirely on research methods."},correct:"B"}

    {
      id:"SD-02",stem:"A rise in wages for baristas increases the cost of producing coffee. On a supply and demand diagram, this causes:",

      correct:"C",tag:"MC-SD-03",
      scaffold:"Equilibrium = where demand and supply curves intersect. At this price: Qd = Qs, no surplus (excess supply) and no shortage (excess demand). Above equilibrium price: surplus → price falls back to equilibrium. Below equilibrium price: shortage → price rises back to equilibrium. The price mechanism automatically moves markets toward equilibrium.",
      reforge:{stem:"A government sets a maximum price (price ceiling) for rent BELOW the equilibrium market rent. What results?",options:{A:"A surplus of housing — too many houses are supplied.",B:"A shortage of housing — at the lower price, quantity demanded exceeds quantity supplied, as landlords supply fewer properties and more people seek them.",C:"No effect — the market adjusts automatically.",D:"Equilibrium is re-established immediately."},correct:"B"}

      correct:"C",tag:"MC-SD-04",

      reforge:{stem:"A firm raises the price of its product by 10% and total revenue rises. This suggests:",options:{A:"Demand is price elastic — quantity fell proportionally more than price rose.",B:"Demand is price inelastic — quantity fell proportionally less than price rose, so the price increase more than offset the fall in quantity sold.",C:"Supply is perfectly inelastic.",D:"The good is an inferior good."},correct:"B"}

      correct:"D",tag:"MC-SD-05",
      scaffold:"Substitutes: goods that can be used in place of each other (butter/margarine, Coke/Pepsi, bus/train). A rise in the price of Good A → consumers switch to Good B → demand for B increases (rightward shift). Complements work oppositely: goods consumed together (cars and petrol) — rise in price of cars → demand for petrol falls. Cross-price elasticity of demand (XED) distinguishes: positive XED = substitutes, negative XED = complements.",
      reforge:{stem:"Petrol and cars are complement goods. If the government imposes a large tax on petrol, raising its price significantly, what happens to the demand for cars?",options:{A:"Demand for cars rises — drivers buy more efficient cars.",B:"Demand for cars falls — as petrol becomes more expensive, the total cost of car ownership rises, reducing the demand for cars (complement effect).",C:"Demand for cars is unaffected — they are different markets.",D:"Supply of cars falls."},correct:"B"}

      reforge:{stem:"PES for oil extracted from the North Sea is low because:",options:{A:"There is too much oil — supply is very elastic.",B:"Extraction requires large fixed capital investment and infrastructure that cannot be rapidly scaled up in response to price rises — making supply inelastic in the short run.",C:"Oil prices are controlled by the government.",D:"North Sea oil is of poor quality."},correct:"B"}

      options:{A:"The mass of neutral atoms.",B:"The colour of light emitted when atoms are heated.",C:"The mass-to-charge ratio (m/z) of positive ions",D:"The electrical charge of electrons in each atom."},
      correct:"C",tag:"MC-CHEM-07",
      scaffold:"Mass spectrometer steps: (1) Vaporise sample. (2) Ionise — high-energy electrons knock electrons off atoms → positive ions. (3) Accelerate through electric field. (4) Deflect in magnetic field — lighter/more charged ions deflect more. (5) Detect — ions hit detector, signal proportional to abundance. x-axis = m/z (mass-to-charge ratio), y-axis = relative abundance. Used to find Ar and identify isotopes.",
      reforge:{stem:"In a mass spectrum of a sample of neon, two peaks appear at m/z = 20 and m/z = 22. What does this tell us?",options:{A:"Neon exists as two different molecules.",B:"Neon has two naturally occurring isotopes — ²⁰Ne and ²²Ne — differing in the number of neutrons. The height of each peak indicates the relative abundance of each isotope.",C:"Neon has lost two electrons in the ionisation stage.",D:"The mass spectrometer is incorrectly calibrated."},correct:"B"}
    },
    {
      id:"CHEM-08",stem:"A student writes: 'Ionic compounds conduct electricity because they contain free electrons.' Why is this wrong?",
      options:{A:"It isn't — ionic compounds do contain free electrons.",B:"Ionic compounds never conduct electricity.",C:"Ionic compounds conduct through electron movement in the solid state only.",D:"Ionic compounds conduct when MOLTEN or in SOLUTION because the ions become free to move an"},
      correct:"D",tag:"MC-CHEM-08",
      scaffold:"Conduction in ionic compounds: solid = no (ions fixed in lattice). Molten or dissolved = yes (ions free to move). Charge carriers = ions (not electrons). Contrast with metals: conduct via delocalised electrons in all states. Contrast with graphite: conducts via delocalised electrons within layers. This distinction — ions vs electrons as charge carriers — is tested frequently.",
      reforge:{stem:"Which correctly explains why metals conduct electricity in the solid state but ionic compounds do not?",options:{A:"Metals have stronger bonds than ionic compounds.",B:"Metals contain a 'sea' of delocalised electrons that can move freely through the lattice in all states. Ionic compounds have no free electrons — in the solid state, ions are fixed and cannot carry charge.",C:"Metals have a higher melting point.",D:"Ionic compounds have more electrons than metals."},correct:"B"}
    }
  ]
};

BANKS["CRIM-1"] = {
  label: "Changing Awareness of Crime",
  color: "#374151",
  questions: [
    {
      id:"CRIM-01",stem:"A student defines 'crime' as 'anything that is morally wrong.' Why is this sociologically imprecise?",
      options:{A:"Crime is an act that violates criminal law and carries formal state sanctions.",B:"crime and immorality are the same thing.",C:"Crime is defined by victims, not the state.",D:"Morality is irrelevant to criminology."},
      correct:"A",tag:"MC-CRIM-01",
      scaffold:"Crime = behaviour that violates criminal law + attracts formal state sanctions. Key points: (1) relative — what counts as crime changes over time (homosexuality was criminalised in the UK until 1967) and across place (cannabis is legal in some US states, illegal in others). (2) Not the same as deviance (violating norms, may be informal) or immorality (violating ethical standards). WJEC expects precise definitional distinctions.",
      reforge:{stem:"Which of the following illustrates that crime is a socially constructed concept?",options:{A:"All societies agree that murder is a crime.",B:"The same act (e.g. possession of cannabis) is a criminal offence in one country but legal and regulated in another — showing that what counts as crime is determined by social and legal context, not by any universal standard.",C:"Crime rates are measured using official statistics.",D:"Criminals are born with genetic predispositions to offend."},correct:"B"}
    },
    {
      id:"CRIM-02",stem:"What does the 'dark figure of crime' refer to?",
      options:{A:"Crime committed during night-time hours that goes unwitnessed.",B:"The dark figure: the gap between actual crime and crime officially recorded.",C:"Crime committed by offenders whose identity is unknown to police.",D:"Violent crime that is especially severe or causes lasting harm."},
      correct:"B",tag:"MC-CRIM-02",
      scaffold:"Dark figure = crime that doesn't appear in official statistics because: victim doesn't report (embarrassment, fear, distrust of police), police don't record it (discretion, administrative decisions), no victim to report (drug offences, white-collar crime). This is why official statistics undercount crime. Victim surveys (e.g. Crime Survey for England and Wales) try to measure the dark figure by asking people directly about their experiences.",
      reforge:{stem:"Which type of crime is MOST likely to contribute to the dark figure, and why?",options:{A:"Murder — because bodies are hard to hide.",B:"Domestic abuse — victims often don't report due to fear of the perpetrator, shame, economic dependence, or lack of confidence that the police will help, meaning much of it never enters official statistics.",C:"Speeding — cameras don't catch everyone.",D:"Shoplifting — easy to detect on CCTV."},correct:"B"}
    },
    {
      id:"CRIM-03",stem:"Which of the following is a limitation of official crime statistics as a measure of crime?",
      options:{A:"They include too much data from victim surveys.",B:"They are updated too frequently to be reliable.",C:"They only measure crimes that are reported to and recorded by the police",D:"They overcount crime because police are motivated to record everything."},
      correct:"C",tag:"MC-CRIM-03",
      scaffold:"OCS limitations: (1) dark figure — much crime unreported. (2) Police discretion — not all reported crimes are recorded (counting rules, targets). (3) Social construction — what gets counted reflects police priorities, not reality. (4) Exclude victimless crimes. Strengths: consistent methodology over time, allow comparisons, free, cover all recorded crimes. WJEC expects balanced evaluation of sources.",
      reforge:{stem:"The Crime Survey for England and Wales (CSEW) is considered to give a more complete picture of crime than official police statistics because:",options:{A:"It only measures violent crime accurately.",B:"It asks a representative sample of the population directly about crimes they have experienced, including those not reported to the police — capturing part of the dark figure that OCS miss.",C:"It is produced by the government so must be accurate.",D:"It includes data from court convictions."},correct:"B"}
    },
    {
      id:"CRIM-04",stem:"A criminologist argues that media representations of crime create a 'moral panic.' By this they mean:",
      options:{A:"The media accurately reflects the true level and distribution of crime in society.",B:"The public feel morally responsible and guilty when they read about crime.",C:"Crime only increases at times when media coverage of crime intensifies.",D:"The media overrepresents certain crimes, creating exaggerated public fear and distorted perception."},
      correct:"D",tag:"MC-CRIM-04",
      scaffold:"Moral panic (Cohen, 1972 — Mods and Rockers): media exaggerates threat → public fear disproportionate to actual risk → demands for action → police/courts respond more harshly → potentially amplifies the problem (deviancy amplification spiral). 'Folk devils' = the group labelled as the threat (e.g. youth gangs, asylum seekers, benefit claimants). Relevant to WJEC Unit 2 on media and crime.",
      reforge:{stem:"Following a moral panic about knife crime, police stop-and-search operations increase significantly, leading to more knife-crime arrests. A criminologist argues this data doesn't prove knife crime increased. Why?",options:{A:"Stop and search is always ineffective.",B:"More searches = more chances to find knives = more arrests. The rise in recorded offences may reflect increased police activity rather than an actual rise in knife crime — this is deviancy amplification, where the response to a moral panic creates evidence that appears to confirm the original panic.",C:"The statistics are deliberately falsified.",D:"Knife crime only occurs in urban areas."},correct:"B"}
    },
    {
      id:"CRIM-05",stem:"Which of the following best describes 'white-collar crime'?",
      options:{A:"Non-violent crime by high-status individuals in the course of their occupation.",B:"Crime committed by people in professional dress or formal business attire.",C:"Any crime that takes place in an office building or corporate environment.",D:"Any crime that does not involve direct physical violence, regardless of status."},
      correct:"A",tag:"MC-CRIM-05",
      scaffold:"Sutherland (1949) coined 'white-collar crime' — crime by the powerful in their professional roles. Examples: financial fraud (Bernie Madoff), corporate manslaughter (Grenfell), tax avoidance/evasion, bribery, insider trading. Under-represented in OCS because: complex, harder to detect, powerful offenders have resources to avoid prosecution, treated more leniently. WJEC links this to inequality and selective law enforcement.",
      reforge:{stem:"White-collar crime is under-represented in official statistics compared to street crime. Which factor MOST explains this?",options:{A:"White-collar crime causes less harm than street crime.",B:"White-collar crime is harder to detect, victims may not know they've been defrauded, perpetrators have legal resources to avoid prosecution, and agencies may lack expertise or motivation to pursue powerful offenders — reflecting selective enforcement.",C:"Police deliberately protect rich offenders.",D:"White-collar crime is legal in most cases."},correct:"B"}
    },
    {
      id:"CRIM-06",stem:"According to strain theory (Merton), crime occurs because:",
      options:{A:"Some people are biologically predisposed to criminality.",B:"Society promotes culturally approved goals (wealth",C:"Criminal values are learned through socialisation in communities.",D:"Inadequate policing allows crime to flourish."},
      correct:"B",tag:"MC-CRIM-06",
      scaffold:"Merton's strain theory: American Dream = everyone can succeed (meritocracy). Reality = working-class and minority groups lack access to education/jobs. Strain = gap between cultural goals and structural means. Adaptations: Conformity (accept both), Innovation (adopt goals, reject means → crime), Ritualism, Retreatism (reject both), Rebellion. Innovation explains property crime among the poor. Evaluation: ignores white-collar crime, gender, doesn't explain why only some 'innovate'.",
      reforge:{stem:"A young person from a deprived area cannot access university due to low income and poor schooling but still wants the material success they see advertised. According to Merton, if they turn to drug dealing, they are adopting which adaptation?",options:{A:"Ritualism — they keep trying through legitimate means.",B:"Innovation — they accept the cultural goal of material success but replace legitimate means (education, employment) with illegitimate ones (drug dealing) due to blocked opportunities.",C:"Retreatism — they give up on both goals and means.",D:"Rebellion — they reject society's goals entirely."},correct:"B"}
    },
    {
      id:"CRIM-07",stem:"A student answers a WJEC Criminology question about causes of crime using only one theory. What is the examiner likely to penalise?",
      options:{A:"one theory is sufficient for any answer.",B:"The student for using a theory at all.",C:"Lack of range and evaluation",D:"Answers that mention sociological theories."},
      correct:"C",tag:"MC-TECH-02",
      scaffold:"WJEC Criminology: assessment requires AO1 (knowledge), AO2 (application), AO3 (analysis/evaluation). Higher bands require considering competing explanations, weighing evidence, and reaching a reasoned conclusion. Single-theory answers are capped. A strong answer might compare strain theory with subcultural theory and biological approaches, noting what each explains and what each fails to account for.",
      reforge:{stem:"'Evaluate biological explanations for criminal behaviour.' A top-band answer would:",options:{A:"Describe Lombroso's theory in great detail.",B:"Explain biological theories (genetics, brain structure, hormones), apply evidence (twin studies, XYY research), then evaluate by comparing with sociological alternatives — noting biological determinism ignores social context and that correlation is not causation.",C:"Argue that biology proves criminals are born, not made.",D:"List all possible causes of crime without evaluating any."},correct:"B"}
    },
    {
      id:"CRIM-08",stem:"Situational crime prevention (SCP) aims to reduce crime by:",
      options:{A:"Rehabilitating offenders through prison education.",B:"Addressing the root social causes of crime such as poverty and inequality.",C:"Increasing police patrol numbers in high-crime areas.",D:"Altering the immediate environment to increase the effort and risk of committing crime whi"},
      correct:"D",tag:"MC-CRIM-08",
      scaffold:"SCP (Clarke, 1980s) based on rational choice theory — offenders make cost-benefit calculations. Reduce opportunity → reduce crime. Techniques: target hardening (locks, safes), increase surveillance (CCTV), reduce anonymity (name badges), deflect offenders (youth clubs). Evaluation: displacement (crime moves elsewhere, not reduced overall), ignores causes, class-based (protects wealthy areas better). Contrast with social/community crime prevention which addresses underlying causes.",
      reforge:{stem:"A criticism of situational crime prevention is that it may cause 'displacement.' By this, critics mean:",options:{A:"CCTV cameras are moved to other locations.",B:"Crime is not eliminated but merely shifted to other locations, times, or types of offence where prevention measures are weaker — overall levels of crime may not fall.",C:"Offenders are displaced into prison.",D:"Victims move away from high-crime areas."},correct:"B"}
    }
  ]
};

BANKS["BIO-1"] = {
  label: "Cell Biology",
  color: "#15803d",
  questions: [
    {
      id:"BIO-01",stem:"A student says mitochondria produce ATP by 'burning glucose.' Which term more accurately describes this process?",
      options:{A:"Aerobic respiration — glucose is oxidised via glycolysis, the Krebs cycle",B:"Fermentation — glucose is broken down without oxygen.",C:"Photosynthesis — light energy is converted to chemical energy in ATP.",D:"Hydrolysis — water breaks the bonds in glucose to release energy."},
      correct:"A",tag:"MC-BIO-01",
      scaffold:"Aerobic respiration: glucose + oxygen → CO₂ + water + ATP (up to ~38 ATP per glucose). Three stages: glycolysis (cytoplasm, produces 2 ATP + pyruvate), link reaction and Krebs cycle (mitochondrial matrix), oxidative phosphorylation (inner mitochondrial membrane, uses electron transport chain). 'Burning' implies combustion — respiration is an enzyme-controlled series of redox reactions.",
      reforge:{stem:"Glycolysis occurs in the cytoplasm and produces a net gain of 2 ATP per glucose. Where does the pyruvate produced go next in aerobic respiration?",options:{A:"It is excreted as a waste product.",B:"It enters the mitochondrial matrix for the link reaction, where it is converted to acetyl-CoA, CO₂, and reduced NAD.",C:"It is converted back to glucose in the liver.",D:"It moves directly to the electron transport chain in the inner membrane."},correct:"B"}
    },
    {
      id:"BIO-02",stem:"Which correctly distinguishes prokaryotic from eukaryotic cells?",
      options:{A:"Prokaryotes have a nucleus; eukaryotes do not.",B:"Prokaryotes lack a membrane-bound nucleus and membrane-bound organelles",C:"Prokaryotes are always larger than eukaryotes.",D:"Eukaryotes cannot reproduce asexually."},
      correct:"B",tag:"MC-BIO-02",
      scaffold:"Prokaryotes (bacteria, archaea): no nucleus (naked DNA, often circular, in nucleoid region), no membrane-bound organelles, smaller (1-10μm), 70S ribosomes, may have plasmids, flagella, pili. Eukaryotes (animals, plants, fungi, protists): nucleus with nuclear envelope, membrane-bound organelles (mitochondria, ER, Golgi), larger (10-100μm), 80S ribosomes (70S in mitochondria/chloroplasts — evidence for endosymbiosis).",
      reforge:{stem:"Streptomycin is an antibiotic that binds to 70S ribosomes and disrupts protein synthesis. Why does it selectively kill bacteria without harming human cells?",options:{A:"Human cells do not produce proteins, so ribosomes are unnecessary.",B:"Human cells have 80S ribosomes in the cytoplasm, which streptomycin cannot bind — only the 70S ribosomes found in bacteria (and in mitochondria) are affected.",C:"Bacteria lack a cell wall so the antibiotic enters more easily.",D:"The antibiotic is too large to enter eukaryotic cells."},correct:"B"}
    },
    {
      id:"BIO-03",stem:"During DNA replication, which enzyme unwinds the double helix by breaking hydrogen bonds between base pairs?",
      options:{A:"DNA polymerase",B:"Ligase",C:"Helicase",D:"Primase"},
      correct:"C",tag:"MC-BIO-03",
      scaffold:"Replication enzymes: Helicase — unwinds/unzips the double helix (breaks H-bonds). Primase — synthesises RNA primer to provide a starting point. DNA polymerase III — adds nucleotides in 5'→3' direction (needs a primer, cannot start from scratch). DNA polymerase I — removes RNA primer, replaces with DNA. Ligase — joins Okazaki fragments on lagging strand. Students frequently confuse helicase with DNA polymerase.",
      reforge:{stem:"DNA replication is described as semi-conservative. This means:",options:{A:"Only half the DNA is replicated in each cell cycle.",B:"Each new DNA molecule contains one original (parent) strand and one newly synthesised strand — shown by Meselson and Stahl using heavy nitrogen (15N) labelling.",C:"Half the base pairs are conserved unchanged; the other half are replaced.",D:"Replication only occurs during the S phase for some chromosomes, not all."},correct:"B"}
    },
    {
      id:"BIO-04",stem:"Facilitated diffusion differs from simple diffusion in that it:",
      options:{A:"Uses ATP to move molecules against a concentration gradient.",B:"Only moves water molecules across the phospholipid bilayer.",C:"Proceeds faster when the concentration gradient is smaller.",D:"Uses protein channels or carriers to move polar or large molecules down their concentratio"},
      correct:"D",tag:"MC-BIO-04",
      scaffold:"Simple diffusion: small, non-polar molecules (O₂, CO₂, steroids) pass directly through the phospholipid bilayer, down their concentration gradient, no ATP. Facilitated diffusion: ions, glucose, amino acids — too large or polar to cross directly — use channel proteins (ions) or carrier proteins (glucose) — still passive (down gradient), still no ATP. Active transport: uses ATP + carrier proteins, AGAINST gradient.",
      reforge:{stem:"Glucose absorption in the small intestine uses both facilitated diffusion and active transport. Active transport is needed because:",options:{A:"Glucose molecules are too large for protein channels.",B:"Glucose must be moved from the intestinal lumen into epithelial cells AGAINST its concentration gradient, requiring energy from ATP hydrolysis.",C:"Facilitated diffusion is too slow for the rate of glucose absorption needed after a meal.",D:"Active transport allows glucose to move in both directions simultaneously."},correct:"B"}
    },
    {
      id:"BIO-05",stem:"A student calculates magnification using: actual size = image size × magnification. Why is this formula wrong?",
      options:{A:"The correct formula is: magnification = image size ÷ actual size",B:"that is the correct formula.",C:"Magnification cannot be calculated from size measurements alone.",D:"The formula is correct but only applies to electron microscopes."},
      correct:"A",tag:"MC-BIO-05",
      scaffold:"MAG formula triangle: Magnification = Image size ÷ Actual size. Image size = Magnification × Actual size. Actual size = Image size ÷ Magnification. Always ensure units match. Example: image = 50mm, actual = 0.005mm → M = 50 ÷ 0.005 = ×10,000. Common error: multiplying instead of dividing, or mixing mm and μm. Convert everything to the same unit before calculating.",
      reforge:{stem:"A cell appears 30mm wide in a micrograph taken at ×15,000 magnification. What is the actual width of the cell in μm?",options:{A:"450,000 μm",B:"2 μm (30mm = 30,000 μm; actual = 30,000 ÷ 15,000 = 2 μm)",C:"0.002 μm",D:"30 μm"},correct:"B"}
    },
    {
      id:"BIO-06",stem:"Which of the following correctly describes the fluid mosaic model of the cell membrane?",
      options:{A:"A rigid bilayer of proteins with phospholipids floating through channels.",B:"A phospholipid bilayer in which proteins are embedded or attached, with both lipids and proteins able to move laterally",C:"A fixed arrangement of cholesterol molecules with protein channels at regular intervals.",D:"A single layer of amphipathic phospholipids with proteins attached only to the outer surface."},
      correct:"B",tag:"MC-BIO-06",
      scaffold:"Fluid mosaic model (Singer and Nicolson, 1972): phospholipid bilayer is fluid (lateral movement of lipids and proteins). Mosaic = varied protein types scattered throughout. Cholesterol = regulates fluidity (less fluid at high temps, more fluid at low temps). Proteins: integral (transmembrane — channels, carriers), peripheral (surface — structural, enzymes). Glycoproteins and glycolipids = cell recognition.",
      reforge:{stem:"Cholesterol is an important component of animal cell membranes because it:",options:{A:"Provides energy when the cell needs to actively transport molecules.",B:"Stabilises membrane fluidity — preventing it from becoming too rigid at low temperatures or too fluid at high temperatures.",C:"Forms the receptor sites for all membrane-bound enzymes.",D:"Provides the hydrophobic core that prevents all large molecules from crossing."},correct:"B"}
    },
    {
      id:"BIO-07",stem:"In a mitosis diagram, a student labels a cell with 4 chromosomes as being in 'S phase.' Why is this wrong?",
      options:{A:"S phase cells have 4 chromosomes.",B:"S phase cells always have 2 chromosomes, not 4.",C:"S phase is part of interphase (not mitosis)",D:"S phase occurs after mitosis is complete."},
      correct:"C",tag:"MC-BIO-07",
      scaffold:"Cell cycle: Interphase (G1, S, G2) → Mitosis (prophase, metaphase, anaphase, telophase) → Cytokinesis. S phase = DNA synthesis/replication — chromosomes not condensed, not visible under light microscope. Mitosis stages: Prophase (chromosomes condense, spindle forms), Metaphase (chromosomes align at equator), Anaphase (chromatids separate to poles), Telophase (nuclear envelopes reform). Cytokinesis splits the cytoplasm.",
      reforge:{stem:"During which stage of mitosis do sister chromatids separate and move to opposite poles?",options:{A:"Metaphase — chromosomes are aligned at the equator.",B:"Anaphase — spindle fibres shorten, pulling sister chromatids to opposite poles of the cell.",C:"Telophase — nuclear envelopes reform around the separated chromosomes.",D:"Prophase — chromosomes condense and become visible."},correct:"B"}
    },
    {
      id:"BIO-08",stem:"An investigation tests the effect of temperature on enzyme activity. A student says: 'The enzyme is destroyed above 60°C.' Which more precise term should be used?",
      options:{A:"Inhibited — the enzyme is slowed by the high temperature.",B:"Oxidised — the enzyme loses electrons at high temperature.",C:"Hydrolysed — water molecules break peptide bonds in the enzyme.",D:"Denatured"},
      correct:"D",tag:"MC-BIO-08",
      scaffold:"Denaturation = permanent change to tertiary/quaternary structure. At high temperatures: increased kinetic energy → hydrogen bonds, ionic bonds, and some disulfide bonds break → tertiary structure changes → active site changes shape → substrate no longer complementary → no enzyme-substrate complexes form → reaction stops. This is irreversible. Contrast with inhibition (reversible, competitive or non-competitive) where structure may be unchanged.",
      reforge:{stem:"Why do enzymes have an optimum pH as well as an optimum temperature?",options:{A:"pH affects the solubility of the substrate rather than the enzyme.",B:"Changes in pH alter the ionisation of amino acid R-groups, disrupting ionic bonds and hydrogen bonds that maintain the enzyme's tertiary structure — changing the shape of the active site.",C:"Enzymes can only function in neutral conditions (pH 7).",D:"pH affects the speed of product release rather than the rate of substrate binding."},correct:"B"}
    }
  ]
};

BANKS["HIST-1"] = {

    {
      id:"HIST-01",stem:"A student argues: 'The Weimar Republic was doomed from the start.' Which evidence MOST effectively challenges this interpretation?",
      options:{A:"The Stresemann years (1924-29) saw economic recovery, cultural flourishing",B:"The Republic survived the hyperinflation crisis of 1923.",C:"Hitler was democratically elected Chancellor in 1933.",D:"The SPD remained the largest party throughout the Weimar period."},
      correct:"A",tag:"MC-HIST-01",

      reforge:{stem:"Which of the following MOST supports the view that the Depression, rather than structural weaknesses, caused the Republic's fall?",options:{A:"The Weimar constitution was written by liberals who didn't understand German politics.",B:"The NSDAP won only 2.6% of the vote in 1928 (before the Depression) but 37.4% in July 1932 — demonstrating that Nazi support surged specifically in response to economic collapse.",C:"Article 48 allowed presidential decrees to bypass the Reichstag.",D:"The SPD refused to work with other parties to form stable coalitions."},correct:"B"}

      correct:"B",tag:"MC-HIST-02",
      scaffold:"The Putsch failed militarily — 16 Nazis died, Hitler was arrested. But: (1) the trial was a media spectacle where Hitler turned proceedings into propaganda, attacking the 'November criminals.' (2) He received only 5 years (served 9 months). (3) Mein Kampf, written in Landsberg Prison, became the ideological foundation. (4) He concluded legal 'legality strategy' was necessary — winning through the ballot box, not the barricades.",

    },
    {
      id:"HIST-03",stem:"A student writes: 'Hitler became Chancellor because the German people voted for him.' What is the key factual problem with this statement?",
      options:{A:"There is no problem — Hitler won the 1933 elections decisively.",B:"Hitler was appointed by the Reichstag rather than the President.",C:"Hitler never won a majority in a free election",D:"Elections were suspended after 1930, so Hitler never appeared on a ballot paper."},
      correct:"C",tag:"MC-HIST-03",
      scaffold:"Hitler's appointment (January 30, 1933) resulted from elite miscalculation — von Papen convinced Hindenburg they could control Hitler as a 'drummer' for conservative nationalism. Nazi support was falling by late 1932 (party nearly bankrupt). Von Schleicher was dismissed as Chancellor and the conservative 'cabinet of barons' was formed with Hitler nominally in charge. The electoral route to power is partly a myth.",
      reforge:{stem:"Why did conservative elites like von Papen support making Hitler Chancellor?",options:{A:"They genuinely shared Hitler's racial ideology and wanted to implement it.",B:"They believed they could use Hitler's mass appeal to gain popular support while controlling him through a conservative cabinet — fatally underestimating both his ambition and political skill.",C:"They feared another communist revolution if the Nazis were excluded from power.",D:"They were legally required to appoint the leader of the largest party."},correct:"B"}
    },
    {
      id:"HIST-04",stem:"The Reichstag Fire (February 1933) was significant to Hitler's consolidation of power primarily because:",
      options:{A:"It destroyed the Reichstag building and forced the government to rule by emergency decree permanently.",B:"It proved communist terrorism was widespread, permanently discrediting left-wing parties.",C:"It convinced Hindenburg to formally transfer all presidential powers to Hitler.",D:"It provided a pretext for the Reichstag Fire Decree (Article 48)"},
      correct:"D",tag:"MC-HIST-04",
      scaffold:"Reichstag Fire (27 Feb 1933): Marinus van der Lubbe arrested. Hitler immediately blamed communist conspiracy. Hindenburg signed the Reichstag Fire Decree (28 Feb) — suspended civil liberties (freedom of press, speech, assembly), allowed detention without trial, overrode state governments. ~4,000 communists arrested. The March election (43.9%) with KPD intimidated/banned allowed the Enabling Act to pass.",
      reforge:{stem:"Which event directly followed the Reichstag Fire Decree and completed Hitler's legal seizure of dictatorial power?",options:{A:"The Night of the Long Knives (June 1934), which eliminated the SA leadership.",B:"The Enabling Act (March 1933), which allowed Hitler to pass laws without the Reichstag for four years — making him legislatively independent of parliament.",C:"The banning of all political parties except the NSDAP (July 1933).",D:"Hindenburg's death (August 1934), which allowed Hitler to merge Chancellor and President into the title 'Fuhrer.'"},correct:"B"}
    },
    {
      id:"HIST-05",stem:"Historians debate whether ordinary Germans who participated in the Holocaust did so primarily due to ideology or situational pressure. Which argument supports the 'situational' interpretation?",
      options:{A:"Christopher Browning's study of Reserve Police Battalion 101 showed ordinary middle-aged m",B:"Germans had been exposed to antisemitic propaganda for decades before 1933.",C:"Nazi racial ideology was explicitly taught in schools from 1933.",D:"The SS selected soldiers for the Einsatzgruppen based on ideological commitment."},
      correct:"A",tag:"MC-HIST-05",
      scaffold:"Browning ('Ordinary Men'): most Battalion 101 members were not ideologically committed Nazis. When offered the chance to opt out of killing, few did. Explanation: peer pressure, career considerations, obedience to authority, and gradual moral desensitisation. Goldhagen ('Hitler's Willing Executioners') counters: specifically German 'eliminationist antisemitism' was the primary cause. Both interpretations use the same evidence, reaching different conclusions — an excellent example of historical debate.",
      reforge:{stem:"Goldhagen's interpretation of Holocaust perpetrators differs from Browning's primarily in arguing that:",options:{A:"More Germans were involved in the Holocaust than Browning estimated.",B:"German perpetrators were motivated primarily by a specifically German cultural antisemitism ('eliminationist antisemitism') rather than situational factors — they were ideologically driven, not just conforming.",C:"SS ideology rather than ordinary German culture explains perpetrator behaviour.",D:"Economic incentives were the primary motivation for participation in the Holocaust."},correct:"B"}

    {

      options:{A:"Brexit is the most important recent event and should anchor all political examples.",B:"Any use of referendum examples is penalised in Edexcel Politics mark schemes.",C:"Students should restrict themselves to pre-2015 examples for consistency.",D:"Lack of range — Edexcel requires contemporary examples relevant to the specific question."},
      correct:"B",tag:"MC-TECH-01",
      scaffold:"AQA History source evaluation: a top answer identifies the nature/origin/purpose of the source, considers what it can and cannot tell us, and uses contextual knowledge to corroborate or challenge. Propaganda tells us about regime intent, not necessarily public response. Gestapo reports and SD Meldungen (mood reports) are better (if still imperfect) guides to actual opinion. No single source type is sufficient.",
      reforge:{stem:"Which type of source would give a HISTORIAN the most reliable insight into ordinary Germans' actual views of Nazi rule?",options:{A:"Official Nazi newspaper editorials from the Volkischer Beobachter.",B:"Sicherheitsdienst (SD) opinion reports, which summarised public mood for internal use — written for Nazi leadership, not public consumption, making them more candid than propaganda, though still filtered through party observers.",C:"Post-war memoirs by German civilians who survived the regime.",D:"Photographs of Nazi rallies showing enthusiastic crowds."},correct:"B"}
    },
    {
      id:"HIST-07",stem:"'The Depression was the most important reason for Hitler's rise to power by 1933.' Write a plan evaluating this claim. (Essay plan — identify and rank factors)",
      type:"short_answer",
      model_answer:"Agree: Nazi vote collapsed without Depression context (2.6% in 1928); mass unemployment (6 million by 1932) created fear and desperation that Nazi propaganda exploited; Weimar system appeared incapable. However: Long-term factors also necessary — Weimar structural weaknesses (Article 48, PR system, 'stab in the back' myth), appeal of Nazi ideology (nationalism, antisemitism, strong leadership), and elite miscalculation (von Papen's appointment decision). Most important: Depression was the trigger, not the cause — without the structural weaknesses and Nazi organisation already in place, the Depression alone would not have produced a Nazi government. Judgement: the Depression was necessary but not sufficient — it activated pre-existing structural vulnerabilities.",
      tag:["MC-HIST-01","MC-TECH-02"],
      scaffold:"AQA History essays: a minimum of three factors, each with specific evidence. Top answers rank the factors, explain relationships between them (e.g. how the Depression amplified existing weaknesses), and reach a substantiated judgement. Don't just describe — evaluate which factor was most important AND why the others mattered too."
    },
    {
      id:"HIST-08",stem:"The Night of the Long Knives (June 1934) consolidated Hitler's power primarily by:",
      options:{A:"Eliminating communist opposition to the Nazi regime.",B:"Merging the offices of Chancellor and President into the title 'Fuhrer.'",C:"Destroying the SA leadership (including Rohm), removing a potential rival power base",D:"Purging conservative members of the cabinet who had opposed Nazi policies."},
      correct:"C",tag:"MC-HIST-04",
      scaffold:"Night of Long Knives (30 June–2 July 1934): ~85 killed including Ernst Rohm (SA leader) and former Chancellor von Schleicher. The SA (2.5 million men) threatened both the regular army (which feared being replaced) and Hitler's authority. By eliminating Rohm, Hitler: removed a rival, gained army loyalty, and demonstrated his willingness to use ruthless violence even against former allies. When Hindenburg died (Aug 1934), the army swore its oath to Hitler personally.",
      reforge:{stem:"Why was the army's personal oath of loyalty to Hitler, sworn after Hindenburg's death in August 1934, significant?",options:{A:"It gave Hitler legal authority to conscript soldiers for a future war.",B:"It bound soldiers personally to Hitler rather than to Germany or the constitution — making organised military resistance to Hitler far more psychologically and legally difficult.",C:"It replaced the Weimar constitution's requirement for civilian control of the military.",D:"It formally merged the SA and regular army under Hitler's supreme command."},correct:"B"}
    }
  ]
};

BANKS["LAW-1"] = {
  label: "Criminal Law",
  color: "#1e3a5f",
  questions: [
    {
      id:"LAW-01",stem:"The Latin term 'actus reus' refers to:",
      options:{A:"The guilty mind — the mental element of a crime.",B:"The standard of proof required in criminal cases.",C:"The defendant's right to remain silent.",D:"The guilty act"},
      correct:"D",tag:"MC-LAW-01",
      scaffold:"Every crime requires two elements: actus reus (the guilty act) + mens rea (the guilty mind). Actus reus can be: (1) a positive act (stabbing), (2) an omission where there is a legal duty to act (Airedale NHS Trust v Bland), (3) a state of affairs (Winzar v Chief Constable of Kent — being drunk on a highway). Both elements must coincide in time for most crimes.",
      reforge:{stem:"D, a nurse, fails to give a patient medication, knowing they will die without it. The patient dies. The nurse may have committed a criminal act because:",options:{A:"Omissions are always criminal regardless of context.",B:"There is a duty of care arising from the nurse's professional relationship with the patient, and deliberately failing to act in breach of that duty can constitute a criminal omission.",C:"The nurse acted with intention, which is sufficient for any crime.",D:"A nurse's failure to give medication is automatically manslaughter."},correct:"B"}
    },
    {
      id:"LAW-02",stem:"In criminal law, 'intention' as a form of mens rea is best defined as:",
      options:{A:"Either directly desiring a consequence (direct intent) or foreseeing it as virtually certa",B:"Knowing that harm might result from your actions.",C:"Acting recklessly with no care for the outcome of your conduct.",D:"Making a deliberate decision to ignore a foreseeable risk."},
      correct:"A",tag:"MC-LAW-02",
      scaffold:"Direct intent: the defendant desires the consequence (aims to kill). Oblique intent (Woollin [1998]): the consequence is not the primary aim, but the defendant foresaw it as virtually certain — the jury may (not must) find intent. Example: D blows up a plane to claim insurance money; D doesn't want the passengers to die but foresees their death as virtually certain. Contrast with recklessness: subjective Cunningham recklessness (saw the risk and took it unreasonably).",
      reforge:{stem:"D sets fire to a building intending to collect insurance money. People inside die. D says he didn't intend to kill anyone. Applying R v Woollin, a jury could find intent to kill because:",options:{A:"D knew the building was insured, showing premeditation.",B:"D foresaw the deaths of the occupants as a virtually certain consequence of his actions — satisfying the test for oblique intent even though death was not his primary purpose.",C:"Arson is a crime of strict liability so intent is irrelevant.",D:"D acted with recklessness, which is equivalent to intention."},correct:"B"}
    },
    {
      id:"LAW-03",stem:"Which of the following correctly states the standard of proof in a criminal trial?",
      options:{A:"The defendant must prove their innocence on the balance of probabilities.",B:"The prosecution must prove the defendant's guilt beyond reasonable doubt",C:"Both prosecution and defence must prove their cases on the balance of probabilities.",D:"The judge decides guilt based on the weight of evidence without any fixed standard."},
      correct:"B",tag:"MC-LAW-03",
      scaffold:"Criminal standard: beyond reasonable doubt (prosecution must reach this — very high). Civil standard: balance of probabilities (more likely than not — 51%). The criminal standard is higher because: liberty is at stake, criminal conviction carries stigma, the state has greater investigative resources than defendants. Exceptions: some defences (insanity, diminished responsibility) must be proved by the defendant on the balance of probabilities.",
      reforge:{stem:"D raises the defence of insanity. Under M'Naghten rules, who must prove what and to what standard?",options:{A:"The prosecution must disprove insanity beyond reasonable doubt.",B:"The defendant must prove the insanity defence on the balance of probabilities — this is an exception to the general rule that defendants need not prove anything.",C:"The jury decides insanity without any formal burden of proof.",D:"The judge determines insanity based on psychiatric evidence alone."},correct:"B"}
    },
    {
      id:"LAW-04",stem:"For murder, the required mens rea is:",
      options:{A:"Recklessness as to whether death or serious injury results.",B:"Knowledge that the victim would probably die as a result of the act.",C:"An intention to kill or cause grievous bodily harm (GBH)",D:"Malice aforethought, meaning the defendant planned the killing in advance."},
      correct:"C",tag:"MC-LAW-04",
      scaffold:"Murder mens rea = 'malice aforethought' — intention to kill OR intention to cause GBH (Vickers; Cunningham 1982). 'Malice aforethought' does NOT require premeditation (planning in advance) — intention formed in a split second is sufficient. An intention to cause GBH that leads to death is still murder even if the defendant did not intend to kill. This is why the law of murder is criticised as too wide.",
      reforge:{stem:"D punches V intending only to cause serious harm, not death. V dies from the blow. D is charged with murder. Which statement correctly applies the law?",options:{A:"D cannot be guilty of murder since he did not intend to kill.",B:"D can be guilty of murder because the mens rea includes intention to cause GBH — and that intention was present even though death was not desired.",C:"D is guilty of manslaughter because intent to kill is required for murder.",D:"D is guilty of attempted murder since death was not the intended outcome."},correct:"B"}
    },
    {
      id:"LAW-05",stem:"The defence of loss of control (Coroners and Justice Act 2009) replaced provocation. Which of the following is a key difference?",
      options:{A:"Loss of control requires premeditation; provocation did not.",B:"Loss of control is a complete defence; provocation reduced murder to manslaughter.",C:"Loss of control can be used as a defence to all crimes; provocation was limited to murder.",D:"Loss of control requires a 'qualifying trigger'"},
      correct:"D",tag:"MC-LAW-05",
      scaffold:"Provocation (common law): sudden and temporary loss of control caused by provoking acts — R v Duffy. Replaced by loss of control (s.54-55 CJA 2009): (1) D lost self-control, (2) from a qualifying trigger (fear of serious violence OR grave circumstances + justifiable sense of wrong), (3) a person of D's sex and age with normal tolerance would have done the same. Sexual infidelity CANNOT be a qualifying trigger.",
      reforge:{stem:"D kills her abusive partner after years of abuse. She acted calmly, having planned the act. Under the 2009 Act, loss of control is unlikely to succeed because:",options:{A:"Abuse cannot constitute a qualifying trigger under any circumstances.",B:"The defence requires an actual loss of self-control at the time of the killing — acting in a calm, considered way undermines this requirement, though diminished responsibility might be available instead.",C:"The defence can only be used by male defendants.",D:"Planning the act means the killing is premeditated murder with no available defence."},correct:"B"}
    },
    {
      id:"LAW-06",stem:"A student writes: 'Self-defence is a complete defence to murder because it justifies the killing.' What needs to be added for a precise legal answer?",
      options:{A:"The force used must be reasonable and necessary in the circumstances as D believed them to be",B:"Nothing — that is a complete and accurate statement.",C:"Self-defence is only a partial defence, reducing murder to manslaughter.",D:"Self-defence requires the defendant to have first tried to retreat before using force."},
      correct:"A",tag:"MC-LAW-06",
      scaffold:"Self-defence / defence of another (s.76 Criminal Justice and Immigration Act 2008): (1) D must genuinely believe force was necessary. (2) Force must be reasonable and proportionate (judged on D's honest belief — R v Williams). (3) Householder cases: force must not be grossly disproportionate. R v Clegg: soldier fired after threat had passed → excessive force → murder conviction. Genuine mistake about need for force: D judged on facts as honestly believed.",
      reforge:{stem:"D uses lethal force against a burglar who is fleeing from his home. A court would consider the self-defence claim invalid primarily because:",options:{A:"Self-defence cannot be used in a home under any circumstances.",B:"The threat had passed once the burglar was fleeing — force used must be necessary and proportionate to the threat at the time it is used, and using lethal force against someone running away is likely excessive.",C:"D should have called the police rather than acting himself.",D:"Lethal force is never permitted against property crimes."},correct:"B"}
    },
    {
      id:"LAW-07",stem:"For the crime of theft (Theft Act 1968, s.1), which of the following is the correct actus reus?",
      options:{A:"Dishonestly obtaining property by deception.",B:"Appropriation of property belonging to another.",C:"Taking property with intent to permanently deprive without consent.",D:"Removing property from its original location without authorisation."},
      correct:"B",tag:"MC-LAW-07",
      scaffold:"Theft: s.1 Theft Act 1968 = actus reus + mens rea. Actus reus: (1) Appropriation (s.3 — assuming any right of the owner — R v Gomez: even authorised acts can be appropriation). (2) Property (s.4 — includes money, real property, things in action; excludes confidential information — Oxford v Moss). (3) Belonging to another (s.5 — includes property in possession/control of another). Mens rea: (4) Dishonesty (s.2 — Ivey v Genting Casinos 2017 test). (5) Intention to permanently deprive (s.6).",
      reforge:{stem:"D takes a library book intending to return it next week. D has not committed theft because:",options:{A:"Library books are excluded from the definition of property under the Theft Act.",B:"Theft requires intention to permanently deprive — D intends to return the book, so this element of the mens rea is absent, even if D's appropriation was dishonest.",C:"Taking from a public institution cannot constitute theft.",D:"D had implied permission to take the book by holding a library card."},correct:"B"}
    },
    {
      id:"LAW-08",stem:"Evaluate the extent to which the law on non-fatal offences against the person achieves justice. (Essay plan — 15 marks)",
      type:"short_answer",
      model_answer:"Problems with current law: (1) Statutory offences (Offences Against the Person Act 1861) use outdated, unclear language — 'malicious wounding' (s.20), 'grievous' (no statutory definition). (2) Sentencing anomalies: s.47 ABH (max 5 years) has same maximum as s.20 GBH despite s.20 being more serious. (3) s.39 assault and battery are common law, inconsistent with statutory offences. (4) Law Commission has recommended reform since 1993 — a draft bill (1998) proposed rationalised offences but not enacted. Arguments for justice: the hierarchy of offences (s.39 → s.47 → s.20 → s.18) roughly matches increasing seriousness; CPS charging standards; courts can use sentencing guidelines. Conclusion: the law fails to achieve full justice — the outdated language creates uncertainty, the sentencing structure has anomalies, and parliamentary inaction despite clear reform recommendations reflects institutional failure.",
      tag:["MC-LAW-01","MC-TECH-02"],
      scaffold:"OCR Law essays: AO1 (accurate statement of law with cases), AO2 (application — how the law operates in practice), AO3 (evaluation — does it achieve justice? Law Commission reform?). Top answers reference specific reform proposals and reach a clear judgement."
    }
  ]
};

BANKS["PHYS-1"] = {
  label: "Mechanics",
  color: "#1d4ed8",
  questions: [
    {
      id:"PHYS-01",stem:"A student writes: 'A car travelling at constant velocity has no forces acting on it.' Why is this wrong?",
      options:{A:"It is correct — constant velocity means no forces.",B:"Constant velocity means the car is accelerating.",C:"Constant velocity means the resultant force is zero, not that no forces act",D:"Forces only act when objects are stationary."},
      correct:"C",tag:"MC-PHYS-01",
      scaffold:"Newton's First Law: an object continues at constant velocity (or rest) when the resultant force is zero. This does NOT mean no forces act — it means forces are balanced. A car at constant speed has: driving force (engine) balanced by friction and air resistance. Students confuse 'no resultant force' with 'no forces.'",
      reforge:{stem:"A skydiver falls at terminal velocity. Which statement correctly describes the forces?",options:{A:"No forces act on the skydiver.",B:"Weight equals air resistance — the resultant force is zero so velocity is constant.",C:"Weight is greater than air resistance, causing acceleration.",D:"Air resistance is greater than weight."},correct:"B"}
    },
    {
      id:"PHYS-02",stem:"A ball is thrown horizontally from a cliff. Ignoring air resistance, which correctly describes its motion?",
      options:{A:"It moves in a straight line diagonally downward.",B:"It decelerates horizontally because gravity pulls it back.",C:"Horizontal and vertical motion cannot be analysed separately.",D:"Horizontal velocity remains constant"},
      correct:"D",tag:"MC-PHYS-02",
      scaffold:"Projectile motion: horizontal and vertical components are independent. Horizontal: no force (ignoring air resistance) → constant velocity. Vertical: gravitational force → constant acceleration downward (g = 9.81 m/s²). Combined: parabolic trajectory. Common error: students think horizontal velocity decreases due to gravity — gravity only acts vertically.",
      reforge:{stem:"A projectile is launched at 30° to the horizontal with speed 20 m/s. What is the initial vertical component of velocity?",options:{A:"20 m/s",B:"10 m/s (20 × sin30° = 20 × 0.5 = 10 m/s)",C:"17.3 m/s",D:"20 × cos30°"},correct:"B"}
    },
    {
      id:"PHYS-03",stem:"Which of the following correctly states the work-energy theorem?",
      options:{A:"The net work done on an object equals the change in its kinetic energy: W_net = ΔKE = ½mv²",B:"Work done equals the force applied multiplied by time.",C:"Work done is always equal to the gain in potential energy.",D:"Work equals power multiplied by force."},
      correct:"A",tag:"MC-PHYS-03",
      scaffold:"Work-energy theorem: W_net = ΔKE. Work done = force × displacement (in direction of force): W = Fd cosθ. If net work is positive, KE increases; if negative, KE decreases. Distinct from conservation of energy (which also includes PE). Common errors: confusing work with impulse (Ft), or assuming work = ΔPE only.",
      reforge:{stem:"A 2 kg object accelerates from 3 m/s to 7 m/s. What is the net work done on it?",options:{A:"8 J",B:"40 J (ΔKE = ½×2×7² − ½×2×3² = 49 − 9 = 40 J)",C:"20 J",D:"80 J"},correct:"B"}
    },
    {
      id:"PHYS-04",stem:"A student uses s = ut + ½at² to find displacement but gets the wrong answer because they forgot to check something. What is the most likely error?",
      options:{A:"They forgot to square t.",B:"They used inconsistent sign conventions",C:"SUVAT equations only work for horizontal motion.",D:"They should have used v = u + at instead."},
      correct:"B",tag:"MC-PHYS-04",
      scaffold:"SUVAT equations require consistent sign conventions throughout the calculation. Choose a positive direction (usually up or right) and stick to it. If upward is positive: initial upward velocity = +u, g = −9.81 m/s². If a ball is thrown upward and comes back, displacement is eventually negative (below start). Mixing signs is the single most common SUVAT error in AQA mark schemes.",
      reforge:{stem:"A ball is thrown upward at 15 m/s. Taking upward as positive, what is its displacement after 4 seconds? (g = 9.81 m/s²)",options:{A:"60 m",B:"−18.5 m (s = 15×4 + ½×(−9.81)×16 = 60 − 78.5 = −18.5 m — it has gone above and come back below the start)",C:"18.5 m",D:"0 m"},correct:"B"}
    },
    {
      id:"PHYS-05",stem:"Hooke's Law states that F = kx. A student says: 'This means a stiffer spring stores more energy.' Is this always correct?",
      options:{A:"Yes — higher k always means more energy stored.",B:"Hooke's Law doesn't apply to energy calculations.",C:"Not necessarily. Elastic potential energy = ½kx²",D:"Stiffer springs always store less energy."},
      correct:"C",tag:"MC-PHYS-05",
      scaffold:"EPE = ½kx² = F²/(2k). For the same extension: stiffer spring stores more energy (higher k). For the same force: stiffer spring extends less, stores less energy (F²/2k decreases as k increases). The question of 'which stores more' depends on whether you fix force or extension. AQA examiners test this distinction.",
      reforge:{stem:"Spring A has k = 200 N/m, Spring B has k = 50 N/m. Both are extended by 0.1 m. Which stores more elastic potential energy?",options:{A:"Spring B stores more.",B:"Spring A stores more (EPE_A = ½×200×0.01 = 1 J; EPE_B = ½×50×0.01 = 0.25 J — stiffer spring stores more for the same extension).",C:"Both store equal energy.",D:"Cannot be determined without knowing the force."},correct:"B"}
    },
    {
      id:"PHYS-06",stem:"The principle of conservation of momentum states that:",
      options:{A:"Momentum is always conserved in elastic collisions only.",B:"Momentum and kinetic energy are both conserved in all collisions.",C:"Momentum is conserved only when objects stick together.",D:"The total momentum of a closed system remains constant provided no external resultant force acts"},
      correct:"D",tag:"MC-PHYS-06",
      scaffold:"Momentum conservation: applies to ALL collisions (elastic and inelastic) in a closed system (no external net force). Kinetic energy is only conserved in perfectly elastic collisions. In inelastic collisions, KE is lost as heat/sound/deformation — but momentum is always conserved. Students frequently confuse momentum conservation with KE conservation.",
      reforge:{stem:"Two objects collide and stick together (perfectly inelastic collision). Which quantities are conserved?",options:{A:"Both kinetic energy and momentum.",B:"Momentum only — kinetic energy is lost in an inelastic collision as heat, sound, or deformation.",C:"Kinetic energy only.",D:"Neither is conserved."},correct:"B"}
    },
    {
      id:"PHYS-07",stem:"A student confuses 'scalar' and 'vector' quantities. Which list correctly separates them?",
      options:{A:"Scalars: speed, distance, mass, energy, temperature. Vectors: velocity",B:"Scalars: velocity, force, acceleration. Vectors: speed, distance, energy.",C:"Scalars and vectors are interchangeable — the distinction doesn't matter in calculations.",D:"All physical quantities are vectors."},
      correct:"A",tag:"MC-PHYS-07",
      scaffold:"Scalars have magnitude only (speed, distance, mass, energy, time, temperature, pressure). Vectors have magnitude AND direction (velocity, displacement, force, acceleration, momentum, weight). Practical implication: two forces of 5 N can give a resultant of anything from 0 N to 10 N depending on direction. Adding scalars uses arithmetic; adding vectors requires geometry (parallelogram or component method).",
      reforge:{stem:"A car travels 3 km north then 4 km east. Its total distance travelled is 7 km. What is the magnitude of its displacement?",options:{A:"7 km",B:"5 km (displacement is a vector — use Pythagoras: √(3²+4²) = 5 km at a bearing NE)",C:"1 km",D:"3.5 km"},correct:"B"}
    },
    {
      id:"PHYS-08",stem:"Which correctly explains why a heavier object and a lighter object dropped from the same height hit the ground at the same time (ignoring air resistance)?",
      options:{A:"The heavier object has more gravitational force pulling it, so it falls faster.",B:"Gravitational acceleration (g) is independent of mass",C:"Air resistance makes the difference negligible.",D:"Objects in free fall have no weight."},
      correct:"B",tag:"MC-PHYS-08",
      scaffold:"F = mg. Newton's 2nd law: a = F/m = mg/m = g. Mass cancels — acceleration is independent of mass. This is Galileo's insight. Heavier object: more force BUT more inertia to overcome. The ratio is always g. Air resistance does differentiate them in reality (depends on cross-section and mass), but in a vacuum, ALL objects fall identically regardless of mass.",
      reforge:{stem:"On the Moon, where g = 1.6 m/s², a 1 kg and a 10 kg object are dropped simultaneously. Which hits the ground first?",options:{A:"The 10 kg object — more gravitational force.",B:"They hit simultaneously — gravitational acceleration on the Moon is 1.6 m/s² for all objects regardless of mass, since acceleration = F/m = mg/m = g.",C:"The 1 kg object — less inertia.",D:"Cannot be determined without knowing the height."},correct:"B"}
    }
  ]
};

BANKS["POL-1"] = {
  label: "UK Government & Politics",
  color: "#1e3a5f",
  questions: [
    {
      id:"POL-01",stem:"A student describes the UK constitution as 'written in a single document.' Why is this wrong?",
      options:{A:"It is correct — the UK constitution is codified.",B:"The UK constitution is entirely unwritten.",C:"The UK has an uncodified constitution",D:"Constitutions are only found in republican states."},
      correct:"C",tag:"MC-POL-01",
      scaffold:"Uncodified (not unwritten): key sources include statute law (Parliament Acts 1911/49, Human Rights Act 1998, Fixed-term Parliaments Act 2011), constitutional conventions (collective cabinet responsibility, Salisbury convention), common law, royal prerogative, and authoritative texts (Erskine May, Bagehot's 'The English Constitution'). Unlike the US (1787) or Germany (1949), no single document contains all constitutional principles.",
      reforge:{stem:"Which of the following is an example of a constitutional convention rather than a statute in the UK?",options:{A:"The Human Rights Act 1998",B:"The principle that the Prime Minister must command a majority in the House of Commons and must resign if they lose a vote of no confidence.",C:"The Parliament Act 1911",D:"The Fixed-term Parliaments Act 2011"},correct:"B"}
    },
    {
      id:"POL-02",stem:"First-past-the-post (FPTP) elections are criticised primarily for:",
      options:{A:"Producing too many small parties and unstable coalitions.",B:"Being too slow to produce a result.",C:"Allowing too much voter choice.",D:"Disproportionality"},
      correct:"D",tag:"MC-POL-02",
      scaffold:"FPTP weaknesses: disproportional outcomes (2019: Conservatives won 56% of seats with 44% of votes), wasted votes (all votes beyond plurality in each constituency), safe seats reduce competition, two-party squeeze (smaller parties dramatically under-represented), tactical voting distorts true preferences. AV (2011 referendum rejected), PR systems avoid many of these. Edexcel questions often ask you to evaluate FPTP against specific alternatives.",
      reforge:{stem:"In the 2015 UK general election, UKIP won 12.6% of the national vote but only 1 seat. The SNP won 4.7% of the vote but 56 seats. Which feature of FPTP explains this?",options:{A:"UKIP's votes were invalid due to party registration errors.",B:"FPTP rewards concentration of votes in constituencies — UKIP votes were spread nationally (never a plurality anywhere); SNP votes were concentrated in Scottish seats where they won pluralities.",C:"Proportional representation applied to UKIP but not the SNP.",D:"Only registered parties can win multiple seats under FPTP."},correct:"B"}
    },
    {
      id:"POL-03",stem:"Parliamentary sovereignty means that:",
      options:{A:"Parliament is the supreme legal authority in the UK",B:"The monarch has ultimate authority over Parliament.",C:"The Prime Minister controls all parliamentary business.",D:"The Supreme Court can strike down Acts of Parliament."},
      correct:"A",tag:"MC-POL-03",
      scaffold:"Dicey's three principles of parliamentary sovereignty: Parliament can legislate on anything; no Parliament can bind its successors; no body can override Parliament. Challenges: EU membership (1972–2020, EU law supremacy — Factortame case), devolution (created powerful sub-national bodies), Human Rights Act (courts issue declarations of incompatibility — but Parliament need not act), referendums (political but not legally binding). Brexit reasserted parliamentary sovereignty.",
      reforge:{stem:"In the Factortame case (1990), UK courts effectively set aside an Act of Parliament. This is significant because:",options:{A:"It proved the Supreme Court can overrule Parliament permanently.",B:"It showed that while EU membership lasted, EU law took precedence over Acts of Parliament — a practical qualification to parliamentary sovereignty that Brexit subsequently removed.",C:"It established that conventions are legally superior to statutes.",D:"It transferred power from Parliament to the judiciary permanently."},correct:"B"}
    },
    {
      id:"POL-04",stem:"A student writes that the House of Lords has 'the same legislative power as the House of Commons.' Why is this wrong?",
      options:{A:"It is correct — both chambers are equal.",B:"The Lords is subordinate to the Commons",C:"The Lords has more power because it is unelected.",D:"The Lords was abolished in 1999."},
      correct:"B",tag:"MC-POL-04",
      scaffold:"Lords powers: revise and delay legislation (up to 1 year under Parliament Acts), amend bills, provide scrutiny, use ping-pong. Lords CANNOT: veto bills indefinitely, delay money bills, reject manifesto commitments (Salisbury Convention). Lords abolished most hereditary peers (1999 reform) — now life peers dominate. Lords reform remains incomplete — an elected chamber has been repeatedly proposed but not implemented.",
      reforge:{stem:"The House of Lords rejected a government bill not included in the governing party's manifesto. This is constitutionally significant because:",options:{A:"The Lords cannot reject any bill under the Parliament Acts.",B:"The Salisbury Convention does not apply to non-manifesto bills — the Lords may legitimately use its delaying power to force the government to reconsider, as it is not bound to pass what was not in the manifesto.",C:"Only the House of Commons can reject government bills.",D:"The Lords' veto is absolute for non-manifesto bills."},correct:"B"}
    },
    {
      id:"POL-05",stem:"Pluralism in politics argues that power in liberal democracies is:",
      options:{A:"Concentrated in the hands of a small ruling elite.",B:"Held exclusively by elected politicians.",C:"Distributed among many competing groups",D:"Shared equally among all citizens through direct democracy."},
      correct:"C",tag:"MC-POL-05",
      scaffold:"Pluralism (Dahl): multiple competing centres of power; open political system; government reflects competing pressures. Contrasts with: Elitism (C. Wright Mills: power elite of military, corporate, political leaders dominates), Marxism (state serves ruling class/capitalist interests), New Right (state itself is the problem — too powerful). Edexcel requires you to evaluate these theories using UK examples.",
      reforge:{stem:"Which evidence would MOST effectively challenge a pluralist account of UK democracy?",options:{A:"The existence of many different pressure groups in the UK.",B:"Evidence that wealthy corporate donors disproportionately influence party policy and that some groups (e.g. the homeless) have minimal political access — suggesting power is not evenly distributed among competing groups.",C:"The fact that elections are held every five years.",D:"The presence of a free press in the UK."},correct:"B"}
    },
    {
      id:"POL-06",stem:"A student uses the same recent example (Brexit) for every question on a Politics paper. What is the examiner likely to penalise?",

      reforge:{stem:"A question asks: 'Evaluate the power of the Prime Minister.' A top answer would use examples from:",options:{A:"Only the current Prime Minister's term in office.",B:"Multiple Prime Ministers across different contexts — showing when PM power is strong (large majority, economic growth, united party) AND when it is constrained (hung parliament, backbench rebellions, economic crisis) — demonstrating genuine evaluative understanding.",C:"Only foreign policy examples where PMs have most freedom.",D:"The Monarch's constitutional relationship with the PM."},correct:"B"}

    {
      id:"POL-07",stem:"Which of the following best describes a 'pressure group' as distinct from a political party?",
      options:{A:"Pressure groups seek to influence government policy on specific issues without seeking ele",B:"Pressure groups are illegal in the UK.",C:"Political parties never use lobbying; only pressure groups do.",D:"Pressure groups only represent business interests."},
      correct:"A",tag:"MC-POL-07",
      scaffold:"Pressure groups vs parties: parties seek power (government), pressure groups seek influence. Insider groups: consulted by government, formal access (BMA on health policy). Outsider groups: excluded or choose exclusion, use direct action, media campaigns (Extinction Rebellion). Grant's distinction: sectional (self-interest — trade unions) vs cause groups (public interest — Amnesty International). AQA/Edexcel expect you to evaluate whether pressure groups enhance or threaten democracy.",
      reforge:{stem:"Extinction Rebellion blockading roads is an example of an outsider pressure group tactic because:",options:{A:"They lobby MPs directly in Westminster.",B:"They use direct action to generate media attention and public pressure rather than working within formal channels — either by choice or because they lack insider access to government.",C:"They represent a section of society rather than a cause.",D:"Their membership is too small to qualify as an insider group."},correct:"B"}
    },
    {
      id:"POL-08",stem:"Evaluate the view that referendums are a threat to representative democracy in the UK. (Essay plan — 30 marks)",
      type:"short_answer",
      model_answer:"For (threat): bypass Parliament (undermines parliamentary sovereignty), can be used tactically (Cameron's Brexit gamble to manage party), simplify complex issues to binary choice (Brexit — multiple leave options collapsed), tyranny of majority can harm minorities, result may reflect campaign misinformation rather than informed choice (£350m bus claim). Against: increase legitimacy of constitutional change, direct mandate stronger than parliamentary vote, force politicians to engage public on major issues (AV 2011, Scottish Independence 2014), turnout often higher than elections. Evaluation: context matters — referendums on constitutional questions (devolution, Brexit) have stronger justification than use as party management tools. UK's uncodified constitution means no formal rule on when to hold them — this is the deeper problem. Judgement: they are not inherently a threat but depend on how and why they are called — executive discretion over timing and framing is the real risk.",
      tag:["MC-POL-03","MC-TECH-02"],
