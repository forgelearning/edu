<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge — Subscribe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Sora:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--coal:#141210;--panel:#211E1B;--panel-2:#2A2622;--line:#3A342E;--ember:#FF6B2C;--hot:#FFC93C;--slate:#B8B4AD;--white:#F5F1EA;--good:#7FD98A;--bad:#FF5A5A}
[data-theme="light"]{--coal:#FAFAF8;--panel:#FFFFFF;--panel-2:#F3F2EF;--line:#E0DDD8;--ember:#E5550F;--hot:#C88500;--slate:#6B6660;--white:#1A1816;--good:#1B8C2A;--bad:#D42D2D}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--coal);color:var(--slate);font-family:'Sora',sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;color:var(--white);line-height:1.1;letter-spacing:-.015em}
.wrap{max-width:500px;margin:0 auto;padding:28px 20px}
.tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ember)}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;color:var(--white);text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:32px}
.logo .spark{width:9px;height:9px;background:linear-gradient(135deg,var(--hot),var(--ember));border-radius:2px;transform:rotate(45deg);box-shadow:0 0 10px rgba(255,107,44,.7)}
.theme-toggle{background:var(--panel);border:1px solid var(--line);color:var(--slate);font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer;position:fixed;top:20px;right:20px;z-index:99}
.theme-toggle:hover{color:var(--white);border-color:var(--ember)}

/* steps */
.step{display:none}.step.active{display:block}
.step-header{text-align:center;margin-bottom:32px}
.step-header .tag{margin-bottom:8px;display:block}
.step-header h1{font-size:28px;margin-bottom:8px}
.step-header p{color:#8A857E;font-size:14px}

/* form */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--slate);margin-bottom:5px}
.field input{width:100%;padding:12px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--white);font-family:'Sora',sans-serif;font-size:15px}
.field input:focus{outline:none;border-color:var(--ember)}
.field input::placeholder{color:#7A756E}

/* subject grid */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.subj-chip{padding:10px 14px;border-radius:9px;border:1.5px solid var(--line);background:var(--panel);cursor:pointer;font-family:'Sora',sans-serif;font-size:13px;color:var(--slate);text-align:left;transition:border-color .15s,color .15s,background .15s}
.subj-chip:hover{border-color:var(--ember);color:var(--white)}
.subj-chip.selected{border-color:var(--ember);background:rgba(255,107,44,.08);color:var(--white)}
.subj-chip.subj-chip-disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.subj-chip .spec{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#8A857E;margin-top:2px}

/* price card */
.price-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.price-card::before{content:"";position:absolute;inset:-1px;border-radius:14px;padding:1px;background:linear-gradient(135deg,rgba(255,201,60,.4),rgba(255,107,44,.2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.price-main{font-family:'Bricolage Grotesque',sans-serif;font-size:42px;font-weight:800;color:var(--white);line-height:1}
.price-period{font-size:15px;color:#8A857E;margin-left:4px}
.price-desc{font-size:13px;color:#8A857E;margin-top:6px}
.price-features{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.price-feat{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--slate)}
.price-feat::before{content:"✓";color:var(--good);font-weight:700;flex-shrink:0}

/* buttons */
.btn-primary{width:100%;padding:14px;border-radius:10px;background:linear-gradient(100deg,var(--hot),var(--ember));color:var(--coal);border:none;font-family:'Sora',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:10px}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:wait}
.btn-ghost{width:100%;padding:12px;border-radius:10px;background:none;border:1px solid var(--line);color:var(--slate);font-family:'Sora',sans-serif;font-size:14px;cursor:pointer}
.btn-ghost:hover{border-color:var(--ember);color:var(--white)}
.err{color:var(--bad);font-size:13px;margin-top:8px;display:none}
.note{font-size:12px;color:#8A857E;text-align:center;margin-top:10px}

/* success */
.success-icon{font-size:48px;text-align:center;margin-bottom:16px}
.success-card{background:rgba(127,217,138,.06);border:1px solid rgba(127,217,138,.3);border-radius:12px;padding:18px;margin-bottom:16px;font-size:14px;color:var(--slate)}
.success-card b{color:var(--white)}

/* already-subscribed check */
.already-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:20px;font-size:14px}

[data-theme="light"] .btn-primary{color:#fff}
@media(max-width:480px){.subj-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<button class="theme-toggle" onclick="(function(){var h=document.documentElement,b=document.querySelector('.theme-toggle');if(h.getAttribute('data-theme')==='light'){h.removeAttribute('data-theme');b.textContent='\u2600 Light';localStorage.setItem('forge-theme','dark');}else{h.setAttribute('data-theme','light');b.textContent='\u263E Dark';localStorage.setItem('forge-theme','light');}}())">&#9728; Light</button>
<script>if(localStorage.getItem('forge-theme')==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').textContent='\u263E Dark';}</script>

<div class="wrap">
  <a class="logo" href="index.html"><span class="spark"></span>Forge</a>
  <div id="app"></div>
</div>

<script src="forge-auth.js"></script>
<script>
var STRIPE_PAYMENT_LINK = 'https://buy.stripe.com/aFa5kw2wW7AC3mid2b9IQ00';
var MAX_SUBJECTS = 4;

var SUBJECTS_LIST = [
  {key:'econ',   label:'Economics',            spec:'Edexcel 9EC0'},
  {key:'psych',  label:'Psychology',           spec:'AQA 7182'},
  {key:'soc',    label:'Sociology',            spec:'AQA 7192'},
  {key:'geo',    label:'Geography',            spec:'Edexcel 9GE0'},
  {key:'bus',    label:'Business',             spec:'Edexcel 9BS0'},
  {key:'chem',   label:'Chemistry',            spec:'Edexcel 9CH0'},
  {key:'bio',    label:'Biology',              spec:'Edexcel 9BI0'},
  {key:'phys',   label:'Physics',              spec:'AQA 7408'},
  {key:'hist',   label:'History',              spec:'AQA 7042'},
  {key:'law',    label:'Law',                  spec:'AQA 7162'},
  {key:'crim',   label:'Criminology',          spec:'WJEC'},
  {key:'pol',    label:'Politics',             spec:'Edexcel 9PL0'},
  {key:'maths',  label:'Maths',               spec:'Edexcel 9MA0'},
  {key:'german', label:'German',               spec:'Edexcel 9GN0'},
  {key:'french', label:'French',               spec:'Edexcel 9FR0'},
  {key:'cs',     label:'Computer Science',     spec:'AQA 7517'},
  {key:'rs',     label:'Religious Studies',    spec:'Eduqas'},
  {key:'hsc',    label:'Health & Social Care', spec:'OCR H604'},
];

var app = document.getElementById('app');
var formState = { name: '', email: '', password: '', subjects: [] };

function getParam(k) { return new URLSearchParams(window.location.search).get(k); }
function subjLabel(k) { var s = SUBJECTS_LIST.find(function(x){return x.key===k;}); return s ? s.label : k; }

// ── ROUTING ──────────────────────────────────────────────────
// Returning from Stripe payment?
if (getParam('paid') === '1') {
  renderSuccess();
} else if (ForgeAuth.hasSession()) {
  // Already have a session — check if it's still valid
  app.innerHTML = '<p style="text-align:center;color:#8A857E;padding:40px 0">Checking your account…</p>';
  ForgeAuth.getSession().then(function(result) {
    if (result && result.subscriber && result.subscriber.active) {
      renderAlreadySubscribed(result.subscriber);
    } else {
      ForgeAuth.signOut();
      renderStep1();
    }
  });
} else {
  renderStep1();
}

// ── STEP 1: Name + Subject picker ────────────────────────────
function renderStep1() {
  var h = '<div class="step-header">';
  h += '<span class="tag">Step 1 of 3</span>';
  h += '<h1>Start your 7-day free trial</h1>';
  h += '<p>Full Pro access free for 7 days · no card needed · then £2.99/month</p>';
  h += '</div>';

  h += '<div class="price-card">';
  h += '<div><span class="price-main">£2.99</span><span class="price-period">/month</span></div>';
  h += '<div class="price-desc">7 days free · then £2.99/month · cancel anytime · log in on any device</div>';
  h += '<div class="price-features">';
  h += '<div class="price-feat">Up to 4 subjects — your full A Level combination</div>';
  h += '<div class="price-feat">Forge mode · The Anvil · The Crucible</div>';
  h += '<div class="price-feat">Personal misconception profile · XP &amp; ranks</div>';
  h += '<div class="price-feat">Log in from any device with email &amp; password</div>';
  h += '<div class="price-feat">No card details needed for the trial</div>';
  h += '<div class="price-feat">Cancel anytime — no contract</div>';
  h += '</div></div>';

  h += '<div class="field"><label>Your first name</label>';
  h += '<input id="s-name" type="text" placeholder="e.g. Alex" value="' + formState.name + '"></div>';

  h += '<p class="err" id="s1-err"></p>';
  h += '<button class="btn-primary" id="s1-next">Start free trial →</button>';
  h += '<button class="btn-ghost" onclick="window.location.href=\'forge-quiz.html\'" style="margin-top:8px">Already subscribed? Log in</button>';

  app.innerHTML = h;

  document.getElementById('s1-next').onclick = function() {
    var name = document.getElementById('s-name').value.trim();
    var err = document.getElementById('s1-err');
    if (!name) { err.textContent = 'Enter your first name.'; err.style.display = 'block'; return; }
    formState.name = name;
    renderStep2();
  };
}

// ── STEP 2: Subject picker ────────────────────────────────────
function renderStep2() {
  var h = '<div class="step-header">';
  h += '<span class="tag">Step 2 of 3</span>';
  h += '<h1>Pick your subjects</h1>';
  h += '<p>Choose up to <b style="color:var(--white)">' + MAX_SUBJECTS + ' subjects</b> — the same as a typical A Level combination.</p>';
  h += '</div>';

  h += '<div id="subj-counter" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:10px 14px;background:var(--panel);border:1px solid var(--line);border-radius:9px">';
  h += '<span style="font-size:13px;color:var(--slate)">Subjects selected</span>';
  h += '<span id="counter-val" style="font-family:\'JetBrains Mono\',monospace;font-size:15px;font-weight:700;color:var(--white)">' + formState.subjects.length + ' / ' + MAX_SUBJECTS + '</span>';
  h += '</div>';

  h += '<div class="subj-grid" id="subj-grid">';
  SUBJECTS_LIST.forEach(function(s) {
    var sel = formState.subjects.indexOf(s.key) !== -1;
    var atMax = formState.subjects.length >= MAX_SUBJECTS && !sel;
    h += '<button class="subj-chip' + (sel ? ' selected' : '') + (atMax ? ' subj-chip-disabled' : '') + '" data-key="' + s.key + '"' + (atMax ? ' disabled' : '') + '>';
    h += s.label + '<span class="spec">' + s.spec + '</span></button>';
  });
  h += '</div>';

  h += '<p class="err" id="s2-err"></p>';
  h += '<button class="btn-primary" id="s2-next">Create account →</button>';
  h += '<button class="btn-ghost" onclick="renderStep1()" style="margin-top:8px">← Back</button>';

  app.innerHTML = h;

  function refreshGrid() {
    var count = formState.subjects.length;
    var cv = document.getElementById('counter-val');
    if (cv) { cv.textContent = count + ' / ' + MAX_SUBJECTS; cv.style.color = count >= MAX_SUBJECTS ? 'var(--ember)' : 'var(--white)'; }
    document.querySelectorAll('.subj-chip').forEach(function(b) {
      var isSel = formState.subjects.indexOf(b.getAttribute('data-key')) !== -1;
      var dis = !isSel && count >= MAX_SUBJECTS;
      b.disabled = dis;
      b.classList.toggle('subj-chip-disabled', dis);
    });
  }

  document.getElementById('subj-grid').querySelectorAll('.subj-chip').forEach(function(btn) {
    btn.onclick = function() {
      if (btn.disabled) return;
      var key = btn.getAttribute('data-key');
      var idx = formState.subjects.indexOf(key);
      if (idx === -1) { if (formState.subjects.length >= MAX_SUBJECTS) return; formState.subjects.push(key); btn.classList.add('selected'); }
      else { formState.subjects.splice(idx, 1); btn.classList.remove('selected'); }
      refreshGrid();
    };
  });

  document.getElementById('s2-next').onclick = function() {
    var err = document.getElementById('s2-err');
    if (formState.subjects.length === 0) { err.textContent = 'Select at least one subject.'; err.style.display = 'block'; return; }
    renderStep3();
  };
}

// ── STEP 3: Create account + pay ─────────────────────────────
function renderStep3() {
  var subjLabels = formState.subjects.map(subjLabel);

  var h = '<div class="step-header">';
  h += '<span class="tag">Step 3 of 3</span>';
  h += '<h1>Create your account</h1>';
  h += '<p>Choose an email and password — this is how you\'ll log in on any device.</p>';
  h += '</div>';

  h += '<div class="already-box" style="margin-bottom:16px">';
  h += '<div style="font-size:13px;color:var(--white);margin-bottom:8px"><b>' + formState.name + '</b></div>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
  subjLabels.forEach(function(l) {
    h += '<span style="font-size:12px;padding:3px 10px;border-radius:6px;background:rgba(255,107,44,.1);border:1px solid rgba(255,107,44,.25);color:var(--ember)">' + l + '</span>';
  });
  h += '</div></div>';

  h += '<div class="field"><label>Email address</label>';
  h += '<input id="s-email" type="email" placeholder="e.g. alex@gmail.com" value="' + formState.email + '"></div>';
  h += '<div class="field"><label>Password</label>';
  h += '<input id="s-pass" type="password" placeholder="At least 8 characters"></div>';
  h += '<div class="field"><label>Confirm password</label>';
  h += '<input id="s-pass2" type="password" placeholder="Repeat your password"></div>';

  h += '<p class="err" id="s3-err"></p>';
  h += '<button class="btn-primary" id="s3-pay">Create account &amp; start trial →</button>';
  h += '<button class="btn-ghost" onclick="renderStep2()" style="margin-top:8px">← Change subjects</button>';
  h += '<p class="note">No payment needed now · your trial starts immediately · subscribe after 7 days to keep access</p>';

  app.innerHTML = h;

  document.getElementById('s3-pay').onclick = function() {
    var email    = document.getElementById('s-email').value.trim();
    var pass     = document.getElementById('s-pass').value;
    var pass2    = document.getElementById('s-pass2').value;
    var err      = document.getElementById('s3-err');
    var btn      = document.getElementById('s3-pay');

    err.style.display = 'none';
    if (!email || !email.includes('@')) { err.textContent = 'Enter a valid email address.'; err.style.display = 'block'; return; }
    if (pass.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.style.display = 'block'; return; }
    if (pass !== pass2) { err.textContent = 'Passwords don\'t match.'; err.style.display = 'block'; return; }

    formState.email    = email;
    formState.password = pass;

    btn.disabled = true; btn.textContent = 'Creating account…';

    // Create Supabase account first
    ForgeAuth.signUp(email, pass, formState.name, formState.subjects).then(function() {
      // Save pending state so success page knows subjects
      try { localStorage.setItem('forge-pending', JSON.stringify({ name: formState.name, subjects: formState.subjects })); } catch(e) {}
      // Redirect to Stripe
     window.location.href = 'forge-signup.html?paid=1';
    }).catch(function(e) {
      btn.disabled = false; btn.textContent = 'Create account & pay →';
      err.textContent = e.message || 'Could not create account. This email may already be registered.';
      err.style.display = 'block';
    });
  };
}

// ── SUCCESS: Return from Stripe ───────────────────────────────
function renderSuccess() {
  var pending = null;
  try { pending = JSON.parse(localStorage.getItem('forge-pending') || 'null'); localStorage.removeItem('forge-pending'); } catch(e) {}

  var name     = (pending && pending.name)     || '';
  var subjects = (pending && pending.subjects) || [];
  var subjLabels = subjects.map(subjLabel);

  var h = '<div class="success-icon">🔥</div>';
  h += '<div class="step-header">';
  h += '<span class="tag">Welcome to Forge</span>';
  h += '<h1>' + (name ? name + ', you\'re in.' : 'You\'re in.') + '</h1>';
  h += '<p>Your 7-day Pro trial has started. Log in from any device with your email and password.</p>';
  h += '</div>';

  if (subjLabels.length > 0) {
    h += '<div class="success-card"><b>Subjects unlocked:</b><br>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">';
    subjLabels.forEach(function(l) {
      h += '<span style="font-size:12px;padding:3px 10px;border-radius:6px;background:rgba(127,217,138,.1);border:1px solid rgba(127,217,138,.3);color:var(--good)">' + l + '</span>';
    });
    h += '</div></div>';
  }

  // Class linking card
  h += '<div class="already-box" id="class-link-box">';
  h += '<div style="margin-bottom:10px"><b style="color:var(--white)">Is your teacher using Forge?</b></div>';
  h += '<p style="font-size:13px;color:#8A857E;margin-bottom:12px">Enter their class code to share your progress — they\'ll be able to see your misconceptions and set you assignments.</p>';
  h += '<input id="link-code" type="text" placeholder="e.g. ECON-Y12-A" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--white);font-family:Sora,sans-serif;font-size:14px;text-transform:uppercase;margin-bottom:8px">';
  h += '<button id="link-btn" class="btn-primary" style="margin-bottom:6px">Link to class →</button>';
  h += '<p class="err" id="link-err"></p>';
  h += '<button onclick="skipToQuiz()" class="btn-ghost">Skip — my teacher isn\'t on Forge yet</button>';
  h += '</div>';

  app.innerHTML = h;

  document.getElementById('link-btn').onclick = function() {
    var code = document.getElementById('link-code').value.trim().toUpperCase();
    var err  = document.getElementById('link-err');
    var btn  = document.getElementById('link-btn');
    err.style.display = 'none';
    if (!code) { err.textContent = 'Enter your class code.'; err.style.display = 'block'; return; }

    btn.disabled = true; btn.textContent = 'Linking…';

    // Look up the class
    fetch(SUPABASE_URL + '/rest/v1/classes?select=*&code=eq.' + encodeURIComponent(code), {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    }).then(function(r) { return r.json(); }).then(function(classes) {
      if (!Array.isArray(classes) || classes.length === 0) {
        err.textContent = 'Class code not found. Check with your teacher.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Link to class →';
        return;
      }
      var cls = classes[0];

      // Insert a student record linked to this class, tagged with auth user id
      var token = ForgeAuth.accessToken();
      fetch(SUPABASE_URL + '/rest/v1/students', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + (token || SUPABASE_KEY),
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify({ name: name || 'Student', class_id: cls.id, auth_user_id: ForgeAuth.currentUser() ? ForgeAuth.currentUser().id : null })
      }).then(function(r) { return r.json(); }).then(function(rows) {
        var studentId = (Array.isArray(rows) && rows[0]) ? rows[0].id : null;
        // Save to localStorage so quiz picks it up
        try {
          localStorage.setItem('forge-student', JSON.stringify({
            studentId: studentId,
            classId: cls.id,
            studentName: name,
            classSubject: cls.subject || null
          }));
        } catch(e) {}
        renderLinked(cls, name);
      }).catch(function() {
        err.textContent = 'Could not link. Try again.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Link to class →';
      });
    }).catch(function() {
      err.textContent = 'Connection error. Try again.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Link to class →';
    });
  };
}

function renderLinked(cls, name) {
  var h = '<div class="success-icon">🔗</div>';
  h += '<div class="step-header">';
  h += '<span class="tag">All set</span>';
  h += '<h1>Linked to ' + (cls.name || 'your class') + '</h1>';
  h += '<p>Your teacher can now see your progress and set you assignments.</p>';
  h += '</div>';
  h += '<div class="success-card">';
  h += '<b>What your teacher can see:</b> your accuracy per spec point, misconceptions you\'ve triggered, and whether you\'ve completed any assignments they set. They cannot see your password or personal details.';
  h += '</div>';
  h += '<button class="btn-primary" onclick="window.location.href=\'forge-quiz.html\'">Go to the quiz →</button>';
  app.innerHTML = h;
}

function skipToQuiz() {
  window.location.href = 'forge-quiz.html';
}

// ── ALREADY SUBSCRIBED ────────────────────────────────────────
function renderAlreadySubscribed(sub) {
  var labels = (sub.subjects || []).map(subjLabel);

  var h = '<div class="step-header">';
  h += '<span class="tag">Already subscribed</span>';
  h += '<h1>You\'re already on Forge' + (sub.name ? ', ' + sub.name : '') + '.</h1>';
  h += '<p>Your subscription is active — log in from any device.</p>';
  h += '</div>';

  if (labels.length > 0) {
    h += '<div class="already-box">';
    h += '<div style="font-size:12px;color:#8A857E;margin-bottom:6px">Your subjects:</div>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
    labels.forEach(function(l) {
      h += '<span style="font-size:12px;padding:3px 10px;border-radius:6px;background:rgba(255,107,44,.1);border:1px solid rgba(255,107,44,.25);color:var(--ember)">' + l + '</span>';
    });
    h += '</div></div>';
  }

  h += '<button class="btn-primary" onclick="window.location.href=\'forge-quiz.html\'">Go to the quiz →</button>';
  h += '<button class="btn-ghost" onclick="ForgeAuth.signOut();renderStep1();" style="margin-top:8px">Sign out / use a different account</button>';

  app.innerHTML = h;
}
</script>

</body>
</html>
