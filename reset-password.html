<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge — Reset password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Sora:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--coal:#141210;--panel:#211E1B;--panel-2:#2A2622;--line:#3A342E;--ember:#FF6B2C;--hot:#FFC93C;--slate:#B8B4AD;--white:#F5F1EA;--good:#7FD98A;--bad:#FF5A5A}
[data-theme="light"]{--coal:#FAFAF8;--panel:#FFFFFF;--panel-2:#F3F2EF;--line:#E0DDD8;--ember:#E5550F;--hot:#C88500;--slate:#6B6660;--white:#1A1816;--good:#1B8C2A;--bad:#D42D2D}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--coal);color:var(--slate);font-family:'Sora',sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2{font-family:'Bricolage Grotesque',sans-serif;color:var(--white);line-height:1.1;letter-spacing:-.015em}
.wrap{max-width:460px;margin:0 auto;padding:40px 20px}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;color:var(--white);text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:40px}
.logo .spark{width:9px;height:9px;background:linear-gradient(135deg,var(--hot),var(--ember));border-radius:2px;transform:rotate(45deg);box-shadow:0 0 10px rgba(255,107,44,.7)}
.tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ember);display:block;margin-bottom:8px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--slate);margin-bottom:5px}
.field input{width:100%;padding:12px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);color:var(--white);font-family:'Sora',sans-serif;font-size:15px}
.field input:focus{outline:none;border-color:var(--ember)}
.field input::placeholder{color:#7A756E}
.btn{width:100%;padding:13px;border-radius:10px;background:linear-gradient(100deg,var(--hot),var(--ember));color:#111;border:none;font-family:'Sora',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px}
.btn:disabled{opacity:.5;cursor:wait}
.btn-ghost{display:block;text-align:center;margin-top:14px;font-size:13px;color:#8A857E;text-decoration:none;font-family:'Sora',sans-serif}
.btn-ghost:hover{color:var(--white)}
.err{color:var(--bad);font-size:13px;margin-top:10px;display:none;padding:10px 12px;border-radius:8px;background:rgba(255,90,90,.07);border:1px solid rgba(255,90,90,.25)}
.success{text-align:center;padding:8px 0}
.success-icon{font-size:44px;margin-bottom:16px}
.success h2{font-size:22px;margin-bottom:10px}
.success p{font-size:14px;color:#8A857E;line-height:1.6}
.strength-bar{height:3px;border-radius:2px;margin-top:6px;background:var(--line);overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.strength-label{font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:4px;height:14px}
.theme-toggle{background:var(--panel);border:1px solid var(--line);color:var(--slate);font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer;position:fixed;top:20px;right:20px;z-index:99}
</style>
</head>
<body>
<button class="theme-toggle" onclick="(function(){var h=document.documentElement,b=document.querySelector('.theme-toggle');if(h.getAttribute('data-theme')==='light'){h.removeAttribute('data-theme');b.textContent='\u2600 Light';localStorage.setItem('forge-theme','dark');}else{h.setAttribute('data-theme','light');b.textContent='\u263E Dark';localStorage.setItem('forge-theme','light');}})()">&#9728; Light</button>
<script>if(localStorage.getItem('forge-theme')==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').textContent='\u263E Dark';}</script>

<div class="wrap">
  <a class="logo" href="index.html"><span class="spark"></span>Forge</a>
  <div id="app"></div>
</div>

<script>
var SUPABASE_URL = 'https://crysulmbaadjkymcjrew.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyeXN1bG1iYWFkamt5bWNqcmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNDUzMzAsImV4cCI6MjA5OTgyMTMzMH0.Q69MKJR6_iEYkqJYXjn8RBhKhstAZShtmf0NiYM-8Vk';

var app = document.getElementById('app');

// ── STEP DETECTION ───────────────────────────────────────────
// Supabase sends the user to: reset-password.html#access_token=...&type=recovery
// We parse that hash to decide which step to show.
function parseHash() {
  var hash = window.location.hash.slice(1); // strip leading #
  var params = {};
  hash.split('&').forEach(function(pair) {
    var kv = pair.split('=');
    if (kv.length === 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
  });
  return params;
}

var hashParams = parseHash();
var isRecoveryLink = hashParams.type === 'recovery' && hashParams.access_token;

// ── STEP 1: REQUEST RESET EMAIL ─────────────────────────────
function renderRequestStep() {
  app.innerHTML = ''
    + '<span class="tag">Password reset</span>'
    + '<h1 style="font-size:26px;margin-bottom:8px">Forgot your password?</h1>'
    + '<p style="color:#8A857E;font-size:14px;margin-bottom:24px">Enter the email address you signed up with and we\'ll send a reset link.</p>'
    + '<div class="card">'
    + '<div class="field"><label for="r-email">Email address</label>'
    + '<input id="r-email" type="email" placeholder="e.g. alex@gmail.com" autocomplete="email"></div>'
    + '<button class="btn" id="r-btn">Send reset link \u2192</button>'
    + '<p class="err" id="r-err"></p>'
    + '</div>'
    + '<a href="forge-quiz.html" class="btn-ghost">\u2190 Back to log in</a>';

  document.getElementById('r-btn').onclick = function() {
    var email = document.getElementById('r-email').value.trim();
    var err   = document.getElementById('r-err');
    var btn   = document.getElementById('r-btn');

    err.style.display = 'none';
    if (!email || !email.includes('@')) {
      err.textContent = 'Enter a valid email address.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending\u2026';

    // Supabase Auth recovery endpoint — sends the reset email
    fetch(SUPABASE_URL + '/auth/v1/recover', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email: email })
    }).then(function(r) {
      // Supabase returns 200 even if the email doesn't exist (prevents enumeration)
      // so we always show the success state
      renderRequestSuccess(email);
    }).catch(function() {
      btn.disabled = false;
      btn.textContent = 'Send reset link \u2192';
      err.textContent = 'Connection error. Check your internet and try again.';
      err.style.display = 'block';
    });
  };

  // Allow Enter key on email field
  document.getElementById('r-email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('r-btn').click();
  });
}

function renderRequestSuccess(email) {
  app.innerHTML = ''
    + '<div class="card success">'
    + '<div class="success-icon">📬</div>'
    + '<h2>Check your inbox</h2>'
    + '<p>We\'ve sent a reset link to <b style="color:var(--white)">' + email + '</b>.<br><br>'
    + 'Click the link in the email — it\'ll bring you back here to set a new password.<br><br>'
    + '<span style="color:#8A857E;font-size:13px">The link expires in 1 hour. If you don\'t see it, check your spam folder.</span>'
    + '</p>'
    + '</div>'
    + '<a href="forge-quiz.html" class="btn-ghost">\u2190 Back to log in</a>';
}

// ── STEP 2: SET NEW PASSWORD ─────────────────────────────────
function renderSetPasswordStep(token) {
  app.innerHTML = ''
    + '<span class="tag">Password reset</span>'
    + '<h1 style="font-size:26px;margin-bottom:8px">Set a new password</h1>'
    + '<p style="color:#8A857E;font-size:14px;margin-bottom:24px">Choose a strong password. You\'ll use this to log in from any device.</p>'
    + '<div class="card">'
    + '<div class="field"><label for="np-pass">New password</label>'
    + '<input id="np-pass" type="password" placeholder="At least 8 characters" autocomplete="new-password">'
    + '<div class="strength-bar"><div class="strength-fill" id="np-strength-bar"></div></div>'
    + '<div class="strength-label" id="np-strength-label"></div>'
    + '</div>'
    + '<div class="field"><label for="np-pass2">Confirm new password</label>'
    + '<input id="np-pass2" type="password" placeholder="Repeat your password" autocomplete="new-password"></div>'
    + '<button class="btn" id="np-btn">Set new password \u2192</button>'
    + '<p class="err" id="np-err"></p>'
    + '</div>';

  // Live password strength indicator
  document.getElementById('np-pass').addEventListener('input', function() {
    var val = this.value;
    var score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    var pct   = Math.min(100, score * 20);
    var col   = score <= 1 ? 'var(--bad)' : score <= 3 ? 'var(--hot)' : 'var(--good)';
    var label = score <= 1 ? 'Weak' : score <= 2 ? 'Fair' : score <= 3 ? 'Good' : 'Strong';
    var bar   = document.getElementById('np-strength-bar');
    var lbl   = document.getElementById('np-strength-label');
    if (bar) { bar.style.width = pct + '%'; bar.style.background = col; }
    if (lbl) { lbl.textContent = val.length > 0 ? label : ''; lbl.style.color = col; }
  });

  document.getElementById('np-btn').onclick = function() {
    var pass  = document.getElementById('np-pass').value;
    var pass2 = document.getElementById('np-pass2').value;
    var err   = document.getElementById('np-err');
    var btn   = document.getElementById('np-btn');

    err.style.display = 'none';
    if (pass.length < 8) {
      err.textContent = 'Password must be at least 8 characters.';
      err.style.display = 'block'; return;
    }
    if (pass !== pass2) {
      err.textContent = 'Passwords don\'t match.';
      err.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.textContent = 'Saving\u2026';

    // PATCH /auth/v1/user with the recovery token as the Bearer
    fetch(SUPABASE_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ password: pass })
    }).then(function(r) {
      if (!r.ok) {
        return r.json().then(function(body) {
          throw new Error(body.message || body.error_description || 'Could not update password.');
        });
      }
      renderSetPasswordSuccess();
    }).catch(function(e) {
      btn.disabled = false;
      btn.textContent = 'Set new password \u2192';
      err.textContent = e.message || 'Something went wrong. The reset link may have expired — request a new one.';
      err.style.display = 'block';
    });
  };

  // Enter key on confirm field
  document.getElementById('np-pass2').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('np-btn').click();
  });
}

function renderSetPasswordSuccess() {
  // Clear the hash so the token can't be reused if the user refreshes
  if (window.history && window.history.replaceState) {
    window.history.replaceState(null, '', window.location.pathname);
  }
  app.innerHTML = ''
    + '<div class="card success">'
    + '<div class="success-icon">✓</div>'
    + '<h2>Password updated</h2>'
    + '<p>Your password has been changed. You can now log in with your new password.</p>'
    + '</div>'
    + '<a href="forge-quiz.html" style="display:block;text-align:center;margin-top:20px;padding:13px;border-radius:10px;background:linear-gradient(100deg,var(--hot),var(--ember));color:#111;font-family:Sora,sans-serif;font-weight:700;font-size:15px;text-decoration:none">Log in \u2192</a>';
}

// ── INIT ─────────────────────────────────────────────────────
if (isRecoveryLink) {
  renderSetPasswordStep(hashParams.access_token);
} else {
  renderRequestStep();
}
</script>
</body>
</html>
