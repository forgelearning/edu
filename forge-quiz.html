<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Sora:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--coal:#141210;--panel:#211E1B;--panel-2:#2A2622;--line:#3A342E;--ember:#FF6B2C;--hot:#FFC93C;--slate:#B8B4AD;--white:#F5F1EA;--good:#7FD98A;--bad:#FF5A5A}
[data-theme="light"]{--coal:#FAFAF8;--panel:#FFFFFF;--panel-2:#F3F2EF;--line:#E0DDD8;--ember:#E5550F;--hot:#C88500;--slate:#6B6660;--white:#1A1816;--good:#1B8C2A;--bad:#D42D2D}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--coal);color:var(--slate);font-family:'Sora',sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;color:var(--white);line-height:1.1;letter-spacing:-.015em}
.mono{font-family:'JetBrains Mono',monospace}
.wrap{max-width:680px;margin:0 auto;padding:28px 20px}
.tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ember)}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;color:var(--white);text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:28px}
.logo .spark{width:9px;height:9px;background:linear-gradient(135deg,var(--hot),var(--ember));border-radius:2px;transform:rotate(45deg);box-shadow:0 0 10px rgba(255,107,44,.7)}
.subject-list{display:flex;flex-direction:column;gap:12px;margin-top:28px}
.subject-btn{padding:20px 22px;border-radius:12px;border:2px solid transparent;background:var(--panel);cursor:pointer;text-align:left;font-family:'Sora',sans-serif;transition:border-color .15s}
.subject-btn:hover{border-color:var(--ember)}
.subject-btn h3{font-size:18px;margin-bottom:2px}
.subject-btn .sub{font-size:13px;color:var(--slate)}
.subject-btn .count{font-size:12px;color:#8A857E;margin-top:3px}
.back-btn{background:none;border:none;cursor:pointer;font-size:13px;color:#8A857E;font-family:'Sora',sans-serif;margin-bottom:16px;padding:0}
.back-btn:hover{color:var(--white)}
.bank-list{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.bank-btn{padding:14px 18px;border-radius:10px;border:1.5px solid var(--line);background:var(--panel);cursor:pointer;text-align:left;font-family:'Sora',sans-serif;transition:border-color .15s}
.bank-btn:hover{border-color:var(--ember)}
.bank-btn .code{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bank-btn .name{font-size:16px;font-weight:700;color:var(--white);margin-top:1px}
.bank-btn .qcount{font-size:12px;color:#8A857E;margin-top:1px}
.progress-bar{height:3px;background:var(--line);border-radius:2px;margin-bottom:24px}
.progress-fill{height:3px;border-radius:2px;transition:width .3s}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px;color:#8A857E}
.quiz-header .bank-name{font-weight:700;font-size:14px}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px;color:#8A857E}
.q-id{font-weight:600;padding:2px 10px;border-radius:4px;font-size:12px}
.stem{font-size:16px;line-height:1.55;color:var(--white);margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;border:1.5px solid var(--line);background:var(--panel-2);color:var(--white);cursor:pointer;text-align:left;font-family:'Sora',sans-serif;font-size:15px;line-height:1.45;transition:border-color .15s,background .15s,opacity .15s;width:100%}
.opt:hover:not(.answered){border-color:var(--ember)}
.opt .letter{font-weight:700;min-width:20px;color:#8A857E}
.opt.answered{cursor:default}
.opt.correct{border-color:var(--good);background:rgba(127,217,138,.08);opacity:1}
.opt.correct .letter{color:var(--good)}
.opt.wrong{border-color:var(--bad);background:rgba(255,90,90,.07);opacity:1}
.opt.wrong .letter{color:var(--bad)}
.opt.dimmed{opacity:.5}
.scaffold-box{margin-top:16px;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,201,60,.4);background:linear-gradient(180deg,rgba(255,107,44,.10),rgba(255,201,60,.05));animation:heat .5s ease}
@keyframes heat{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.scaffold-box .stag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--coal);background:var(--hot);padding:2px 8px;border-radius:5px;font-weight:600;margin-bottom:8px}
.scaffold-box p{font-size:14px;color:var(--white);line-height:1.5}
.praise-box{margin-top:16px;padding:14px 16px;border-radius:12px;border:1px solid var(--good);background:rgba(127,217,138,.08);color:var(--good);font-weight:600;font-size:14px}
.reforge-trigger{margin-top:14px;padding:10px 20px;border-radius:8px;background:var(--ember);color:var(--coal);border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:'Sora',sans-serif}
.reforge-box{margin-top:20px;padding:18px 16px;border-radius:10px;border:1.5px solid var(--line);background:var(--panel)}
.reforge-box .rf-tag{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.reforge-box .rf-stem{font-size:15px;line-height:1.5;color:var(--white);margin-bottom:14px}
.reforge-box .opt{font-size:14px;padding:10px 12px;border-radius:8px}
.rf-scaffold{margin-top:12px;padding:12px 14px;border-radius:8px;border:1px solid rgba(255,201,60,.4);background:linear-gradient(180deg,rgba(255,107,44,.08),rgba(255,201,60,.04));font-size:13px;line-height:1.5}
.rf-scaffold .stag{font-size:10px;margin-bottom:6px;display:inline-block;font-family:'JetBrains Mono',monospace;color:var(--coal);background:var(--hot);padding:2px 6px;border-radius:4px;font-weight:600}
.rf-scaffold p{color:var(--white);font-size:13px}
.next-btn{margin-top:18px;padding:10px 24px;border-radius:8px;background:var(--white);color:var(--coal);border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:'Sora',sans-serif;float:right}
.clear{clear:both}
.results{text-align:center;padding-top:80px}
.results .pct{font-size:72px;font-weight:900;font-family:'Bricolage Grotesque',sans-serif}
.results .detail{font-size:17px;color:#8A857E;margin:4px 0 28px}
.results .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.results .btns button{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:'Sora',sans-serif}
.btn-primary{background:var(--ember);color:var(--coal)}
.btn-secondary{background:var(--panel);color:var(--white);border:1px solid var(--line)!important}
.center{text-align:center}
.hidden{display:none}
/* join screen */
.join-input{width:100%;padding:12px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--white);font-family:'Sora',sans-serif;font-size:15px;margin-bottom:14px}
.join-input::placeholder{color:#7A756E}
.join-input:focus{outline:none;border-color:var(--ember)}
.join-btn{width:100%;padding:13px;border-radius:9px;background:var(--ember);color:var(--coal);border:none;font-family:'Sora',sans-serif;font-weight:600;font-size:15px;cursor:pointer}
.join-btn:hover{background:var(--hot)}
.join-btn:disabled{opacity:.5;cursor:wait}
.skip-btn{background:none;border:none;color:var(--slate);font-size:13px;margin-top:16px;cursor:pointer;width:100%;text-align:center;font-family:'Sora',sans-serif}
.skip-btn:hover{color:var(--white)}
.join-err{color:var(--bad);font-size:13px;margin-top:10px;display:none}
.join-badge{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:4px 12px;font-size:12px;color:var(--slate);margin-bottom:8px}
.join-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--good)}
/* light mode overrides */
[data-theme="light"] .scaffold-box{border-color:rgba(200,133,0,.4);background:linear-gradient(180deg,rgba(229,85,15,.06),rgba(200,133,0,.03))}
[data-theme="light"] .stag,[data-theme="light"] .heat-tag{color:#fff}
[data-theme="light"] .reforge-trigger,.btn-primary{color:#fff}
[data-theme="light"] .rf-scaffold .stag{color:#fff}
.theme-toggle{background:var(--panel);border:1px solid var(--line);color:var(--slate);font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer;position:fixed;top:20px;right:20px;z-index:99}
.theme-toggle:hover{color:var(--white);border-color:var(--ember)}
</style>
</head>
<body>
<button class="theme-toggle" onclick="(function(){var h=document.documentElement,b=document.querySelector('.theme-toggle');if(h.getAttribute('data-theme')==='light'){h.removeAttribute('data-theme');b.textContent='\u2600 Light';localStorage.setItem('forge-theme','dark');}else{h.setAttribute('data-theme','light');b.textContent='\u263E Dark';localStorage.setItem('forge-theme','light');}})()">☀ Light</button>
<script>if(localStorage.getItem('forge-theme')==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').textContent='\u263E Dark';}</script>
<div class="wrap">
  <a class="logo" href="index.html"><span class="spark"></span>Forge</a>
  <div id="app"></div>
</div>

<script>
// ===== SUPABASE =====
// Replace these with your Supabase project values (Settings > API)
var SUPABASE_URL = 'https://crysulmbaadjkymcjrew.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyeXN1bG1iYWFkamt5bWNqcmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNDUzMzAsImV4cCI6MjA5OTgyMTMzMH0.Q69MKJR6_iEYkqJYXjn8RBhKhstAZShtmf0NiYM-8Vk';

var supa = {
  _headers: function() {
    return {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Prefer': 'return=representation'
    };
  },
  _configured: function() {
    return SUPABASE_URL.indexOf('YOUR-PROJECT') === -1;
  },
  insert: function(table, row) {
    if (!this._configured()) return Promise.resolve(null);
    return fetch(SUPABASE_URL + '/rest/v1/' + table, {
      method: 'POST',
      headers: this._headers(),
      body: JSON.stringify(row)
    }).then(function(r) { return r.json(); }).catch(function() { return null; });
  },
  select: function(table, filters) {
    if (!this._configured()) return Promise.resolve([]);
    var params = ['select=*'];
    if (filters) {
      for (var k in filters) { params.push(k + '=eq.' + filters[k]); }
    }
    return fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + params.join('&'), {
      headers: this._headers()
    }).then(function(r) { return r.json(); }).catch(function() { return []; });
  }
};

function getSubjectForBank(bankKey) {
  for (var s in SUBJECTS) {
    if (SUBJECTS[s].banks.indexOf(bankKey) !== -1) return s;
  }
  return 'unknown';
}

function logResponse(q, selectedKey, isCorrect, isReforge, reforgeCorrect) {
  if (!state.studentId) return;
  supa.insert('responses', {
    student_id: state.studentId,
    class_id: state.classId,
    question_id: isReforge ? q.id + '-RF' : q.id,
    bank: state.bank,
    subject: getSubjectForBank(state.bank),
    selected_option: selectedKey,
    is_correct: isCorrect,
    misconception_tag: isCorrect ? null : (q.tag || null),
    reforge_attempted: isReforge || false,
    reforge_correct: isReforge ? reforgeCorrect : null
  });
}

// ===== DATA =====
const BANKS = {
  "2.1.1": {
    label: "Economic Growth",
    color: "#2563eb",
    questions: [
      {
        id:"GRO-01",stem:"UK real GDP was £2.1tn in 2022 and £2.15tn in 2023. A student says: 'The UK has high economic growth because GDP is over £2 trillion.' What is wrong with this statement?",
        options:{A:"Nothing — a GDP above £2 trillion does indicate high growth.",B:"The student is describing the level of GDP, not the rate of growth; growth here is approximately 2.4%.",C:"The student should have used nominal GDP, not real GDP.",D:"Growth can only be measured using GDP per capita."},
        correct:"B",tag:"MC-GRO-01",
        scaffold:"Growth is a rate of change, not a level. A country can have a massive GDP but near-zero growth. Calculate: ((2.15 − 2.1) / 2.1) × 100 ≈ 2.4%.",
        reforge:{stem:"Country X has GDP of $500bn growing at 6% p.a. Country Y has GDP of $15tn growing at 1.2% p.a. Which has higher economic growth?",options:{A:"Country Y, because its GDP is larger.",B:"Country X, because 6% > 1.2% — growth is about the rate, not the level.",C:"They are equal because both are growing.",D:"It cannot be determined without knowing population."},correct:"B"}
      },
      {
        id:"GRO-02",stem:"A government cuts income tax to boost consumer spending, raising short-run real GDP. Which best describes what has occurred?",
        options:{A:"Potential growth — productive capacity has increased.",B:"Actual growth — real GDP rose due to higher AD, but productive capacity is unchanged.",C:"Both actual and potential growth, since GDP increased.",D:"Neither, because tax cuts don't affect growth."},
        correct:"B",tag:"MC-GRO-02",
        scaffold:"Actual growth = using more existing capacity (AD shifts right). Potential growth = expanding capacity itself (LRAS shifts right). A tax cut stimulates demand — it doesn't build new factories.",
        reforge:{stem:"A government invests in broadband and STEM education over 10 years. Which type of growth does this primarily represent?",options:{A:"Actual growth — AD increases immediately.",B:"Potential growth — productive capacity shifts outward over time.",C:"Neither — it's fiscal policy, not growth.",D:"Actual growth, because G is a component of AD."},correct:"B"}
      },
      {
        id:"GRO-03",stem:"The economy is producing above its trend level of output. What type of output gap does this represent?",
        options:{A:"A negative output gap — spare capacity exists.",B:"A positive output gap — actual GDP exceeds potential GDP.",C:"A positive output gap — spare capacity for further growth.",D:"No output gap exists when the economy is growing."},
        correct:"B",tag:"MC-GRO-03",
        scaffold:"Positive output gap = actual > potential → overheating, inflationary pressure. Negative = actual < potential → spare capacity, higher unemployment. 'Positive' means the gap is above zero, not that it's good.",
        reforge:{stem:"Unemployment is rising and factories run below capacity. Which is correct?",options:{A:"Positive output gap because production is positive.",B:"Negative output gap — actual output is below potential.",C:"Positive output gap — spare capacity means room to grow.",D:"Output gaps only exist during recessions."},correct:"B"}
      },
      {
        id:"GRO-04",stem:"On a trade cycle diagram, which phase shows real GDP rising back toward the trend line after a trough?",
        options:{A:"Boom",B:"Recession",C:"Recovery",D:"Slowdown"},
        correct:"C",tag:"MC-GRO-04",
        scaffold:"Trade cycle: boom → recession → trough → recovery. Recovery is the upswing from the trough — real GDP is increasing back toward (and eventually past) trend.",
        reforge:{stem:"During recovery, which is most likely?",options:{A:"Real GDP falling toward the trough.",B:"Real GDP flat at trend.",C:"Real GDP rising; the negative output gap narrowing.",D:"Inflation at its highest — economy overheating."},correct:"C"}
      },
      {
        id:"GRO-05",stem:"Between 2010 and 2023, UK GDP per capita grew more slowly than total GDP. Which factor best explains this?",
        options:{A:"The UK experienced deflation.",B:"Population growth meant output was shared among more people.",C:"GDP per capita only measures services.",D:"Total GDP was nominal while per capita was real."},
        correct:"B",tag:"MC-GRO-01",
        scaffold:"GDP per capita = GDP ÷ population. If population grows alongside GDP, per-capita growth will be lower than headline GDP growth.",
        reforge:{stem:"Country Z's GDP grows at 4% but population also grows at 3.5%. What can we say about living standards?",options:{A:"Rising rapidly at 4%.",B:"Broadly stagnant — per-capita growth is only ~0.5%.",C:"Falling because population growth is unsustainable.",D:"We cannot comment using GDP data."},correct:"B"}
      },
      {
        id:"GRO-06",stem:"LRAS shifts right through investment in education and technology. What happens to long-run price level and real output?",
        options:{A:"Price level rises, output rises.",B:"Price level falls (or rises more slowly), output rises.",C:"Both unchanged.",D:"Price level falls, output falls."},
        correct:"B",tag:"MC-GRO-02",
        scaffold:"A rightward LRAS shift increases productive capacity. With the same AD, more output is produced at a lower price level — non-inflationary growth.",
        reforge:{stem:"Which correctly matches growth type to its AD/AS effect?",options:{A:"Actual = LRAS right; Potential = AD right.",B:"Actual = AD right (along SRAS); Potential = LRAS right.",C:"Both shift AD right.",D:"Actual growth has no diagram."},correct:"B"}
      },
      {
        id:"GRO-08",stem:"The UK's PPF shifts outward. Which could have caused this?",
        options:{A:"A rise in consumer confidence.",B:"Net migration of skilled workers and new capital investment.",C:"A cut in interest rates by the BoE.",D:"A rise in the exchange rate making imports cheaper."},
        correct:"B",tag:"MC-GRO-02",
        scaffold:"PPF shifts outward when quantity/quality of factors of production increases. Demand-side changes move the economy along/toward the PPF, not outward.",
        reforge:{stem:"Which represents a movement FROM inside the PPF TO the boundary, not a shift?",options:{A:"Discovery of new oil reserves.",B:"Reducing structural unemployment, putting idle workers back into production.",C:"AI breakthrough raising all-sector productivity.",D:"Large-scale apprenticeship programme."},correct:"B"}
      },
      {
        id:"GRO-09",stem:"UK real GDP grew by 0.1% in 2023. A student writes: 'The economy shrank because growth was almost zero.' Is this correct?",
        options:{A:"Yes — 0.1% is effectively a contraction.",B:"No — the economy still grew, just slowly. Contraction requires negative growth.",C:"Yes — growth below 2% counts as recession.",D:"No — but only because 0.1% is above the inflation target."},
        correct:"B",tag:"MC-GRO-01",
        scaffold:"Growth means real GDP increased. Even 0.1% is growth, not contraction. A recession = two consecutive quarters of negative GDP growth.",
        reforge:{stem:"GDP growth: −0.3% (Q1), −0.1% (Q2), +0.4% (Q3). Which is accurate?",options:{A:"Recession for all three quarters.",B:"Recession in Q1–Q2 (two consecutive negative quarters), then growth returned in Q3.",C:"No recession because the annual total is positive.",D:"Recession only applies below −1%."},correct:"B"}
      }
    ]
  },
  "2.1.2": {
    label: "Inflation",
    color: "#dc2626",
    questions: [
      {
        id:"INF-01",stem:"UK CPI rose from 120 to 126 over a year. A student says: 'Prices are high.' What is the correct interpretation?",
        options:{A:"The student is right — 126 is a high price level.",B:"The student is confusing the price level with inflation. Inflation is the rate of change: prices rose by 5%, which is the inflation rate.",C:"The CPI doesn't measure prices.",D:"126 means prices fell."},
        correct:"B",tag:"MC-INF-01",
        scaffold:"Inflation = the rate of change of the price level, not the level itself. A CPI of 126 tells you the level; the inflation rate is ((126−120)/120)×100 = 5%. High prices ≠ high inflation — prices could be high but stable (0% inflation).",
        reforge:{stem:"A country's CPI is 200 but hasn't changed in 3 years. What is the inflation rate?",options:{A:"200% — the CPI is very high.",B:"0% — the price level is unchanged, so inflation is zero.",C:"100% — it has doubled from a base of 100.",D:"It cannot be calculated from CPI data."},correct:"B"}
      },
      {
        id:"INF-02",stem:"A student says the CPI basket 'always contains the same goods.' Why is this wrong?",
        options:{A:"It's not wrong — the basket is fixed by law.",B:"The basket is updated annually to reflect changing consumer spending patterns, e.g. streaming services replacing DVD purchases.",C:"The basket only contains food and fuel.",D:"The basket changes daily."},
        correct:"B",tag:"MC-INF-02",
        scaffold:"The ONS updates the CPI basket every year. Items are added (e.g. oat milk, smartwatches) and removed (e.g. CD players) to reflect how households actually spend. A fixed basket would quickly become unrepresentative.",
        reforge:{stem:"Which is a valid limitation of CPI despite annual basket updates?",options:{A:"It never changes so it's always outdated.",B:"It reflects average spending patterns, so it may not represent any individual household's experience of inflation.",C:"It only measures food prices.",D:"It includes housing costs in the same way as RPI."},correct:"B"}
      },
      {
        id:"INF-03",stem:"A student writes: 'Demand-pull inflation is too much money chasing too few goods' but cannot explain it using a diagram. Which diagram explanation is correct?",
        options:{A:"SRAS shifts left, pushing the price level up.",B:"AD shifts right (e.g. from higher consumer spending, government spending, or money supply), moving the economy along SRAS and raising the price level.",C:"LRAS shifts right, reducing the price level.",D:"AD shifts left, creating deflation."},
        correct:"B",tag:"MC-INF-03",
        scaffold:"Demand-pull inflation: AD shifts right → economy moves along the SRAS → higher price level AND higher real output (up to full capacity). Causes include: rising consumer confidence, fiscal stimulus, lower interest rates, weaker exchange rate boosting net exports.",
        reforge:{stem:"Which of these would cause demand-pull inflation?",options:{A:"A rise in oil prices increasing firms' costs.",B:"A large cut in income tax boosting disposable income and shifting AD right.",C:"New regulations increasing the cost of production.",D:"A fall in consumer confidence."},correct:"B"}
      },
      {
        id:"INF-04",stem:"A student explains cost-push inflation using only wage increases. Which additional cost factors should they include?",
        options:{A:"None — wages are the only cost-push factor.",B:"Raw material prices (e.g. oil), energy costs, exchange rate depreciation (raising import prices), and indirect taxes.",C:"Consumer confidence and government spending.",D:"Interest rates and money supply."},
        correct:"B",tag:"MC-INF-04",
        scaffold:"Cost-push inflation = SRAS shifts left due to higher production costs. Wages are ONE factor, but also: commodity/energy prices (oil shocks), exchange rate depreciation (imports cost more in domestic currency), higher indirect taxes (VAT), supply chain disruptions.",
        reforge:{stem:"Sterling depreciates by 15%. How might this cause cost-push inflation?",options:{A:"It can't — exchange rates only affect the current account.",B:"Imported raw materials and components cost more in pounds, raising firms' production costs and shifting SRAS left.",C:"It makes exports cheaper, reducing costs.",D:"It increases consumer confidence, causing demand-pull inflation."},correct:"B"}
      },
      {
        id:"INF-05",stem:"A student claims: 'All deflation is bad for the economy.' How should this be evaluated?",
        options:{A:"The student is correct — deflation always causes recession.",B:"Deflation from falling demand (malign) can cause debt spirals and recession, but deflation from productivity improvements (benign) can raise real incomes and living standards.",C:"Deflation is always good because prices are falling.",D:"Deflation and disinflation are the same thing."},
        correct:"B",tag:"MC-INF-05",
        scaffold:"Malign deflation: falling AD → lower prices, but also falling output, rising unemployment, rising real debt burden → deflationary spiral (Japan 1990s–2000s). Benign deflation: technological progress / productivity gains → costs fall → prices fall while output rises (e.g. consumer electronics). Context matters.",
        reforge:{stem:"The price of electronics falls by 8% over a year due to improved manufacturing technology, while the overall economy grows at 3%. Is this harmful deflation?",options:{A:"Yes — any falling prices are dangerous.",B:"No — this is benign deflation driven by productivity gains; output is still rising and the economy is growing.",C:"Yes — it will cause a deflationary spiral.",D:"No — because 8% is below the 10% danger threshold."},correct:"B"}
      },
      {

      id:"BNK-01",stem:"The primary function of commercial banks is:",
      options:{A:"Setting interest rates for the economy.",B:"Financial intermediation — accepting deposits from savers and lending to borrowers, profiting from the interest rate spread.",C:"Printing money.",D:"Regulating other financial institutions."},
      correct:"B",tag:"MC-BNK-01",
      scaffold:"Commercial banks are intermediaries: they pool deposits (liabilities) and lend them out (assets), earning the spread between deposit and lending rates. They also: provide payment systems, offer financial products (insurance, investments), and — crucially — create money through the credit creation multiplier.",
      reforge:{stem:"A bank pays 2% interest on savings accounts and charges 6% on loans. The 4% difference is called:",options:{A:"Inflation.",B:"The interest rate spread (or margin) — this is how the bank earns profit from its core intermediation role.",C:"The base rate.",D:"Quantitative easing."},correct:"B"}
    },
    {
      id:"BNK-02",stem:"How do commercial banks 'create' money?",
      options:{A:"They print banknotes in their vaults.",B:"Through the credit creation multiplier: when a bank receives a deposit, it keeps a fraction as reserves and lends the rest. That loan becomes a deposit elsewhere, which is partly re-lent, and so on — multiplying the original deposit into a larger money supply.",C:"They cannot create money — only the central bank can.",D:"By raising interest rates."},
      correct:"B",tag:"MC-BNK-02",
      scaffold:"Example: £1,000 deposited, 10% reserve ratio. Bank lends £900 → deposited elsewhere → that bank lends £810 → and so on. Total money created = £1,000 × (1/0.1) = £10,000. Banks don't print money — they create it through lending. This is why bank regulation matters: excessive lending inflates the money supply.",
      reforge:{stem:"If the reserve ratio increases from 10% to 20%, what happens to the credit creation multiplier?",options:{A:"It doubles.",B:"It halves — from 10 (1/0.1) to 5 (1/0.2) — banks must hold more reserves, so less is available to lend at each stage.",C:"It is unchanged.",D:"It becomes zero."},correct:"B"}
    },
    {
      id:"BNK-03",stem:"Evaluate whether the government was right to bail out the banks in 2008. (4 marks)",
      type:"short_answer",
      model_answer:"Banks are 'systemically important' — their failure would have frozen lending, collapsing the payment system and triggering widespread business failures and unemployment (K+An). However, the bailout cost taxpayers billions, created moral hazard (banks expect future rescues, incentivising risk-taking), and diverted public funds from other priorities like health and education — the opportunity cost was significant (Ev).",
      tag:["MC-BNK-03","MC-FMK-03"],
      scaffold:"The 2019 examiner report noted top answers discussed: systemic risk (bank failure spreads through the economy), the run on Northern Rock, moral hazard from the expectation of bailouts, and the opportunity cost of public funds. Both sides needed, with context."
    },
    {
      id:"BNK-04",stem:"Which of the following is a regulatory measure introduced after the 2008 financial crisis?",
      options:{A:"Abolishing all banking regulation.",B:"Higher capital requirements (e.g. Basel III) — banks must hold more capital as a buffer against losses, reducing the risk of insolvency.",C:"Allowing banks to lend without any reserves.",D:"Merging all banks into one state bank."},
      correct:"B",tag:"MC-BNK-04",
      scaffold:"Post-2008 reforms: (1) Higher capital/liquidity requirements (Basel III) — more reserves, less leverage. (2) Ring-fencing — separating retail banking from investment banking. (3) Stress testing — regulators check if banks can survive hypothetical shocks. (4) Living wills — plans for orderly failure without taxpayer bailouts. All aim to prevent 'too big to fail.'",
      reforge:{stem:"Ring-fencing requires banks to:",options:{A:"Close all overseas branches.",B:"Separate their retail operations (deposits, mortgages) from riskier investment banking activities, so that speculative losses don't threaten ordinary customers' savings.",C:"Merge with competitors.",D:"Stop lending entirely."},correct:"B"}
    },
    {
      id:"BNK-05",stem:"Why are banks sometimes described as 'too big to fail'?",
      options:{A:"Because large banks are always profitable.",B:"Because their failure would cause systemic risk — interconnected with other banks, businesses, and households, their collapse would cascade through the economy, making government intervention (bailout) feel unavoidable despite the moral hazard it creates.",C:"Because the government owns them.",D:"Because they hold all the country's gold reserves."},
      correct:"B",tag:"MC-BNK-03",
      scaffold:"Systemic risk: banks lend to each other (interbank market). If one large bank fails → other banks lose money → they can't lend → credit freezes → businesses can't borrow → layoffs, closures, recession. This interconnectedness makes government reluctant to let them fail — but bailouts create moral hazard.",
      reforge:{stem:"A policy of 'too big to fail' creates moral hazard because:",options:{A:"Banks become too cautious.",B:"Banks take excessive risks knowing they'll be rescued if things go wrong — the implicit government guarantee removes the downside, incentivising reckless behaviour.",C:"Small banks are unfairly treated.",D:"It increases competition."},correct:"B"}
    }
  ]
};

      model_answer:"To control inflation, the BoE raises interest rates, which reduces AD and dampens price pressures (K). However, this also slows economic growth and may increase unemployment — the Phillips curve trade-off (An). Furthermore, higher rates strengthen the exchange rate, making exports less competitive and potentially worsening the current account deficit (An). The central bank faces a dilemma: prioritising inflation control comes at the cost of growth, jobs, and trade competitiveness — particularly when inflation is cost-push rather than demand-pull, since rate rises address demand but not supply-side causes (Ev).",

      correct:"B",tag:"MC-CB-05",

BANKS["PSY-SI"] = {

      options:{A:"5%",B:"75%",C:"50%",D:"100%"},

      scaffold:"About 75% conformed at least once, but the overall conformity rate (across all trials) was ~37%. Students often confuse these two figures. 25% never conformed at all. Key: most people conformed sometimes, not always — suggesting situational pressure rather than permanent trait.",

    {
      id:"SI-02",stem:"A student defines compliance as 'genuinely changing your mind to agree with the group.' What type of conformity are they actually describing?",
      options:{A:"Compliance — they are correct.",B:"Internalisation — genuine, private acceptance of the group's views. Compliance is publicly going along while privately disagreeing.",C:"Identification — adopting views to fit into a group role.",D:"Obedience — following an authority figure."},
      correct:"B",tag:"MC-SI-02",

      reforge:{stem:"In Milgram's variation where the experimenter gave instructions by telephone rather than in person, obedience dropped to ~21%. What does this suggest?",options:{A:"The study lacked validity.",B:"Proximity of the authority figure is a key situational variable — reduced authority presence weakens the agentic state and increases the likelihood of defiance.",C:"Obedience is entirely determined by personality.",D:"Telephone instructions are always ignored."},correct:"B"}

    {
      id:"SI-04",stem:"A student explains obedience using the term 'agentic state' but cannot define it. The correct definition is:",
      options:{A:"A state where a person acts on their own conscience.",B:"A mental state where a person sees themselves as an agent carrying out another person's wishes — they shift responsibility to the authority figure, reducing moral strain.",C:"A state of total free will.",D:"A personality type that is always obedient."},
      correct:"B",tag:"MC-SI-04",
      scaffold:"Agentic state (Milgram): the person acts as an 'agent' of the authority, giving up personal responsibility. Opposite = autonomous state (acting on own free will). The 'agentic shift' occurs when someone perceives a legitimate authority and enters the agentic state. This explains WHY people obey even when distressed — they don't feel personally responsible.",
      reforge:{stem:"A nurse administers a drug she thinks is too high a dose because the doctor ordered it. She says: 'I was just following orders.' This illustrates:",options:{A:"The autonomous state — she made her own decision.",B:"The agentic state — she has shifted responsibility to the doctor (the authority figure) and sees herself as merely carrying out instructions.",C:"Internalisation — she genuinely believes the dose is correct.",D:"Minority influence."},correct:"B"}
    },
    {
      id:"SI-05",stem:"Moscovici's (1969) blue-green slide study investigated minority influence. What was his key finding about consistency?",
      options:{A:"Consistency had no effect on the minority's influence.",B:"When the minority consistently called blue slides 'green' (on every trial), they influenced about 8% of the majority's answers — but an inconsistent minority had almost no effect.",C:"The majority always resisted the minority.",D:"Only majorities can influence individuals."},
      correct:"B",tag:"MC-SI-05",

      reforge:{stem:"According to the snowball effect, how does minority influence lead to wider social change?",options:{A:"The minority forces the majority to agree immediately.",B:"The consistent minority converts a few individuals, who convert others, gradually shifting the majority position over time — like a snowball gathering mass.",C:"Social change only happens through majority pressure.",D:"The minority gives up after being rejected."},correct:"B"}
    },
    {
      id:"SI-06",stem:"A student confuses normative social influence (NSI) and informational social influence (ISI). Which correctly distinguishes them?",
      options:{A:"NSI = conforming because you want to be right; ISI = conforming because you want to be liked.",B:"NSI = conforming to be accepted/avoid rejection (need for social approval); ISI = conforming because you believe the group is correct (need for information in ambiguous situations).",C:"They are the same concept.",D:"NSI only applies to Milgram; ISI only applies to Asch."},

      reforge:{stem:"During a fire alarm, you're unsure if it's real. You see everyone calmly staying in their seats, so you stay too. This is most likely:",options:{A:"NSI — you want them to like you.",B:"ISI — the situation is ambiguous and you look to others for information about the correct response, concluding it must be a drill.",C:"Obedience — someone told you to stay.",D:"Minority influence."},correct:"B"}
    },
    {
      id:"SI-07",stem:"Evaluate Milgram's research in terms of ethical issues. (4 marks)",
      type:"short_answer",
      model_answer:"Milgram's participants experienced significant psychological distress — trembling, sweating, and nervous breakdowns — violating the ethical principle of protection from harm (AO1). He also deceived participants about the true nature of the study (they believed shocks were real), preventing fully informed consent (AO1). However, Milgram debriefed all participants afterward and followed up: 84% said they were glad to have participated, and a psychiatrist found no lasting harm — suggesting the ethical cost may be outweighed by the study's enormous contribution to understanding destructive obedience (AO3).",
      tag:["MC-SI-03","MC-TECH-02"],

    {
      id:"SI-08",stem:"Which of the following is a limitation of Asch's conformity research?",
      options:{A:"It has no limitations — it is a perfect study.",B:"It lacks ecological validity — the task (comparing line lengths) is trivial and unambiguous, unlike real-life conformity situations. Also, the sample (all male US students) limits generalisability.",C:"Too many participants were used.",D:"It was a field experiment with no controls."},
      correct:"B",tag:"MC-SI-08",
      scaffold:"Asch limitations: (1) Artificial task — conforming about line lengths ≠ conforming about opinions/behaviour. (2) Androcentric sample — all male, potentially different results with women. (3) Cultural/temporal bias — 1950s America (McCarthyism) may have increased conformity. (4) Demand characteristics — participants may have guessed the aim. Strengths: high control, replicable, clear operationalised DV.",
      reforge:{stem:"A student says: 'Asch's findings prove that conformity is universal across all cultures.' Why is this claim problematic?",options:{A:"It's correct — conformity is universal.",B:"Asch used only American male participants. Cross-cultural replications (e.g. Smith & Bond, 1993) found higher conformity in collectivist cultures and lower in individualist ones — conformity rates vary by culture.",C:"Asch didn't study conformity.",D:"Culture has no effect on behaviour."},correct:"B"}
    }

      options:{A:"The MSM was too complex.",B:"The MSM treated STM as a single, passive store — the WMM replaced it with an active, multi-component system that better explains how we process information while temporarily holding it.",C:"LTM doesn't exist.",D:"Baddeley disagreed with Ebbinghaus."},
      correct:"B",tag:"MC-MEM-03",

      reforge:{stem:"You can drive a car (visual-spatial) while having a conversation (verbal) but struggle to listen to a podcast while reading. The WMM explains this because:",options:{A:"Driving doesn't use memory.",B:"The tasks use different slave systems (visuo-spatial sketchpad for driving, phonological loop for conversation) so they don't compete — but two verbal tasks overload the same component (phonological loop).",C:"The central executive has unlimited capacity.",D:"The MSM explains this better."},correct:"B"}

      correct:"B",tag:"MC-MEM-05",
      scaffold:"'Smashed' → higher speed estimates (~41mph) vs 'contacted' (~32mph). Experiment 2: 'smashed' group also more likely to report (non-existent) broken glass. This suggests the leading question didn't just bias the response — it altered the stored memory itself (memory reconstruction). Key concept: post-event discussion/information can contaminate the original memory.",
      reforge:{stem:"After witnessing a robbery, a witness reads a newspaper report describing the thief as 'tall and bearded.' At a later identity parade, the witness selects a tall, bearded suspect. This illustrates:",options:{A:"Accurate recall.",B:"Post-event information contaminating the original memory — the newspaper report (misleading information) has been integrated into the witness's memory of the event, consistent with Loftus's research.",C:"The multi-store model.",D:"Proactive interference."},correct:"B"}

      id:"MEM-06",stem:"The cognitive interview (Fisher & Geiselman, 1992) includes four techniques. Which of the following is NOT one of them?",

      reforge:{stem:"A police officer asks a witness to describe the robbery scene starting from the moment they left, rather than from the beginning. This uses which CI technique?",options:{A:"Report everything.",B:"Change temporal order — recalling in a different sequence can trigger forgotten details and reduces the influence of schemas on recall.",C:"Leading questions.",D:"Mental reinstatement."},correct:"B"}

    {
      id:"MEM-07",stem:"Evaluate the multi-store model of memory. (6 marks — AO1 + AO3)",
      type:"short_answer",
      model_answer:"The MSM proposes three separate stores: sensory register, STM, and LTM, with information flowing linearly between them via attention and rehearsal (AO1). Support comes from case studies like HM, whose hippocampal damage destroyed the ability to form new LTMs while leaving STM intact — suggesting they are separate stores (AO3). However, the MSM oversimplifies STM as a single unitary store — the working memory model showed STM has multiple components (phonological loop, visuo-spatial sketchpad). It also overstates rehearsal: we form long-term memories without deliberate rehearsal (e.g. flashbulb memories), and not all rehearsal leads to LTM transfer — elaborative rehearsal is more effective than maintenance rehearsal (AO3).",

    {
      id:"MEM-08",stem:"A student confuses proactive and retroactive interference. Which correctly defines each?",
      options:{A:"Proactive = new learning interferes with old; Retroactive = old learning interferes with new.",B:"Proactive = old learning interferes with recall of new information; Retroactive = new learning interferes with recall of old information.",C:"They are the same thing.",D:"Proactive = forgetting from STM; Retroactive = forgetting from LTM."},

      id:"EDU-02",stem:"Bowles and Gintis (1976) argue that there is a 'correspondence principle' between school and work. This means:",
      options:{A:"Schools teach students the specific skills their future jobs require.",B:"The social relationships in school mirror those in the capitalist workplace — hierarchy, obedience, extrinsic motivation, fragmented tasks — producing a compliant workforce.",C:"Schools and workplaces have identical timetables.",D:"The correspondence principle only applies to grammar schools."},
      correct:"B",tag:"MC-EDU-02",
      scaffold:"Correspondence principle: school mirrors work. Students follow orders (teachers → bosses), are motivated by grades not learning (extrinsic rewards → wages), and experience alienation (no control over curriculum → no control over production). This produces the 'hidden curriculum' — the unwritten lessons of obedience and conformity capitalism needs. Evaluation: deterministic, ignores pupil resistance (Willis).",
      reforge:{stem:"Paul Willis's (1977) study of 'the lads' challenges Bowles and Gintis because:",options:{A:"It proves the correspondence principle is correct.",B:"Willis found that working-class boys actively resisted school authority rather than passively accepting it — yet this resistance ironically led them into manual labour, still reproducing class inequality.",C:"Willis studied middle-class students.",D:"The lads all became professionals."},correct:"B"}
    },
    {
      id:"EDU-03",stem:"A student writes: 'Working-class pupils underachieve because they are less intelligent.' Which sociological response best challenges this?",
      options:{A:"It's correct — IQ determines achievement.",B:"This is a culturally and structurally reductionist view. Material deprivation (poverty, poor housing, diet), cultural deprivation (language codes, parental attitudes), and in-school factors (labelling, streaming, self-fulfilling prophecy) all explain class differences in achievement without reducing them to innate ability.",C:"Intelligence doesn't exist.",D:"Only in-school factors matter."},
      correct:"B",tag:"MC-EDU-03",
      scaffold:"Class and achievement: External factors — material deprivation (Flaherty: low income → no books, tutors, quiet space), cultural deprivation (Bernstein: restricted vs elaborated code; Sugarman: fatalism, present-time orientation). Internal factors — labelling (Becker: ideal pupil), streaming (Lacey: differentiation-polarisation), self-fulfilling prophecy. A full answer addresses BOTH internal and external.",
      reforge:{stem:"Bernstein's (1971) concept of 'elaborated code' refers to:",options:{A:"The language of texting and social media.",B:"A style of speech that is context-free, grammatically complex, and used in education and middle-class homes — giving middle-class pupils an advantage because the school curriculum is delivered in elaborated code.",C:"A type of secret code used by teachers.",D:"Working-class dialect that schools should adopt."},correct:"B"}
    },
    {
      id:"EDU-04",stem:"Interactionist sociologists focus on which level of analysis when studying education?",
      options:{A:"Macro — large-scale structures and their functions for society.",B:"Micro — small-scale interactions within schools, such as teacher-pupil relationships, labelling, and the negotiation of identity in classrooms.",C:"Global — comparing education systems across countries.",D:"They don't study education."},
      correct:"B",tag:"MC-EDU-04",
      scaffold:"Interactionists (Becker, Hargreaves, Rosenthal & Jacobson) study what happens INSIDE schools: how teachers label pupils, how labels create self-fulfilling prophecies, how streaming polarises subcultures. Strength: reveals processes behind statistics. Weakness: ignores wider structural causes (poverty, policy) — accused of being too micro.",
      reforge:{stem:"Rosenthal and Jacobson's (1968) 'Pygmalion in the Classroom' study demonstrated:",options:{A:"That streaming has no effect on achievement.",B:"The self-fulfilling prophecy — when teachers were told certain pupils were 'spurters' (chosen at random), those pupils made more progress, suggesting teacher expectations directly influence pupil performance.",C:"That IQ tests are perfectly reliable.",D:"That labelling only affects girls."},correct:"B"}
    },
    {
      id:"EDU-05",stem:"Evaluate the view that material deprivation is the main cause of working-class underachievement. (10 marks — AO1 + AO2 + AO3)",
      type:"extended_answer",
      model_answer_outline:{
        AO1:"Material deprivation = poverty and its direct educational consequences. Smith and Noble (1995): 'costs of free schooling' — uniforms, trips, equipment, tutoring. Flaherty (2004): low income → overcrowded housing → no quiet study space, poor diet → illness and absence. Eligibility for free school meals correlates strongly with lower GCSE results.",
        AO2:"Apply to contemporary UK: pupil premium policy attempts to address material deprivation directly. Post-COVID widening of the gap (device poverty, lost learning concentrated among disadvantaged).",
        AO3:"However, material deprivation alone cannot explain the gap. Cultural deprivation (Bernstein, Sugarman) — values and language, not just money. In-school factors (Becker's labelling, Gillborn and Youdell's educational triage) actively disadvantage working-class pupils regardless of material circumstances. Also: some materially deprived pupils DO succeed — individual agency, cultural capital from other sources. Judgement: material deprivation is significant but works alongside cultural and institutional factors — it's a necessary but not sufficient explanation."
      },
      tag:["MC-EDU-03","MC-TECH-02"],
      scaffold:"10-mark essays need: knowledge of the named concept (material deprivation), application to education, THEN sustained evaluation using alternative explanations and evidence. The examiner wants you to WEIGH the view, not just describe it."
    },
    {
      id:"EDU-06",stem:"Which education policy introduced a 'marketisation' of schools in England?",
      options:{A:"The Butler Education Act (1944).",B:"The Education Reform Act (1988) — introducing league tables, open enrolment, formula funding, and the National Curriculum, creating competition between schools.",C:"The Raising of the School Leaving Age (1972).",D:"The Comprehensive School system (1960s–70s)."},
      correct:"B",tag:"MC-EDU-06",
      scaffold:"ERA 1988 (New Right / Thatcher): schools compete for pupils → funding follows the pupil → league tables rank schools → parents 'choose' (market forces in education). Supporters: drives up standards. Critics (Ball): 'myth of parentocracy' — middle-class parents exploit choice better (cultural/economic capital), widening inequality.",
      reforge:{stem:"Ball (1994) argued that marketisation benefits middle-class parents because:",options:{A:"League tables are too complicated for working-class parents.",B:"Middle-class parents possess the cultural and economic capital to navigate the system — researching schools, moving near them, appealing admissions — making 'parental choice' a mechanism for reproducing class advantage rather than genuine equality of opportunity.",C:"Working-class parents don't care about education.",D:"All schools are identical so choice is meaningless."},correct:"B"}
    },
    {
      id:"EDU-07",stem:"A student applies only ONE perspective (e.g. Marxism) when answering a question about the role of education. What mark-scheme issue does this create?",
      options:{A:"None — one perspective is enough for full marks.",B:"The answer lacks evaluation and competing perspectives. The mark scheme rewards analysing the issue from multiple viewpoints (functionalist, Marxist, feminist, interactionist, New Right) and reaching a substantiated judgement about which is most convincing.",C:"Only Marxism is relevant to education questions.",D:"The student should have used common sense instead."},
      correct:"B",tag:"MC-TECH-02",
      scaffold:"AQA Sociology mark schemes for 10- and 20-mark questions explicitly require evaluation. A one-perspective answer typically caps at AO1/AO2 marks and scores zero AO3. Even if the perspective is well-explained, you MUST consider alternatives and reach a judgement. Breadth of perspectives + depth of evaluation = top band.",
      reforge:{stem:"In a 20-mark essay on 'Assess the functionalist view of education,' a top-band answer would:",options:{A:"Only describe functionalist ideas in great detail.",B:"Explain functionalist views (Durkheim, Parsons, Davis & Moore), then evaluate using Marxist, feminist, interactionist, and/or New Right critiques, with evidence, reaching a reasoned conclusion about the strength of the functionalist position.",C:"Reject all perspectives as equally valid.",D:"Focus entirely on research methods."},correct:"B"}
    },
    {
      id:"EDU-08",stem:"Durkheim argued that education performs two main functions for society. Which pair is correct?",
      options:{A:"Childcare and economic training.",B:"Creating social solidarity (shared norms and values binding society together) and teaching specialist skills needed for the economy.",C:"Social control and religious instruction.",D:"Babysitting and exam preparation."},
      correct:"B",tag:"MC-EDU-01",
      scaffold:"Durkheim (functionalist): (1) Social solidarity — school is 'society in miniature'; teaches shared norms, values, history, creating cohesion. (2) Specialist skills — industrial society needs a skilled, specialised workforce; education provides this. Parsons added: universalistic standards (judged on achievement, not ascription) and the bridge between family (particularistic) and wider society.",
      reforge:{stem:"Parsons described education as the 'focal socialising agency' bridging family and society. By this he meant:",options:{A:"Schools replace families entirely.",B:"Education transitions children from the particularistic standards of the family (judged as individuals) to the universalistic standards of wider society (judged by the same criteria as everyone else) — preparing them for adult roles.",C:"Families and schools teach identical values.",D:"Education only socialises middle-class children."},correct:"B"}
    }
  ]
};

const SUBJECTS = {
  "econ": {
    label: "A Level Economics",
    sub: "Edexcel 9EC0 — Theme 2",
    color: "#1e3a5f",
    banks: ["2.1.1","2.1.2","2.1.3","2.1.4","2.2.1","2.2.2","2.2.3","2.3.1","2.3.2","2.3.3","2.4.1","2.4.2","2.5.1","2.5.2","2.5.3"]
  },
  "psych": {
    label: "A Level Psychology",
    sub: "AQA 7182 — Paper 1",
    color: "#831843",
    banks: ["PSY-SI","PSY-MEM"]
  },
  "soc": {
    label: "A Level Sociology",
    sub: "AQA 7192 — Paper 1",
    color: "#7f1d1d",
    banks: ["SOC-EDU"]
  }
};

// ===== END DATA =====

function shuffle(a){var b=[...a];for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

var state = {
  subject: null, bank: null, questions: [], idx: 0, score: 0,
  phase: 'join',
  studentId: null,
  classId: null,
  studentName: null
};

var app = document.getElementById('app');

function render() {
  if (state.phase === 'join') renderJoin();
  else if (state.phase === 'subjects') renderSubjects();
  else if (state.phase === 'banks') renderBanks();
  else if (state.phase === 'quiz') renderQuiz();
  else if (state.phase === 'results') renderResults();
}

function renderJoin() {
  var h = '<div class="center" style="padding-top:40px">';
  h += '<p class="tag" style="margin-bottom:6px">FORGE</p>';
  h += '<h1 style="font-size:28px;margin-bottom:8px">Join your class</h1>';
  h += '<p style="color:#8A857E;font-size:14px;margin-bottom:28px">Enter your name and class code to start tracking your progress</p>';
  h += '</div>';
  h += '<div style="max-width:340px;margin:0 auto">';
  h += '<label style="font-size:13px;color:var(--slate);display:block;margin-bottom:4px">Your first name</label>';
  h += '<input id="join-name" class="join-input" type="text" placeholder="e.g. Alex">';
  h += '<label style="font-size:13px;color:var(--slate);display:block;margin-bottom:4px">Class code</label>';
  h += '<input id="join-code" class="join-input" type="text" placeholder="e.g. ECON-Y12-A" style="text-transform:uppercase">';
  h += '<button class="join-btn" id="join-btn">Join class →</button>';
  h += '<p class="join-err" id="join-err"></p>';
  h += '<button class="skip-btn" id="skip-btn">Practice without a class →</button>';
  h += '</div>';
  app.innerHTML = h;

  document.getElementById('join-btn').onclick = function() {
    var name = document.getElementById('join-name').value.trim();
    var code = document.getElementById('join-code').value.trim().toUpperCase();
    var err = document.getElementById('join-err');
    var btn = document.getElementById('join-btn');

    if (!name) { err.textContent = 'Enter your first name.'; err.style.display = 'block'; return; }
    if (!code) { err.textContent = 'Enter your class code.'; err.style.display = 'block'; return; }

    if (!supa._configured()) {
      // Supabase not set up yet — store locally and proceed
      state.studentName = name;
      state.phase = 'subjects';
      render();
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Joining...';
    err.style.display = 'none';

    supa.select('classes', { code: code }).then(function(classes) {
      if (!classes || classes.length === 0) {
        err.textContent = 'Class code not found. Check with your teacher.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Join class \u2192';
        return;
      }
      var cls = classes[0];
      supa.insert('students', { name: name, class_id: cls.id }).then(function(students) {
        if (students && students.length > 0) {
          state.studentId = students[0].id;
          state.classId = cls.id;
        }
        state.studentName = name;
        state.phase = 'subjects';
        render();
      });
    });
  };

  document.getElementById('skip-btn').onclick = function() {
    state.studentName = null;
    state.studentId = null;
    state.classId = null;
    state.phase = 'subjects';
    render();
  };
}

function renderSubjects(){
  var h = '';
  if (state.studentName) {
    h += '<div class="join-badge"><span class="dot"></span> ' + state.studentName + (state.classId ? ' · connected' : ' · offline') + '</div>';
  }
  h += '<div class="center"><p class="tag" style="margin-bottom:6px">FORGE</p>';
  h += '<h1 style="font-size:28px;margin-bottom:6px">Pick a subject</h1>';
  h += '<p style="color:#8A857E;font-size:15px">Choose what to practise</p></div>';
  h += '<div class="subject-list">';
  for(var k in SUBJECTS){
    var s=SUBJECTS[k];
    var n=s.banks.reduce(function(t,b){return t+BANKS[b].questions.length},0);
    h+='<button class="subject-btn" data-key="'+k+'" style="border-color:'+s.color+'25">';
    h+='<h3 style="color:'+s.color+'">'+s.label+'</h3>';
    h+='<div class="sub">'+s.sub+'</div>';
    h+='<div class="count">'+s.banks.length+' banks \u00b7 '+n+' questions</div>';
    h+='</button>';
  }
  h+='</div>';
  app.innerHTML=h;
  app.querySelectorAll('.subject-btn').forEach(function(b){
    b.onclick=function(){state.subject=b.dataset.key;state.phase='banks';render();};
  });
}

function renderBanks(){
  var subj=SUBJECTS[state.subject];
  var h='<button class="back-btn" id="back-subj">\u2190 Subjects</button>';
  h+='<div class="center"><p class="tag" style="color:'+subj.color+';margin-bottom:4px">FORGE</p>';
  h+='<h2 style="font-size:24px;margin-bottom:4px">'+subj.label+'</h2>';
  h+='<p style="color:#8A857E;font-size:14px">'+subj.sub+'</p></div>';
  h+='<div class="bank-list">';
  subj.banks.forEach(function(key){
    var b=BANKS[key];
    h+='<button class="bank-btn" data-key="'+key+'">';
    h+='<div class="code" style="color:'+b.color+'">'+key+'</div>';
    h+='<div class="name">'+b.label+'</div>';
    h+='<div class="qcount">'+b.questions.length+' questions</div>';
    h+='</button>';
  });
  h+='</div>';
  app.innerHTML=h;
  document.getElementById('back-subj').onclick=function(){state.phase='subjects';render();};
  app.querySelectorAll('.bank-btn').forEach(function(b){
    b.onclick=function(){
      state.bank=b.dataset.key;
      state.questions=shuffle(BANKS[b.dataset.key].questions.filter(function(q){return !q.type;}));
      state.idx=0;state.score=0;state.phase='quiz';render();
    };
  });
}

function renderQuiz(){
  var bk=BANKS[state.bank];
  var q=state.questions[state.idx];
  if(!q){state.phase='results';render();return;}
  var keys=Object.keys(q.options);

  var h='<div class="quiz-header">';
  h+='<button class="back-btn" id="back-banks">\u2190 Banks</button>';
  h+='<span class="bank-name" style="color:'+bk.color+'">'+bk.label+'</span>';
  h+='<span>'+state.score+' \u2713</span></div>';
  h+='<div class="progress-bar"><div class="progress-fill" style="width:'+((state.idx/state.questions.length)*100)+'%;background:'+bk.color+'"></div></div>';
  h+='<div class="q-meta"><span class="q-id" style="color:'+bk.color+';background:'+bk.color+'14">'+q.id+'</span><span>'+(state.idx+1)+' / '+state.questions.length+'</span></div>';
  h+='<div class="stem">'+q.stem+'</div>';
  h+='<div class="options" id="opts">';
  keys.forEach(function(k){
    h+='<button class="opt" data-k="'+k+'"><span class="letter">'+k+'</span><span>'+q.options[k]+'</span></button>';
  });
  h+='</div>';
  h+='<div id="feedback"></div>';
  h+='<div class="clear"></div>';

  app.innerHTML=h;
  document.getElementById('back-banks').onclick=function(){state.phase='banks';render();};

  var opts=app.querySelectorAll('.opt');
  var answered=false;

  opts.forEach(function(o){
    o.onclick=function(){
      if(answered)return;
      answered=true;
      var k=o.dataset.k;
      var isCorrect=k===q.correct;
      if(isCorrect) state.score++;

      // Log to Supabase
      logResponse(q, k, isCorrect, false, null);

      opts.forEach(function(x){
        x.classList.add('answered');
        if(x.dataset.k===q.correct) x.classList.add('correct');
        else if(x===o&&!isCorrect) x.classList.add('wrong');
        else x.classList.add('dimmed');
      });

      var fb=document.getElementById('feedback');
      if(isCorrect){
        fb.innerHTML='<div class="praise-box">\u2713 Nailed it.</div><button class="next-btn" id="next-btn">Next \u2192</button><div class="clear"></div>';
      }else{
        var fh='<div class="scaffold-box"><span class="stag">'+q.tag+'</span><p>'+q.scaffold+'</p></div>';
        fh+='<button class="reforge-trigger" id="rf-btn">Re-forge \u2192</button>';
        fh+='<div id="rf-area" class="hidden"></div>';
        fh+='<button class="next-btn" id="next-btn">Next \u2192</button><div class="clear"></div>';
        fb.innerHTML=fh;
        document.getElementById('rf-btn').onclick=function(){
          document.getElementById('rf-btn').classList.add('hidden');
          renderReforge(q,document.getElementById('rf-area'),bk.color);
        };
      }

      document.getElementById('next-btn').onclick=function(){
        state.idx++;render();
      };
    };
  });
}

function renderReforge(q,el,color){
  el.classList.remove('hidden');
  var rf=q.reforge;
  var keys=Object.keys(rf.options);
  var h='<div class="reforge-box" style="border-color:'+color+'30">';
  h+='<div class="rf-tag" style="color:'+color+'">Re-forge twin</div>';
  h+='<div class="rf-stem">'+rf.stem+'</div>';
  h+='<div class="options" id="rf-opts">';
  keys.forEach(function(k){
    h+='<button class="opt" data-k="'+k+'" style="font-size:14px;padding:10px 12px;border-radius:8px"><span class="letter">'+k+'</span><span>'+rf.options[k]+'</span></button>';
  });
  h+='</div><div id="rf-feedback"></div></div>';
  el.innerHTML=h;

  var opts=el.querySelectorAll('.opt');
  var done=false;
  opts.forEach(function(o){
    o.onclick=function(){
      if(done)return;
      done=true;
      var k=o.dataset.k;
      var isCorrect=k===rf.correct;

      // Log re-forge to Supabase
      logResponse(q, k, isCorrect, true, isCorrect);

      opts.forEach(function(x){
        x.classList.add('answered');
        if(x.dataset.k===rf.correct) x.classList.add('correct');
        else if(x===o&&!isCorrect) x.classList.add('wrong');
        else x.classList.add('dimmed');
      });
      var rfb=document.getElementById('rf-feedback');
      if(isCorrect){
        rfb.innerHTML='<div style="margin-top:10px;font-size:14px;color:var(--good);font-weight:600">\u2713 Reforged.</div>';
      }else{
        rfb.innerHTML='<div style="margin-top:12px"><div style="font-size:14px;color:var(--bad);margin-bottom:10px">Not quite \u2014 the answer is <strong>'+rf.correct+'</strong>.</div><div class="rf-scaffold"><span class="stag">Re-read the scaffold</span><p>'+q.scaffold+'</p></div></div>';
      }
    };
  });
}

function renderResults(){
  var bk=BANKS[state.bank];
  var pct=Math.round((state.score/state.questions.length)*100);
  var col=pct>=75?'var(--good)':pct>=50?'var(--hot)':'var(--bad)';
  var h='<div class="results">';
  h+='<p class="tag" style="color:'+bk.color+';margin-bottom:6px">'+state.bank+' \u2014 '+bk.label+'</p>';
  h+='<div class="pct" style="color:'+col+'">'+pct+'%</div>';
  h+='<div class="detail">'+state.score+' / '+state.questions.length+' correct</div>';
  h+='<div class="btns">';
  h+='<button class="btn-primary" id="retry">Retry</button>';
  h+='<button class="btn-secondary" id="all-banks">All banks</button>';
  h+='<button class="btn-secondary" id="all-subj">Subjects</button>';
  h+='</div></div>';
  app.innerHTML=h;
  document.getElementById('retry').onclick=function(){
    state.questions=shuffle(BANKS[state.bank].questions.filter(function(q){return !q.type;}));
    state.idx=0;state.score=0;state.phase='quiz';render();
  };
  document.getElementById('all-banks').onclick=function(){state.phase='banks';render();};
  document.getElementById('all-subj').onclick=function(){state.phase='subjects';render();};
}

render();
</script>
</body>
</html>
