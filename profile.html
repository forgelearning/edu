<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge — My Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Sora:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--coal:#141210;--panel:#211E1B;--panel-2:#2A2622;--line:#3A342E;--ember:#FF6B2C;--hot:#FFC93C;--slate:#B8B4AD;--white:#F5F1EA;--good:#7FD98A;--bad:#FF5A5A}
[data-theme="light"]{--coal:#FAFAF8;--panel:#FFFFFF;--panel-2:#F3F2EF;--line:#E0DDD8;--ember:#E5550F;--hot:#C88500;--slate:#6B6660;--white:#1A1816;--good:#1B8C2A;--bad:#D42D2D}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--coal);color:var(--slate);font-family:'Sora',sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;color:var(--white);line-height:1.1;letter-spacing:-.015em}
.mono{font-family:'JetBrains Mono',monospace}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px}
.tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ember)}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;color:var(--white);text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:28px}
.logo .spark{width:9px;height:9px;background:linear-gradient(135deg,var(--hot),var(--ember));border-radius:2px;transform:rotate(45deg);box-shadow:0 0 10px rgba(255,107,44,.7)}
.theme-toggle{background:var(--panel);border:1px solid var(--line);color:var(--slate);font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer;position:fixed;top:20px;right:20px;z-index:99}
.join-input{width:100%;padding:12px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--white);font-family:'Sora',sans-serif;font-size:15px;margin-bottom:14px;text-transform:uppercase}
.join-input:focus{outline:none;border-color:var(--ember)}
.join-input::placeholder{color:#7A756E;text-transform:none}
.join-btn{width:100%;padding:13px;border-radius:9px;background:var(--ember);color:#fff;border:none;font-family:'Sora',sans-serif;font-weight:600;font-size:15px;cursor:pointer}
.join-btn:hover{background:var(--hot)}
.join-btn:disabled{opacity:.5;cursor:wait}
.join-err{color:var(--bad);font-size:13px;margin-top:10px;display:none}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center}
.stat-n{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;display:block}
.stat-l{font-size:11px;color:#8A857E;margin-top:4px;display:block;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.04em}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:16px}
.card-title{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#8A857E;margin-bottom:14px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.focus-item{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:8px}
.focus-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.focus-tag{font-size:11px;color:var(--coal);background:var(--hot);padding:2px 8px;border-radius:5px;font-weight:600;font-family:'JetBrains Mono',monospace}
.focus-acc{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
.focus-detail{font-size:13px;color:var(--slate);line-height:1.5}
.strength-item{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);font-size:13px}
.strength-item:last-child{border-bottom:none}
.strength-label{color:var(--white)}
.strength-acc{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--good)}
.rank-display{text-align:center;padding:24px;background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:16px}
.rank-title{font-family:'Bricolage Grotesque',sans-serif;font-size:32px;font-weight:800}
.rank-xp{font-family:'JetBrains Mono',monospace;font-size:14px;color:#8A857E;margin-top:4px}
.xp-bar-wrap{height:6px;background:var(--line);border-radius:3px;margin:12px 0 4px}
.xp-bar-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--hot),var(--ember))}
.xp-bar-label{display:flex;justify-content:space-between;font-size:11px;font-family:'JetBrains Mono',monospace;color:#8A857E}
.mc-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line);margin-bottom:6px;font-size:13px}
.mc-detail{flex:1;color:var(--slate)}
.mc-fires{font-family:'JetBrains Mono',monospace;font-size:12px}
.nav-links{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.nav-link{font-size:13px;color:var(--slate);text-decoration:none;font-family:'JetBrains Mono',monospace;padding:6px 12px;border-radius:7px;border:1px solid var(--line)}
.nav-link:hover{color:var(--white);border-color:var(--ember)}
.nav-link.active-link{color:var(--white);border-color:var(--ember)}
.empty{text-align:center;padding:32px 20px;color:var(--slate)}
.empty h3{color:var(--white);margin-bottom:8px}
[data-theme="light"] .focus-tag{color:#fff}
[data-theme="light"] .join-btn{color:#fff}
@media(max-width:600px){.stat-row{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}}
</style>
</head>

var RANKS = [
  {name:'Apprentice',min:0,max:300,color:'var(--slate)',bg:'var(--panel-2)'},
  {name:'Journeyman',min:300,max:1500,color:'var(--hot)',bg:'rgba(255,201,60,.12)'},
  {name:'Craftsman',min:1500,max:5000,color:'var(--ember)',bg:'rgba(255,107,44,.12)'},
  {name:'Forged',min:5000,max:15000,color:'var(--good)',bg:'rgba(127,217,138,.12)'},
  {name:'Master',min:15000,max:99999,color:'var(--coal)',bg:'linear-gradient(100deg,var(--hot),var(--ember))'}
];

function getRank(xp){
  for(var i=RANKS.length-1;i>=0;i--){if(xp>=RANKS[i].min)return RANKS[i];}
  return RANKS[0];
}

function calcXP(responses){
  var xp=0;
  responses.forEach(function(r){
    if(r.question_id&&r.question_id.endsWith('-CRU')&&r.is_correct) xp+=30;
    else if(r.reforge_attempted&&r.reforge_correct) xp+=20;
    else if(r.is_correct&&!r.reforge_attempted) xp+=10;
    if(r.question_id&&r.question_id.endsWith('-ANVIL')&&r.is_correct) xp+=30; // treat anvil correct as 30
  });
  return xp;
}

var st={studentId:null,classId:null,studentName:null,responses:[]};
var app=document.getElementById('app');

function renderLogin(){
  var h='<div style="max-width:340px;margin:40px auto 0;text-align:center">';
  h+='<p class="tag" style="margin-bottom:6px">MY PROFILE</p>';
  h+='<h1 style="font-size:26px;margin-bottom:8px">Your Forge profile</h1>';
  h+='<p style="color:#8A857E;font-size:14px;margin-bottom:28px">Enter your name and class code to see your progress</p>';
  h+='</div><div style="max-width:340px;margin:0 auto">';
  h+='<label style="font-size:13px;color:var(--slate);display:block;margin-bottom:4px">Your first name</label>';
  h+='<input id="p-name" class="join-input" type="text" placeholder="e.g. Alex" style="text-transform:none">';
  h+='<label style="font-size:13px;color:var(--slate);display:block;margin-bottom:4px">Class code</label>';
  h+='<input id="p-code" class="join-input" type="text" placeholder="e.g. ECON-Y12-A">';
  h+='<button class="join-btn" id="p-btn">View my profile \u2192</button>';
  h+='<p class="join-err" id="p-err"></p></div>';
  app.innerHTML=h;

  document.getElementById('p-btn').onclick=function(){
    var name=document.getElementById('p-name').value.trim();
    var code=document.getElementById('p-code').value.trim().toUpperCase();
    var err=document.getElementById('p-err');
    var btn=document.getElementById('p-btn');
    if(!name||!code){err.textContent='Enter your name and class code.';err.style.display='block';return;}
    btn.disabled=true;btn.textContent='Loading...';
    supaGet('classes','code=eq.'+encodeURIComponent(code)).then(function(cls){
      if(!Array.isArray(cls)||cls.length===0){err.textContent='Class not found.';err.style.display='block';btn.disabled=false;btn.textContent='View my profile \u2192';return;}
      supaGet('students','class_id=eq.'+cls[0].id+'&name=eq.'+encodeURIComponent(name)).then(function(stus){
        if(!Array.isArray(stus)||stus.length===0){err.textContent='Name not found. Make sure you\'ve done the quiz first.';err.style.display='block';btn.disabled=false;btn.textContent='View my profile \u2192';return;}
        st.studentId=stus[0].id;st.classId=cls[0].id;st.studentName=name;
        supaGet('responses','student_id=eq.'+st.studentId+'&order=created_at.desc').then(function(r){
          st.responses=r||[];
          renderProfile();
        });
      });
    });
  };
}

function renderProfile(){
  var responses=st.responses;
  var total=responses.filter(function(r){return !r.reforge_attempted;}).length;
  var correct=responses.filter(function(r){return !r.reforge_attempted&&r.is_correct;}).length;
  var acc=total>0?Math.round((correct/total)*100):0;
  var accCol=acc>=75?'var(--good)':acc>=50?'var(--hot)':'var(--bad)';
  var xp=calcXP(responses);
  var rank=getRank(xp);
  var nextRank=RANKS[RANKS.indexOf(rank)+1];
  var streak=calcStreak(responses);

  // Active misconceptions
  var mcData={};
  responses.forEach(function(r){
    if(!r.misconception_tag)return;
    var tag=r.misconception_tag;
    if(!mcData[tag])mcData[tag]={fires:0,reforgeCorrect:0,streak:0};
    if(r.reforge_attempted){
      if(r.reforge_correct){mcData[tag].reforgeCorrect++;mcData[tag].streak++;}
      else mcData[tag].streak=0;
    } else if(!r.is_correct){
      mcData[tag].fires++;mcData[tag].streak=0;
    }
  });
  var activeMCs=Object.keys(mcData).filter(function(t){return mcData[t].fires>0&&mcData[t].streak<3;});
  activeMCs.sort(function(a,b){return mcData[b].fires-mcData[a].fires;});

  // Bank accuracy
  var bankStats={};
  responses.filter(function(r){return !r.reforge_attempted&&r.bank&&!r.bank.endsWith('-MIX');}).forEach(function(r){
    if(!bankStats[r.bank])bankStats[r.bank]={t:0,c:0};
    bankStats[r.bank].t++;
    if(r.is_correct)bankStats[r.bank].c++;
  });
  var strengths=Object.keys(bankStats).filter(function(b){return bankStats[b].t>=3;}).map(function(b){
    return{bank:b,acc:Math.round((bankStats[b].c/bankStats[b].t)*100)};
  }).sort(function(a,b){return b.acc-a.acc;});
  var goodBanks=strengths.filter(function(s){return s.acc>=75;});
  var weakBanks=strengths.filter(function(s){return s.acc<60;}).reverse();

  var h='<div class="nav-links">';
  h+='<a class="nav-link" href="forge-quiz.html">Quiz</a>';
  h+='<a class="nav-link" href="anvil.html">Anvil</a>';
  h+='<a class="nav-link" href="crucible.html">Crucible</a>';
  h+='<a class="nav-link active-link" href="profile.html">My Profile</a>';
  h+='</div>';

  // Rank card
  var xpToNext=nextRank?nextRank.min-xp:0;
  var pct=nextRank?Math.round(((xp-rank.min)/(nextRank.min-rank.min))*100):100;
  h+='<div class="rank-display">';
  h+='<p class="tag" style="margin-bottom:8px">'+st.studentName+'\'s Forge Rank</p>';
  h+='<div class="rank-title" style="color:'+rank.color+'">'+rank.name+'</div>';
  h+='<div class="rank-xp">'+xp.toLocaleString()+' XP total</div>';
  if(nextRank){
    h+='<div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:'+pct+'%"></div></div>';
    h+='<div class="xp-bar-label"><span>'+rank.name+'</span><span>'+xpToNext.toLocaleString()+' XP to '+nextRank.name+'</span></div>';
  } else {
    h+='<div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:100%"></div></div>';
    h+='<div style="font-size:12px;color:var(--hot);margin-top:4px">Maximum rank achieved ✦</div>';
  }
  h+='</div>';

  // Stats
  h+='<div class="stat-row">';
  h+='<div class="stat"><span class="stat-n" style="color:'+accCol+'">'+acc+'%</span><span class="stat-l">Accuracy</span></div>';
  h+='<div class="stat"><span class="stat-n" style="color:var(--white)">'+total+'</span><span class="stat-l">Questions</span></div>';
  h+='<div class="stat"><span class="stat-n" style="color:var(--bad)">'+activeMCs.length+'</span><span class="stat-l">Active misconceptions</span></div>';
  h+='<div class="stat"><span class="stat-n" style="color:var(--ember)">'+streak+'</span><span class="stat-l">Day streak \ud83d\udd25</span></div>';
  h+='</div>';

  // Focus and strengths
  h+='<div class="two-col">';
  h+='<div>';
  if(weakBanks.length>0||activeMCs.length>0){
    h+='<div class="card"><div class="card-title" style="color:var(--bad)">\u26a0 Focus areas</div>';
    weakBanks.slice(0,3).forEach(function(s){
      h+='<div class="focus-item"><div class="focus-head"><span style="color:var(--white);font-weight:600;font-size:13px">'+s.bank+'</span><span class="focus-acc" style="color:var(--bad)">'+s.acc+'%</span></div>';
      h+='<div class="focus-detail">Keep practising — accuracy below 60%</div></div>';
    });
    if(activeMCs.length>0){
      h+='<div class="focus-item"><div class="focus-head"><span class="focus-tag">Anvil</span><span class="focus-acc" style="color:var(--hot)">'+activeMCs.length+' active</span></div>';
      h+='<div class="focus-detail">'+(MC_LABELS[activeMCs[0]]||activeMCs[0])+(activeMCs.length>1?' and '+(activeMCs.length-1)+' more':'')+'</div></div>';
    }
    h+='</div>';
  } else {
    h+='<div class="card"><div class="empty"><h3>No weak spots yet</h3><p>Answer more questions to see your focus areas.</p></div></div>';
  }
  h+='</div>';

  h+='<div>';
  if(goodBanks.length>0){
    h+='<div class="card"><div class="card-title" style="color:var(--good)">\u2713 Strengths</div>';
    goodBanks.slice(0,5).forEach(function(s){
      h+='<div class="strength-item"><span class="strength-label">'+s.bank+'</span><span class="strength-acc">'+s.acc+'%</span></div>';
    });
    h+='</div>';
  } else {
    h+='<div class="card"><div class="empty"><h3>Strengths loading</h3><p>Answer at least 3 questions per topic to see your strengths.</p></div></div>';
  }
  h+='</div></div>';

  // Active misconceptions detail
  if(activeMCs.length>0){
    h+='<div class="card"><div class="card-title" style="color:var(--bad)">Your Anvil — misconceptions to rework</div>';
    activeMCs.slice(0,6).forEach(function(tag){
      var d=mcData[tag];
      var label=MC_LABELS[tag]||tag;
      h+='<div class="mc-item"><span class="focus-tag">'+tag+'</span>';
      h+='<span class="mc-detail">'+label+'</span>';
      h+='<span class="mc-fires" style="color:var(--bad)">'+d.fires+' fires</span></div>';
    });
    h+='<a href="anvil.html" style="display:inline-block;margin-top:12px;font-size:13px;color:var(--ember);font-family:JetBrains Mono,monospace;text-decoration:none">Rework these in the Anvil \u2192</a>';
    h+='</div>';
  }

  h+='<div style="text-align:center;margin-top:8px"><button onclick="renderLogin()" style="background:none;border:none;cursor:pointer;font-size:13px;color:#8A857E;font-family:Sora,sans-serif">Sign out</button></div>';
  app.innerHTML=h;
}

function calcStreak(responses){
  if(!responses.length) return 0;
  var dates=new Set(responses.map(function(r){return r.created_at?r.created_at.substring(0,10):''}));
  var today=new Date().toISOString().substring(0,10);
  var streak=0;
  var d=new Date();
  while(true){
    var key=d.toISOString().substring(0,10);
    if(dates.has(key)){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}

renderLogin();
</script>
