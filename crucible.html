      reforge:{stem:"Which property is unique to transverse waves and provides evidence for their nature?",options:{A:"They can reflect off surfaces.",B:"They can be polarised — restricted to oscillate in a single plane — which is impossible for longitudinal waves.",C:"They can be refracted.",D:"They transfer energy without transferring matter."},correct:"B"}
    },
    {
      id:"PHYS-12",stem:"A 2 kg object experiences a resultant force of 10 N. A student calculates its acceleration as 20 m s⁻² (F × m). What is the correct value?",
      options:{A:"20 m s⁻² — the student multiplied force by mass correctly.",B:"5 m s⁻² — F = ma rearranges to a = F/m = 10 ÷ 2 = 5 m s⁻².",C:"12 m s⁻² — calculated as F + m rather than F ÷ m.",D:"0.2 m s⁻² — calculated as m ÷ F rather than F ÷ m."},
      correct:"B",tag:"MC-PHYS-12",
      scaffold:"Newton's second law: F = ma, so a = F/m (force divided by mass, not multiplied). Here a = 10/2 = 5 m s⁻². Resultant (net) force matters — sum all forces first, accounting for direction. Units: N = kg m s⁻². Common errors: multiplying instead of dividing, using weight instead of mass, or using a single force instead of the resultant. Always identify the resultant force before applying F = ma.",
      reforge:{stem:"The same 2 kg object is now pushed with 10 N forward while a 4 N friction force opposes it. Its acceleration is:",options:{A:"7 m s⁻² — using the 14 N total.",B:"5 m s⁻² — ignoring friction.",C:"3 m s⁻² — resultant force = 10 − 4 = 6 N, so a = 6/2 = 3 m s⁻².",D:"2 m s⁻² — a = friction/mass."},correct:"C"}
    },
    {
      id:"PHYS-13",stem:"Distinguish clearly between scalar and vector quantities. Which set contains ONLY vectors?",
      options:{A:"Speed, distance, energy, temperature — all magnitude only.",B:"Displacement, velocity, acceleration, force — all have magnitude AND direction.",C:"Mass, time, speed, power — all scalar quantities with magnitude only.",D:"Distance, speed, mass, work — scalars that are sometimes confused with vectors."},
      correct:"B",tag:"MC-PHYS-13",
      scaffold:"Vectors (magnitude AND direction): displacement, velocity, acceleration, force, momentum, weight. Scalars (magnitude only): distance, speed, mass, time, energy, temperature, work, power. Watch the pairs: distance (scalar) vs displacement (vector); speed (scalar) vs velocity (vector). Weight is a vector (force); mass is a scalar. Vectors add using tip-to-tail/pythagoras; scalars add arithmetically. Common trap: classifying work or energy as vectors — they are scalars despite involving force.",
      reforge:{stem:"A runner completes one lap of a 400 m track, finishing where they started. Their distance and displacement are:",options:{A:"Distance 400 m, displacement 400 m.",B:"Distance 0 m, displacement 400 m.",C:"Distance 400 m, displacement 0 m — displacement is the straight-line vector from start to finish, which is zero for a complete lap.",D:"Both are zero."},correct:"C"}
    },
    {
      id:"PHYS-14",stem:"In a simple circuit, what does the electromotive force (e.m.f.) of a battery actually represent?",
      options:{A:"The force that pushes electrons, measured in newtons.",B:"The current the battery supplies, measured in amps.",C:"The resistance inside the battery.",D:"The energy transferred to each coulomb of charge by the battery"},
      correct:"D",tag:"MC-PHYS-14",
      scaffold:"e.m.f. = energy transferred TO charge per coulomb by the source (J/C = V). Potential difference = energy transferred FROM charge per coulomb to a component. Despite its name, e.m.f. is NOT a force — it is an energy-per-charge quantity in volts. Terminal p.d. < e.m.f. because of 'lost volts' across internal resistance r: e.m.f. = I(R + r). Common errors: calling e.m.f. a force, or confusing it with current. V = W/Q underlies both e.m.f. and p.d.",
      reforge:{stem:"A battery has e.m.f. 12 V but its terminal potential difference is only 11.5 V when supplying current. Why?",options:{A:"The battery is faulty and should read 12 V.",B:"Some energy per coulomb (the 'lost volts') is dissipated across the battery's internal resistance, so terminal p.d. = e.m.f. − Ir.",C:"The voltmeter is measuring current instead.",D:"e.m.f. always exceeds terminal p.d. by exactly 0.5 V."},correct:"B"}
    },
    {
      id:"PHYS-15",stem:"A student says heavier objects fall faster in a vacuum. Referring to free fall, why is this wrong?",
      options:{A:"Heavier objects do fall faster because they contain more gravitational pull.",B:"In a vacuum all objects fall with the same acceleration g — mass cancels in a = F/m = mg/m.",C:"Lighter objects fall faster in a vacuum because they have less resistance.",D:"Objects do not fall in a vacuum as there is no air to push them down."},
      correct:"B",tag:"MC-PHYS-15",
      scaffold:"In free fall (vacuum): a = g for all masses. Reasoning via F = ma: gravitational force W = mg, so a = W/m = mg/m = g — mass cancels. A heavier object feels a bigger force but needs a bigger force to accelerate equally (more inertia). In air, resistance depends on shape/speed, so a feather falls slower — but that is air resistance, not gravity. The famous Apollo 15 hammer-feather drop demonstrated equal fall in a vacuum.",
      reforge:{stem:"In air, a feather falls more slowly than a coin. In the mechanics of this, the key factor is:",options:{A:"The coin experiences a stronger gravitational field.",B:"Air resistance has a much greater decelerating effect on the low-mass, high-surface-area feather relative to its weight, so it reaches terminal velocity almost immediately.",C:"The feather has more inertia than the coin.",D:"Gravity does not act on feathers."},correct:"B"}
    },
    {
      id:"PHYS-16",stem:"A 500 g mass hangs from a spring, extending it by 0.10 m. Taking g = 9.81 m s⁻², what is the spring constant k?",
      options:{A:"49.05 N m⁻¹ — using F = kx with F = mg = 0.500 × 9.81 = 4.905 N, so k = 4.905/0.10",B:"5000 N m⁻¹ — using the mass in grams.",C:"0.98 N m⁻¹ — dividing extension by force.",D:"4.905 N m⁻¹ — forgetting to divide by extension."},
      correct:"A",tag:"MC-PHYS-16",
      scaffold:"Hooke's law: F = kx, so k = F/x. The force is the WEIGHT: F = mg = 0.500 kg × 9.81 = 4.905 N (convert 500 g to 0.500 kg). Then k = 4.905/0.10 = 49.05 N m⁻¹. Common errors: using mass in grams, using mass instead of weight for F, or dividing x by F. Elastic potential energy stored = ½kx² = ½Fx (area under a force-extension graph). Units of k: N m⁻¹.",
      reforge:{stem:"How much elastic potential energy is stored in the spring at this 0.10 m extension?",options:{A:"0.49 J — using E = ½kx² = ½ × 49.05 × 0.10².",B:"4.905 J — using E = Fx.",C:"0.245 J — using ½mx.",D:"49.05 J — using kx."},correct:"A"}
    }
  ]
};

// ===== END DATA =====

var CRUCIBLE_TIME = 5 * 60; // 5 minutes
var QUESTIONS_PER_RUN = 12;

function shuffle(a){var b=[...a];for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

var state = {
  phase: 'join',
  studentId: null, classId: null, studentName: null,
  classSubject: null,
  paidSubjects: [],
  extraTime: 0,
  subject: null, bank: null,
  questions: [], idx: 0,
  answers: [], // {q, selected, correct, timeLeft}
  timeLeft: CRUCIBLE_TIME,
  timer: null
};

var app = document.getElementById('app');

// ===== JOIN =====
function renderJoin(){
  var h='<div style="max-width:340px;margin:0 auto">';
  h+='<div class="center" style="margin-bottom:28px">';
  h+='<p class="tag" style="color:var(--bad);margin-bottom:6px">THE CRUCIBLE</p>';
  h+='<h1 style="font-size:28px;margin-bottom:8px">No hints. No scaffolds.<br>Just the question.</h1>';
  h+='<p style="color:#8A857E;font-size:14px">5 minutes. 12 questions. Wrong answers go straight to your Anvil.</p>';
  h+='</div>';
  h+='<label style="font-size:13px;color:var(--slate);display:block;margin-bottom:4px">Your first name</label>';
  h+='<input id="j-name" class="join-input" type="text" placeholder="e.g. Alex">';
  h+='<label style="font-size:13px;color:var(--slate);display:block;margin-bottom:4px">Class code</label>';
  h+='<input id="j-code" class="join-input" type="text" placeholder="e.g. ECON-Y12" style="text-transform:uppercase">';
  h+='<button class="join-btn" id="j-btn" style="background:var(--bad)">Enter the Crucible \u2192</button>';
  h+='<p class="join-err" id="j-err"></p>';
  h+='<button class="join-btn" id="j-skip" style="background:transparent;border:1px solid var(--line);color:var(--slate);margin-top:10px">Practise without a class</button>';
  h+='</div>';
  app.innerHTML=h;

  document.getElementById('j-btn').onclick=function(){
    var name=document.getElementById('j-name').value.trim();
    var code=document.getElementById('j-code').value.trim().toUpperCase();
    var err=document.getElementById('j-err');
    var btn=document.getElementById('j-btn');
    if(!name||!code){err.textContent='Enter your name and class code.';err.style.display='block';return;}
    btn.disabled=true;btn.textContent='Joining...';
    supaGet('classes','code=eq.'+encodeURIComponent(code)).then(function(cls){
      if(!Array.isArray(cls)||cls.length===0){err.textContent='Class not found.';err.style.display='block';btn.disabled=false;btn.textContent='Enter the Crucible \u2192';return;}
      supaGet('students','class_id=eq.'+cls[0].id+'&name=eq.'+encodeURIComponent(name)).then(function(stus){
        if(!Array.isArray(stus)||stus.length===0){err.textContent='Name not found. Join via the quiz first.';err.style.display='block';btn.disabled=false;btn.textContent='Enter the Crucible \u2192';return;}
        state.studentId=stus[0].id;state.classId=cls[0].id;state.studentName=name;
        state.classSubject=cls[0].subject||null;
        state.extraTime=stus[0].extra_time||0;
        try { localStorage.setItem('forge-student', JSON.stringify({studentId: state.studentId, classId: state.classId, studentName: state.studentName, classSubject: state.classSubject})); } catch(e) {}
        if(state.classSubject&&SUBJECTS[state.classSubject]){
          state.subject=state.classSubject;
          state.phase='bank';
        } else {
          state.phase='subject';
        }
        render();
      });
    });
  };
  document.getElementById('j-skip').onclick=function(){state.studentName='Anonymous';state.phase='subject';render();};
}

// ===== SUBJECT PICKER =====
function renderSubject(){
  var h='<p class="tag" style="color:var(--bad);margin-bottom:4px">THE CRUCIBLE</p>';
  h+='<h2 style="font-size:22px;margin-bottom:6px">Choose a subject</h2>';
  h+='<p style="color:#8A857E;font-size:14px;margin-bottom:4px">You\u2019ll get 12 questions from that subject at random. No scaffolds.</p>';
  h+='<div class="subject-list">';

  // Filter to paid subjects if available
  var subjectKeys = Object.keys(SUBJECTS);
  if (state.paidSubjects && state.paidSubjects.length > 0) {
    subjectKeys = state.paidSubjects.filter(function(k) { return SUBJECTS[k]; });
  }

  subjectKeys.forEach(function(k) {
    var s=SUBJECTS[k];
    var total=s.banks.reduce(function(t,b){return t+(BANKS[b]?BANKS[b].questions.filter(function(q){return !q.type&&q.reforge;}).length:0);},0);
    if(total<3) return;
    h+='<button class="pick-btn" data-key="'+k+'">';
    h+='<h3 style="color:'+s.color+'">'+s.label+'</h3>';
    h+='<div class="sub">'+s.sub+' \u00b7 '+total+' questions available</div>';
    h+='</button>';
  });
  h+='</div>';
  app.innerHTML=h + sessionBar();
  app.querySelectorAll('.pick-btn').forEach(function(b){
    b.onclick=function(){state.subject=b.dataset.key;state.phase='bank';render();};
  });
}

// ===== BANK PICKER =====
function renderBank(){
  var subj=SUBJECTS[state.subject];
  var locked=state.classSubject&&state.classSubject===state.subject;
  var h=locked?'':'<button class="back-btn" onclick="state.phase=\'subject\';render()">\u2190 Subjects</button>';
  h+='<p class="tag" style="color:var(--bad);margin-bottom:4px">THE CRUCIBLE</p>';
  h+='<h2 style="font-size:22px;margin-bottom:6px">'+subj.label+'</h2>';
  h+='<p style="color:#8A857E;font-size:14px;margin-bottom:4px">Pick a topic bank or run the full subject mix.</p>';
  h+='<div class="bank-list">';
  // All banks option
  var allQs=[];
  subj.banks.forEach(function(bk){if(BANKS[bk])allQs=allQs.concat(BANKS[bk].questions.filter(function(q){return !q.type&&q.reforge;}));});
  h+='<button class="pick-btn" data-bank="ALL" style="border-color:'+subj.color+'30">';
  h+='<h3 style="color:'+subj.color+'">All topics mixed</h3>';
  h+='<div class="sub">'+allQs.length+' questions \u00b7 randomised</div>';
  h+='</button>';
  subj.banks.forEach(function(bk){
    if(!BANKS[bk]) return;
    var qs=BANKS[bk].questions.filter(function(q){return !q.type&&q.reforge;});
    if(qs.length<2) return;
    h+='<button class="pick-btn" data-bank="'+bk+'">';
    h+='<h3>'+BANKS[bk].label+'</h3>';
    h+='<div class="sub">'+qs.length+' questions</div>';
    h+='</button>';
  });
  h+='</div>';
  app.innerHTML=h + sessionBar();
  app.querySelectorAll('.pick-btn').forEach(function(b){
    b.onclick=function(){
      state.bank=b.dataset.bank;
      buildQuestions();
      state.phase='ready';render();
    };
  });
}

function buildQuestions(){
  var pool=[];
  if(state.bank==='ALL'){
    SUBJECTS[state.subject].banks.forEach(function(bk){
      if(BANKS[bk])pool=pool.concat(BANKS[bk].questions.filter(function(q){return !q.type&&q.reforge;}));
    });
  } else {
    pool=BANKS[state.bank].questions.filter(function(q){return !q.type&&q.reforge;});
  }
  state.questions=shuffle(pool).slice(0,QUESTIONS_PER_RUN);
  state.idx=0;state.answers=[];state.timeLeft=CRUCIBLE_TIME;
}

// ===== READY SCREEN =====
function renderReady(){
  var subj=SUBJECTS[state.subject];
  var bankName=state.bank==='ALL'?'All topics':BANKS[state.bank].label;
  var h='<button class="back-btn" onclick="state.phase=\'bank\';render()">\u2190 Back</button>';
  h+='<div class="center">';
  h+='<p class="tag" style="color:var(--bad);margin-bottom:10px">THE CRUCIBLE</p>';
  h+='<h1 style="font-size:32px;margin-bottom:10px">Ready?</h1>';
  h+='<p style="color:var(--white);font-size:17px;margin-bottom:6px">'+bankName+'</p>';
  var totalSecs = Math.round(CRUCIBLE_TIME * (1 + ((state.extraTime || 0) / 100)));
  var totalMins = Math.round(totalSecs / 60);
  var timeLabel = totalMins + ' minute' + (totalMins !== 1 ? 's' : '');
  var extraNote = state.extraTime > 0 ? ' <span style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:var(--good)">(+' + state.extraTime + '% time arrangement applied)</span>' : '';
  h+='<p style="color:#8A857E;font-size:14px;margin-bottom:32px">'+state.questions.length+' questions \u00b7 ' + timeLabel + ' \u00b7 no scaffolds \u00b7 no re-forges' + extraNote + '</p>';
  h+='<div style="display:flex;flex-direction:column;gap:10px;max-width:280px;margin:0 auto;font-size:14px;color:var(--slate);text-align:left">';
  h+='<div>\u2715 No hints if you get it wrong</div>';
  h+='<div>\u2715 No re-forge twin to soften the blow</div>';
  h+='<div>\u2713 Wrong answers go to your Anvil automatically</div>';
  h+='<div>\u2713 Timer stops for no one</div>';
  h+='</div>';
  h+='<button onclick="startCrucible()" style="margin-top:32px;padding:14px 36px;border-radius:10px;background:var(--bad);color:#fff;border:none;font-family:Sora,sans-serif;font-weight:700;font-size:17px;cursor:pointer;letter-spacing:.01em">Begin \u2192</button>';
  h+='</div>';
  app.innerHTML=h;
}

// ===== CRUCIBLE QUESTION =====
window.startCrucible=function(){
  state.phase='quiz';
  // Apply extra time if student has access arrangement
  var multiplier = 1 + ((state.extraTime || 0) / 100);
  state.timeLeft = Math.round(CRUCIBLE_TIME * multiplier);
  if(state.timer) clearInterval(state.timer);
  state.timer=setInterval(function(){
    state.timeLeft--;
    updateTimer();
    if(state.timeLeft<=0){
      clearInterval(state.timer);
      state.timer=null;
      timeUp();
    }
  },1000);
  renderQuestion();
};

function updateTimer(){
  var el=document.getElementById('timer-text');
  var ring=document.getElementById('timer-ring');
  if(!el||!ring) return;
  var mins=Math.floor(state.timeLeft/60);
  var secs=state.timeLeft%60;
  el.textContent=mins+':'+(secs<10?'0':'')+secs;
  el.className='timer-text'+(state.timeLeft<=30?' urgent':'');
  var pct=state.timeLeft/CRUCIBLE_TIME;
  var circ=2*Math.PI*52;
  ring.style.strokeDashoffset=circ*(1-pct);
  ring.style.stroke=state.timeLeft<=30?'var(--bad)':state.timeLeft<=60?'var(--hot)':'var(--ember)';
}

function timeUp(){
  // Auto-submit current question if unanswered
  var opts=document.querySelectorAll('.opt:not(.answered)');
  if(opts.length>0){
    var q=state.questions[state.idx];
    state.answers.push({q:q,selected:null,correct:false,timedOut:true});
    logAnswer(q,null,false);
  }
  // Move to results
  state.phase='results';
  render();
}

function renderQuestion(){
  var q=state.questions[state.idx];
  var keys=Object.keys(q.options);
  var pct=(state.idx/state.questions.length)*100;
  var circ=2*Math.PI*52;
  var timeRatio=state.timeLeft/CRUCIBLE_TIME;

  var h='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  h+='<div class="q-header">';
  h+='<span class="q-id">'+q.id+'</span>';
  h+='<span>'+(state.idx+1)+' / '+state.questions.length+'</span>';
  h+='</div>';

  // Timer
  h+='<div class="timer-wrap">';
  h+='<svg class="timer-svg" width="120" height="120" viewBox="0 0 120 120">';
  h+='<circle class="timer-bg" cx="60" cy="60" r="52"/>';
  h+='<circle id="timer-ring" class="timer-ring" cx="60" cy="60" r="52" stroke="var(--ember)" stroke-dasharray="'+circ+'" stroke-dashoffset="'+(circ*(1-timeRatio))+'"/>';
  h+='</svg>';
  h+='<div id="timer-text" class="timer-text">';
  var m=Math.floor(state.timeLeft/60),s=state.timeLeft%60;
  h+=m+':'+(s<10?'0':'')+s;
  h+='</div></div>';

  h+='<div class="stem">'+q.stem+'</div>';
  h+='<div class="options" id="c-opts">';
  keys.forEach(function(k){
    h+='<button class="opt" data-k="'+k+'"><span class="letter">'+k+'</span><span>'+q.options[k]+'</span></button>';
  });
  h+='</div>';
  h+='<div id="c-feedback"></div><div class="clear"></div>';
  app.innerHTML=h;

  var opts=document.querySelectorAll('#c-opts .opt');
  var answered=false;
  opts.forEach(function(o){
    o.onclick=function(){
      if(answered) return;
      answered=true;
      var k=o.dataset.k;
      var isCorrect=k===q.correct;
      state.answers.push({q:q,selected:k,correct:isCorrect,timedOut:false});
      logAnswer(q,k,isCorrect);

      opts.forEach(function(x){
        x.classList.add('answered');
        if(x.dataset.k===q.correct) x.classList.add('correct');
        else if(x===o&&!isCorrect) x.classList.add('wrong');
        else x.classList.add('dimmed');
      });

      var fb=document.getElementById('c-feedback');
      if(isCorrect){
        fb.innerHTML='<div style="margin-top:14px;padding:12px 14px;border-radius:10px;background:rgba(127,217,138,.08);border:1px solid rgba(127,217,138,.3);color:var(--good);font-weight:600;font-size:14px">\u2713 Correct.</div>';
      } else {
        fb.innerHTML='<div class="no-scaffold"><b>No scaffold here.</b> That error has been sent to your Anvil. Rework it after.</div>';
      }
      fb.innerHTML+='<button class="next-btn" id="c-next">'+(state.idx+1<state.questions.length?'Next \u2192':'Finish \u2192')+'</button><div class="clear"></div>';
      document.getElementById('c-next').onclick=function(){
        state.idx++;
        if(state.idx>=state.questions.length){
          if(state.timer){clearInterval(state.timer);state.timer=null;}
          state.phase='results';render();
        } else {
          renderQuestion();
        }
      };
    };
  });
}

function logAnswer(q,selectedKey,isCorrect){
  if(!state.studentId) return;
  supaInsert('responses',{
    student_id:state.studentId,
    class_id:state.classId,
    question_id:q.id+'-CRU',
    bank:state.bank==='ALL'?q.id.split('-')[0]+'-MIX':state.bank,
    subject:state.subject,
    selected_option:selectedKey||'TIMEOUT',
    is_correct:isCorrect,
    misconception_tag:isCorrect?null:(q.tag||null),
    reforge_attempted:false,
    reforge_correct:null
  });
}

// ===== RESULTS =====
function renderResults(){
  var correct=state.answers.filter(function(a){return a.correct;}).length;
  var total=state.answers.length;
  var pct=total>0?Math.round((correct/total)*100):0;
  var col=pct>=75?'var(--good)':pct>=50?'var(--hot)':'var(--bad)';
  var timeUsed=CRUCIBLE_TIME-state.timeLeft;
  var mins=Math.floor(timeUsed/60),secs=timeUsed%60;

  var h='<div class="results-card">';
  h+='<p class="tag" style="color:var(--bad);margin-bottom:8px">CRUCIBLE COMPLETE</p>';
  h+='<div class="big-pct" style="color:'+col+'">'+pct+'%</div>';
  h+='<div class="results-detail">'+correct+' / '+total+' correct \u00b7 '+mins+'m '+(secs<10?'0':'')+secs+'s</div>';
  h+='</div>';

  // Per-question breakdown
  var wrong=state.answers.filter(function(a){return !a.correct;});
  if(wrong.length>0){
    h+='<div style="background:var(--panel);border:1px solid rgba(255,90,90,.3);border-radius:14px;padding:20px;margin-bottom:18px">';
    h+='<p class="tag" style="color:var(--bad);margin-bottom:12px">Sent to your Anvil</p>';
    wrong.forEach(function(a){
      var tag=a.q.tag;
      if(Array.isArray(tag)) tag=tag[0];
      h+='<div class="result-row">';
      h+='<span class="result-icon" style="color:var(--bad)">\u2715</span>';
      h+='<span class="result-info">'+a.q.stem.substring(0,80)+(a.q.stem.length>80?'\u2026':'')+'</span>';
      h+='<span class="result-mc">'+(tag||'—')+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Correct summary
  var rightAnswers=state.answers.filter(function(a){return a.correct;});
  if(rightAnswers.length>0){
    h+='<div style="background:var(--panel);border:1px solid rgba(127,217,138,.2);border-radius:14px;padding:20px;margin-bottom:18px">';
    h+='<p class="tag" style="color:var(--good);margin-bottom:12px">Got these right</p>';
    rightAnswers.forEach(function(a){
      h+='<div class="result-row">';
      h+='<span class="result-icon" style="color:var(--good)">\u2713</span>';
      h+='<span class="result-info">'+a.q.stem.substring(0,80)+(a.q.stem.length>80?'\u2026':'')+'</span>';
      h+='<span class="result-mc correct">'+a.q.id+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }

  h+='<div class="results-btns">';
  h+='<button class="btn-danger" onclick="buildQuestions();state.phase=\'ready\';render()">Run it again</button>';
  h+='<button class="btn-ghost" onclick="state.phase=\'bank\';render()">Change bank</button>';
  h+='<button class="btn-ghost" onclick="state.phase=state.classSubject?\'bank\':\'subject\';render()">Change subject</button>';
  h+='</div>';
  h+='<div class="center" style="margin-top:16px">';
  h+='<a href="anvil.html" style="font-size:13px;color:var(--ember);font-family:JetBrains Mono,monospace;text-decoration:none">Rework your Anvil \u2192</a>';
  h+='</div>';
  app.innerHTML=h;
}

function render(){
  if(state.phase==='join') renderJoin();
  else if(state.phase==='subject') renderSubject();
  else if(state.phase==='bank') renderBank();
  else if(state.phase==='ready') renderReady();
  else if(state.phase==='quiz') renderQuestion();
  else if(state.phase==='results') renderResults();
}

function forgeLogout(){
  try { localStorage.removeItem('forge-student'); } catch(e) {}
  try { localStorage.removeItem('forge-free-session'); } catch(e) {}
  ForgeAuth.signOut();
  location.reload();
}
function sessionBar(){
  if (!state.studentId || !state.studentName || state.studentName === 'Anonymous') return '';
  return '<div style="text-align:center;margin-top:26px;padding-top:14px;border-top:1px solid var(--line)"><span style="font-size:12px;color:#8A857E">Signed in as <b style="color:var(--slate)">' + state.studentName + '</b> \u00b7 <a href="#" onclick="forgeLogout();return false" style="color:var(--ember);text-decoration:none">Not you? Switch student</a></span></div>';
}

// ===== SHARED SESSION RESTORE =====
function restoreSession() {
  if (ForgeAuth.hasSession()) {
    ForgeAuth.getSession().then(function(result) {
      if (result && result.subscriber) {
        var sub = result.subscriber;
        state.studentName  = sub.name;
        state.paidSubjects = sub.subjects || [];
        state.classSubject = null;

        // Look up ALL class enrolments for this auth user
        var token = ForgeAuth.accessToken();
        var authUser = ForgeAuth.currentUser();
        if (!authUser) { checkLocalSessionCrucible(); return; }

        fetch(SUPABASE_URL + '/rest/v1/students?select=id,class_id,extra_time&auth_user_id=eq.' + authUser.id + '&class_id=not.is.null', {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + (token || SUPABASE_KEY) }
        }).then(function(r) { return r.json(); }).then(function(rows) {
          if (!Array.isArray(rows) || rows.length === 0) {
            // No class enrolments — use paidSubjects or show all
            state.phase = 'subject';
            render();
            return;
          }

          // Get all class IDs
          var classIds = rows.map(function(r) { return r.class_id; });

          // Fetch class details to get subjects
          fetch(SUPABASE_URL + '/rest/v1/classes?select=id,subject&id=in.(' + classIds.join(',') + ')', {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
          }).then(function(r) { return r.json(); }).then(function(classes) {
            // Build list of enrolled subjects
            var enrolledSubjects = [];
            classes.forEach(function(cls) {
              if (cls.subject && enrolledSubjects.indexOf(cls.subject) === -1) {
                enrolledSubjects.push(cls.subject);
              }
            });

            // Store enrolled subjects for subject picker
            state.paidSubjects = enrolledSubjects.length > 0 ? enrolledSubjects : sub.subjects || [];

            // Get max extra_time across all student rows
            var maxExtraTime = 0;
            rows.forEach(function(r) { if ((r.extra_time || 0) > maxExtraTime) maxExtraTime = r.extra_time || 0; });
            state.extraTime = maxExtraTime;

            // Store most recent class for fallback
            var saved = null;
            try { saved = JSON.parse(localStorage.getItem('forge-student') || 'null'); } catch(e) {}
            if (saved && saved.studentId) {
              state.studentId = saved.studentId;
              state.classId   = saved.classId || null;
            }

            if (enrolledSubjects.length === 1) {
              // Only one subject enrolled — go straight to bank
              state.subject = enrolledSubjects[0];
              state.phase   = 'bank';
            } else {
              state.phase = 'subject';
            }
            render();
          }).catch(function() { state.phase = 'subject'; render(); });
        }).catch(function() { checkLocalSessionCrucible(); });
      } else {
        checkLocalSessionCrucible();
      }
    }).catch(function() { checkLocalSessionCrucible(); });
  } else {
    checkLocalSessionCrucible();
  }
}

function checkLocalSessionCrucible() {
  // Check free session
  var freeSession = null;
  try { freeSession = JSON.parse(localStorage.getItem('forge-free-session') || 'null'); } catch(e) {}
  if (freeSession && freeSession.studentId) {
    state.studentId   = freeSession.studentId;
    state.studentName = freeSession.name;
    state.classId     = null;
    state.phase = 'subject';
    render();
    return;
  }
  // Check class session
  try {
    var savedSession = JSON.parse(localStorage.getItem('forge-student') || 'null');
    if (savedSession && savedSession.studentId) {
      state.studentId    = savedSession.studentId;
      state.classId      = savedSession.classId;
      state.studentName  = savedSession.studentName;
      state.classSubject = savedSession.classSubject || null;

      // Fetch student record for extra_time
      supaGet('students', 'id=eq.' + state.studentId + (state.classId ? '&class_id=eq.' + state.classId : '')).then(function(rows) {
        if (rows && rows[0]) state.extraTime = rows[0].extra_time || 0;

        // Look up all other classes this student may be in via their name
        // by finding all student rows with same name in classes
        supaGet('students', 'name=eq.' + encodeURIComponent(state.studentName) + '&class_id=not.is.null').then(function(allRows) {
          var classIds = (allRows || []).map(function(r) { return r.class_id; }).filter(Boolean);

          if (classIds.length <= 1) {
            // Only one class — proceed as before
            if (state.classSubject && typeof SUBJECTS !== 'undefined' && SUBJECTS[state.classSubject]) {
              state.subject = state.classSubject;
              state.phase   = 'bank';
            } else {
              state.phase = 'subject';
            }
            render();
            return;
          }

          // Multiple classes — fetch subjects
          fetch(SUPABASE_URL + '/rest/v1/classes?select=id,subject&id=in.(' + classIds.join(',') + ')', {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
          }).then(function(r) { return r.json(); }).then(function(classes) {
            var enrolledSubjects = [];
            classes.forEach(function(cls) {
              if (cls.subject && enrolledSubjects.indexOf(cls.subject) === -1) enrolledSubjects.push(cls.subject);
            });
            state.paidSubjects = enrolledSubjects;

            // Max extra_time across all student rows
            var maxET = 0;
            (allRows || []).forEach(function(r) { if ((r.extra_time||0) > maxET) maxET = r.extra_time||0; });
            if (maxET > state.extraTime) state.extraTime = maxET;

            if (enrolledSubjects.length === 1) {
              state.subject = enrolledSubjects[0];
              state.phase   = 'bank';
            } else {
              state.phase = 'subject';
            }
            render();
          }).catch(function() { state.phase = 'subject'; render(); });
        }).catch(function() {
          if (state.classSubject && typeof SUBJECTS !== 'undefined' && SUBJECTS[state.classSubject]) {
            state.subject = state.classSubject;
            state.phase   = 'bank';
          } else {
            state.phase = 'subject';
          }
          render();
        });
      }).catch(function() {
        state.phase = 'subject';
        render();
      });
      return;
    }
  } catch(e) {}
  render();
}

restoreSession();
</script>
</body>
</html>
