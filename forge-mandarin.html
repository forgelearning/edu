<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge — Mandarin Chinese B SL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --forge-black: #1a1a1f;
    --forge-dark: #222228;
    --forge-panel: #2a2a32;
    --forge-red: #e8472a;
    --forge-red-dim: rgba(232,71,42,0.15);
    --forge-gold: #c9a84c;
    --passage-bg: #f7f3eb;
    --passage-text: #1a1a1f;
    --passage-secondary: #4a4540;
    --passage-border: #e8472a;
    --text-primary: #f0ede8;
    --text-secondary: #9a9898;
    --text-muted: #5a5858;
    --border: rgba(255,255,255,0.08);
    --correct: #3db87a;
    --incorrect: #e8472a;
    --radius: 10px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--forge-black);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--forge-dark);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-text {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .subject-badge {
    background: var(--forge-red-dim);
    border: 1px solid rgba(232,71,42,0.3);
    color: var(--forge-red);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .theme-label {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* PROGRESS BAR */
  .progress-bar {
    height: 3px;
    background: var(--border);
    flex-shrink: 0;
  }

  .progress-fill {
    height: 100%;
    background: var(--forge-red);
    transition: width 0.4s ease;
  }

  /* MAIN LAYOUT */
  .reader-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 59px);
  }

  /* PASSAGE PANEL */
  .passage-panel {
    width: 42%;
    background: var(--passage-bg);
    overflow-y: auto;
    padding: 40px 36px;
    position: relative;
    flex-shrink: 0;
    border-right: 3px solid var(--passage-border);
  }

  .passage-panel::before {
    content: '文';
    position: absolute;
    top: 20px;
    right: 24px;
    font-family: 'Noto Serif SC', serif;
    font-size: 120px;
    color: rgba(232,71,42,0.06);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .passage-meta {
    margin-bottom: 24px;
  }

  .passage-type-tag {
    display: inline-block;
    background: var(--forge-red);
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 10px;
    font-family: 'Inter', sans-serif;
  }

  .passage-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--passage-text);
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .passage-subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--passage-secondary);
    letter-spacing: 0.3px;
  }

  .passage-divider {
    height: 1px;
    background: rgba(232,71,42,0.2);
    margin: 20px 0;
  }

  .passage-body {
    font-family: 'Noto Serif SC', serif;
    font-size: 17px;
    line-height: 2;
    color: var(--passage-text);
    position: relative;
    z-index: 1;
  }

  .passage-body .line-ref {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: #a09890;
    margin-right: 8px;
    user-select: none;
    display: inline-block;
    width: 20px;
    text-align: right;
  }

  .passage-highlight {
    background: rgba(232,71,42,0.15);
    border-radius: 2px;
    padding: 0 2px;
  }

  .passage-vocab {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px dashed rgba(74,69,64,0.3);
  }

  .vocab-title {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #a09890;
    margin-bottom: 12px;
  }

  .vocab-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .vocab-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 13px;
  }

  .vocab-zh {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    color: var(--passage-text);
    min-width: 60px;
  }

  .vocab-py {
    color: #a09890;
    font-size: 11px;
    font-style: italic;
    min-width: 80px;
  }

  .vocab-en {
    color: var(--passage-secondary);
  }

  /* QUESTION PANEL */
  .question-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .question-panel-header {
    margin-bottom: 28px;
  }

  .passage-ref {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .question-count-label {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--forge-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .question-card.answered-correct {
    border-color: var(--correct);
  }

  .question-card.answered-incorrect {
    border-color: var(--incorrect);
  }

  .question-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }

  .q-number {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    min-width: 20px;
    padding-top: 2px;
  }

  .question-type-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .type-tf { background: rgba(201,168,76,0.15); color: var(--forge-gold); border: 1px solid rgba(201,168,76,0.3); }
  .type-find { background: rgba(99,179,237,0.12); color: #63b3ed; border: 1px solid rgba(99,179,237,0.25); }
  .type-short { background: rgba(154,117,237,0.12); color: #b794f4; border: 1px solid rgba(154,117,237,0.25); }
  .type-format { background: rgba(232,71,42,0.12); color: var(--forge-red); border: 1px solid rgba(232,71,42,0.25); }
  .type-grammar { background: rgba(72,187,120,0.12); color: #68d391; border: 1px solid rgba(72,187,120,0.25); }

  .question-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-primary);
    flex: 1;
  }

  .question-text .zh {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
  }

  /* TRUE/FALSE */
  .tf-options {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .tf-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }

  .tf-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text-primary); }
  .tf-btn.selected { border-color: var(--forge-gold); color: var(--forge-gold); background: rgba(201,168,76,0.08); }

  .justification-area {
    margin-top: 12px;
  }

  .justification-label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .justification-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 60px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.8;
  }

  .justification-input:focus { border-color: rgba(232,71,42,0.5); }
  .justification-input::placeholder { color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 12px; }

  /* MCQ OPTIONS */
  .mcq-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .mcq-option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    text-align: left;
    width: 100%;
    font-family: 'Inter', sans-serif;
  }

  .mcq-option:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.02); }

  .mcq-option.selected { border-color: var(--forge-gold); background: rgba(201,168,76,0.06); }
  .mcq-option.correct { border-color: var(--correct); background: rgba(61,184,122,0.08); }
  .mcq-option.incorrect { border-color: var(--incorrect); background: rgba(232,71,42,0.08); }

  .option-letter {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--text-muted);
  }

  .mcq-option.selected .option-letter { color: var(--forge-gold); }
  .mcq-option.correct .option-letter { color: var(--correct); }
  .mcq-option.incorrect .option-letter { color: var(--incorrect); }

  .option-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-secondary);
    padding-top: 2px;
  }

  .option-text .zh { font-family: 'Noto Sans SC', sans-serif; font-size: 14px; }
  .mcq-option.selected .option-text { color: var(--text-primary); }

  /* SHORT ANSWER */
  .short-answer-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }

  .short-answer-input:focus { border-color: rgba(232,71,42,0.5); }
  .short-answer-input::placeholder { color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 12px; }

  /* SUBMIT BTN */
  .submit-btn {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: none;
    background: var(--forge-red);
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 14px;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.2px;
  }

  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.4; cursor: default; }

  /* FEEDBACK */
  .feedback-box {
    margin-top: 14px;
    padding: 14px;
    border-radius: 8px;
    display: none;
    animation: feedbackIn 0.25s ease;
  }

  .feedback-box.show { display: block; }

  @keyframes feedbackIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback-box.correct-fb {
    background: rgba(61,184,122,0.1);
    border: 1px solid rgba(61,184,122,0.25);
  }

  .feedback-box.incorrect-fb {
    background: rgba(232,71,42,0.08);
    border: 1px solid rgba(232,71,42,0.2);
  }

  .feedback-status {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .correct-fb .feedback-status { color: var(--correct); }
  .incorrect-fb .feedback-status { color: var(--incorrect); }

  .feedback-text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-secondary);
  }

  .feedback-text .zh {
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--text-primary);
    background: rgba(255,255,255,0.06);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 14px;
  }

  /* SCORE PANEL */
  .score-panel {
    display: none;
    background: var(--forge-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    margin-bottom: 16px;
  }

  .score-panel.show { display: block; animation: feedbackIn 0.3s ease; }

  .score-big {
    font-size: 56px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .score-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  .score-breakdown {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .score-stat {
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
  }

  .score-stat-num { font-size: 20px; font-weight: 700; color: var(--text-primary); }
  .score-stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .restart-btn {
    display: inline-block;
    padding: 10px 28px;
    border-radius: 8px;
    border: 1px solid var(--forge-red);
    background: transparent;
    color: var(--forge-red);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .restart-btn:hover { background: var(--forge-red-dim); }

  /* MOBILE */
  @media (max-width: 768px) {
    .reader-layout { flex-direction: column; height: auto; overflow: visible; }
    .passage-panel { width: 100%; height: auto; border-right: none; border-bottom: 3px solid var(--passage-border); padding: 28px 20px; }
    .passage-panel::before { font-size: 80px; }
    .question-panel { padding: 24px 16px; }
    header { padding: 0 16px; }
    .header-meta { gap: 8px; }
    .theme-label { display: none; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA/QAAAG6CAYAAACm6A1XAAAQAElEQVR4Aezda6xm13kQ4DUz9tw9sYVASEj9AxLiD78qIX4gJT9oQUgUJH4UIYEQqVQJqSAqlYZKVKIUKGla7iWUJmpKSMu9SdsIJWliN83FbpvETR1f43hS2/H9NrZnbI/d887EnTlnznfO/vZee+91eaqcmfPtb6+13vd519b47ZrvzNE/+if+1Fu+GNgD9oA9YA/YA/aAPWAP2AP2gD1gD9S1B46mr/7PzQQIECBAgAABAgQIECBAgEAJAvM29CVkKAYCBAgQIECAAAECBAgQINCgQFENfYO+UiJAgAABAgQIECBAgAABArMI1NzQzwJiUgIECBAgQIAAAQIECBAgUINA... " alt="Forge" style="height:28px;width:auto;">
    <span class="logo-text">Forge</span>
  </a>
  <div class="header-meta">
    <span class="theme-label" id="themeLabel">体验 · Experiences</span>
    <span class="subject-badge">中文 B SL</span>
  </div>
</header>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="width: 0%"></div>
</div>

<div class="reader-layout">

  <!-- PASSAGE PANEL -->
  <div class="passage-panel" id="passagePanel">
    <div class="passage-meta">
      <div class="passage-type-tag" id="passageTypeTag">博客 Blog</div>
      <div class="passage-title" id="passageTitle">我的暑假旅行</div>
      <div class="passage-subtitle" id="passageSubtitle">Theme: Experiences · Leisure Activities &amp; Travel · ~200 characters</div>
    </div>
    <div class="passage-divider"></div>
    <div class="passage-body" id="passageBody"></div>
    <div class="passage-vocab" id="passageVocab"></div>
  </div>

  <!-- QUESTION PANEL -->
  <div class="question-panel" id="questionPanel">
    <div class="question-panel-header">
      <div class="passage-ref">阅读理解 · Reading Comprehension</div>
      <div class="question-count-label" id="questionCountLabel">Questions 1–5</div>
    </div>

    <div class="score-panel" id="scorePanel">
      <div class="score-big" id="scoreBig">—</div>
      <div class="score-label">Questions answered correctly</div>
      <div class="score-breakdown" id="scoreBreakdown"></div>
      <button class="restart-btn" onclick="restart()">Try again</button>
    </div>

    <div id="questionsContainer"></div>
  </div>

</div>

<script>
// ─── PASSAGE DATA ────────────────────────────────────────────────────────────
const passage = {
  typeTag: "博客 Blog",
  title: "我的暑假旅行",
  subtitle: "Theme: Experiences · Leisure Activities & Travel · ~210 characters",
  theme: "体验 · Experiences",
  lines: [
    { n: 1,  text: "今年暑假，我和家人一起去了云南旅行。" },
    { n: 2,  text: "云南是中国西南部的一个省，那里有很多" },
    { n: 3,  text: "美丽的自然风景和丰富的少数民族文化。" },
    { n: 4,  text: "我们先去了昆明，参观了著名的石林。" },
    { n: 5,  text: "石林是一个由奇特岩石组成的自然公园，" },
    { n: 6,  text: "非常壮观，让我印象深刻。之后，我们" },
    { n: 7,  text: "乘坐飞机去了大理，欣赏了洱海的美景。" },
    { n: 8,  text: "大理的天气非常舒适，不太热也不太冷。" },
    { n: 9,  text: "当地的食物也很好吃，特别是过桥米线。" },
    { n: 10, text: "这次旅行让我了解了中国各地不同的文化，" },
    { n: 11, text: "我觉得旅行是学习文化最好的方式之一。" },
  ],
  vocab: [
    { zh: "暑假", py: "shǔjià", en: "summer holiday" },
    { zh: "少数民族", py: "shǎoshù mínzú", en: "ethnic minorities" },
    { zh: "壮观", py: "zhuàngguān", en: "spectacular, magnificent" },
    { zh: "印象深刻", py: "yìnxiàng shēnkè", en: "made a deep impression" },
    { zh: "欣赏", py: "xīnshǎng", en: "to enjoy, appreciate" },
    { zh: "过桥米线", py: "guòqiáo mǐxiàn", en: "crossing-the-bridge noodles (Yunnan dish)" },
  ]
};

// ─── QUESTION DATA ────────────────────────────────────────────────────────────
const questions = [
  {
    id: 1,
    type: "tf",
    typeBadge: "True / False + Justification",
    typeClass: "type-tf",
    text: "The writer travelled to Yunnan with friends from school.",
    tfAnswer: "false",
    justificationKeywords: ["家人"],
    justificationModel: "今年暑假，我和家人一起去了云南旅行",
    feedback: {
      correct: "正确。The statement is FALSE. The text says the writer went with 家人 (family), not school friends. Your justification must quote directly from the text — in IB exams, both the tick and the quotation must be correct to earn the mark.",
      incorrect: "The statement is FALSE. The writer went with 家人 (family members). A correct justification would quote: <span class='zh'>我和家人一起去了云南旅行</span>"
    }
  },
  {
    id: 2,
    type: "find",
    typeBadge: "Find the Word",
    typeClass: "type-find",
    text: "Find the word or phrase in lines 5–6 which means "impressive and grand in appearance".",
    lineRef: "Lines 5–6",
    answer: "壮观",
    feedback: {
      correct: "正确。壮观 (zhuàngguān) means spectacular or impressive in appearance. In IB Paper 2, 'find the word' questions require you to identify the precise character(s) within the given line range — no additional context needed.",
      incorrect: "The answer is <span class='zh'>壮观</span> (zhuàngguān), meaning spectacular or magnificent. It appears in line 5–6: 非常壮观。Note: always check the exact line reference given — the answer must come from within those lines."
    }
  },
  {
    id: 3,
    type: "mcq",
    typeBadge: "Multiple Choice",
    typeClass: "type-short",
    text: "According to the text, which of the following best describes Dali's weather?",
    options: [
      { letter: "A", text: "Hot and humid during the summer months" },
      { letter: "B", text: "Mild — neither too hot nor too cold", zh: "" },
      { letter: "C", text: "Cold with strong winds from the mountains" },
    ],
    answer: "B",
    feedback: {
      correct: "正确。The text states 大理的天气非常舒适，不太热也不太冷 — Dali's weather is very comfortable, not too hot and not too cold. In IB multiple choice, there are always three options and only one is correct according to the text.",
      incorrect: "The correct answer is B. The text says: <span class='zh'>大理的天气非常舒适，不太热也不太冷</span> — Dali's weather is very comfortable, neither too hot nor too cold. IB distractors often include information that sounds plausible but is not in the text."
    }
  },
  {
    id: 4,
    type: "format",
    typeBadge: "Text Type Identification",
    typeClass: "type-format",
    textZh: true,
    text: "你想向学校杂志投稿，分享你在国外学习语言的经历。你应该选择哪种文体？",
    subtext: "You want to submit a piece to the school magazine sharing your experience learning a language abroad. Which text type should you choose?",
    options: [
      { letter: "A", text: "正式信件 Formal letter", zh: true },
      { letter: "B", text: "文章 Article", zh: true },
      { letter: "C", text: "日记 Diary entry", zh: true },
    ],
    answer: "B",
    feedback: {
      correct: "正确。An article (文章) is the correct text type for a magazine submission shared with a general readership. A formal letter is for a specific recipient; a diary is private. In IB Paper 1, reading the situation carefully in Chinese tells you the audience and purpose — these determine the text type.",
      incorrect: "The answer is B — 文章 (Article). A magazine submission is a public-facing piece aimed at general readers, which fits the article format. A formal letter is addressed to a specific person; a diary is private. In IB Paper 1, always identify: who is the audience? what is the purpose? These determine the text type."
    }
  },
  {
    id: 5,
    type: "grammar",
    typeBadge: "Grammar in Context",
    typeClass: "type-grammar",
    text: "Which sentence correctly uses 不但…而且 to expand on the idea that Yunnan has natural scenery?",
    options: [
      { letter: "A", text: "云南不但有美丽的自然风景，而且有丰富的少数民族文化。", zh: true },
      { letter: "B", text: "云南不但有美丽的自然风景，但是它的城市也很现代。", zh: true },
      { letter: "C", text: "虽然云南有美丽的自然风景，而且有丰富的文化。", zh: true },
    ],
    answer: "A",
    feedback: {
      correct: "正确。不但…而且 means 'not only… but also' and adds a related, complementary idea. Option A correctly pairs two positive qualities. Option B incorrectly mixes 不但 with 但是 (but/however), which creates a contradiction. Option C incorrectly pairs 虽然 (although) with 而且 — these patterns don't belong together.",
      incorrect: "The answer is A. 不但…而且 means 'not only… but also' — both clauses should be positive and complementary. Option B wrongly uses 但是 (but/however) in the second clause — this creates a contradiction. Option C incorrectly combines 虽然 (although) with 而且, which are from different grammar patterns."
    }
  }
];

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  answers: {},
  submitted: {},
  tfSelections: {},
  score: 0,
  total: questions.length,
  correct: 0
};

// ─── RENDER PASSAGE ───────────────────────────────────────────────────────────
function renderPassage() {
  document.getElementById('passageTypeTag').textContent = passage.typeTag;
  document.getElementById('passageTitle').textContent = passage.title;
  document.getElementById('passageSubtitle').textContent = passage.subtitle;
  document.getElementById('themeLabel').textContent = passage.theme;

  const body = document.getElementById('passageBody');
  body.innerHTML = passage.lines.map(l =>
    `<span class="line-ref">${l.n}</span>${l.text}<br>`
  ).join('');

  const vocab = document.getElementById('passageVocab');
  vocab.innerHTML = `
    <div class="vocab-title">Key Vocabulary</div>
    <div class="vocab-list">
      ${passage.vocab.map(v => `
        <div class="vocab-item">
          <span class="vocab-zh">${v.zh}</span>
          <span class="vocab-py">${v.py}</span>
          <span class="vocab-en">${v.en}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ─── RENDER QUESTIONS ─────────────────────────────────────────────────────────
function renderQuestions() {
  document.getElementById('questionCountLabel').textContent =
    `Questions 1–${questions.length}`;

  const container = document.getElementById('questionsContainer');
  container.innerHTML = questions.map(q => renderQuestion(q)).join('');

  updateProgress();
}

function renderQuestion(q) {
  let body = '';

  if (q.type === 'tf') {
    body = `
      <div class="tf-options">
        <button class="tf-btn" onclick="selectTF(${q.id}, 'true')">✓ True</button>
        <button class="tf-btn" onclick="selectTF(${q.id}, 'false')">✗ False</button>
      </div>
      <div class="justification-area" id="justArea${q.id}" style="display:none">
        <div class="justification-label">Justify your answer — quote directly from the text (in Chinese):</div>
        <textarea class="justification-input" id="justInput${q.id}" placeholder="Copy the relevant characters from the passage above…" rows="2"></textarea>
      </div>
      <button class="submit-btn" onclick="submitTF(${q.id})" id="submitBtn${q.id}" disabled>Check answer</button>
    `;
  } else if (q.type === 'find') {
    body = `
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;">📌 ${q.lineRef}</div>
      <input class="short-answer-input" id="findInput${q.id}" placeholder="Type the character(s) here…" oninput="onShortInput(${q.id})">
      <button class="submit-btn" onclick="submitFind(${q.id})" id="submitBtn${q.id}" disabled>Check answer</button>
    `;
  } else if (q.type === 'mcq' || q.type === 'format' || q.type === 'grammar') {
    const hasZh = q.textZh;
    body = `
      ${hasZh ? `<div style="font-size:12px;color:var(--text-muted);margin-top:-8px;margin-bottom:12px;">${q.subtext}</div>` : ''}
      <div class="mcq-options" id="mcqOpts${q.id}">
        ${q.options.map(o => `
          <button class="mcq-option" onclick="selectMCQ(${q.id}, '${o.letter}')" id="opt${q.id}${o.letter}">
            <span class="option-letter">${o.letter}</span>
            <span class="option-text ${o.zh ? 'zh' : ''}">${o.text}</span>
          </button>
        `).join('')}
      </div>
      <button class="submit-btn" onclick="submitMCQ(${q.id})" id="submitBtn${q.id}" disabled>Check answer</button>
    `;
  }

  const questionDisplay = q.textZh
    ? `<span class="zh">${q.text}</span>`
    : q.text;

  return `
    <div class="question-card" id="qCard${q.id}">
      <div class="question-header">
        <span class="q-number">${q.id}.</span>
        <span class="question-type-badge ${q.typeClass}">${q.typeBadge}</span>
      </div>
      <div class="question-text" style="margin-bottom:16px;">${questionDisplay}</div>
      ${body}
      <div class="feedback-box" id="feedback${q.id}"></div>
    </div>
  `;
}

// ─── INTERACTION ──────────────────────────────────────────────────────────────
function selectTF(qid, val) {
  if (state.submitted[qid]) return;
  state.tfSelections[qid] = val;
  const btns = document.querySelectorAll(`#qCard${qid} .tf-btn`);
  btns.forEach(b => b.classList.remove('selected'));
  btns[val === 'true' ? 0 : 1].classList.add('selected');
  document.getElementById(`justArea${qid}`).style.display = 'block';
  document.getElementById(`submitBtn${qid}`).disabled = false;
}

function submitTF(qid) {
  if (state.submitted[qid]) return;
  const q = questions.find(x => x.id === qid);
  const selected = state.tfSelections[qid];
  const justText = document.getElementById(`justInput${qid}`).value.trim();
  const isCorrectTF = selected === q.tfAnswer;
  const hasKeyword = q.justificationKeywords.some(kw => justText.includes(kw));
  const isCorrect = isCorrectTF && (justText.length > 0) && hasKeyword;

  markQuestion(qid, isCorrect, q);
}

function onShortInput(qid) {
  const val = document.getElementById(`findInput${qid}`).value.trim();
  document.getElementById(`submitBtn${qid}`).disabled = val.length === 0;
}

function submitFind(qid) {
  if (state.submitted[qid]) return;
  const q = questions.find(x => x.id === qid);
  const val = document.getElementById(`findInput${qid}`).value.trim();
  const isCorrect = val === q.answer || val.includes(q.answer);
  markQuestion(qid, isCorrect, q);
}

function selectMCQ(qid, letter) {
  if (state.submitted[qid]) return;
  state.answers[qid] = letter;
  const q = questions.find(x => x.id === qid);
  q.options.forEach(o => {
    const el = document.getElementById(`opt${qid}${o.letter}`);
    el.classList.remove('selected');
  });
  document.getElementById(`opt${qid}${letter}`).classList.add('selected');
  document.getElementById(`submitBtn${qid}`).disabled = false;
}

function submitMCQ(qid) {
  if (state.submitted[qid]) return;
  const q = questions.find(x => x.id === qid);
  const selected = state.answers[qid];
  const isCorrect = selected === q.answer;

  q.options.forEach(o => {
    const el = document.getElementById(`opt${qid}${o.letter}`);
    el.classList.remove('selected');
    if (o.letter === q.answer) el.classList.add('correct');
    else if (o.letter === selected && !isCorrect) el.classList.add('incorrect');
  });

  markQuestion(qid, isCorrect, q);
}

function markQuestion(qid, isCorrect, q) {
  state.submitted[qid] = true;
  if (isCorrect) state.correct++;

  const card = document.getElementById(`qCard${qid}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-incorrect');

  const fb = document.getElementById(`feedback${qid}`);
  fb.className = `feedback-box show ${isCorrect ? 'correct-fb' : 'incorrect-fb'}`;
  fb.innerHTML = `
    <div class="feedback-status">${isCorrect ? '✓ Correct' : '✗ Review'}</div>
    <div class="feedback-text">${isCorrect ? q.feedback.correct : q.feedback.incorrect}</div>
  `;

  const btn = document.getElementById(`submitBtn${qid}`);
  if (btn) { btn.disabled = true; btn.textContent = isCorrect ? 'Correct ✓' : 'See feedback above'; }

  updateProgress();
  checkCompletion();
}

function updateProgress() {
  const done = Object.keys(state.submitted).length;
  const pct = (done / state.total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function checkCompletion() {
  const done = Object.keys(state.submitted).length;
  if (done < state.total) return;

  const panel = document.getElementById('scorePanel');
  panel.classList.add('show');
  document.getElementById('scoreBig').textContent = `${state.correct}/${state.total}`;

  const pct = Math.round((state.correct / state.total) * 100);
  const grade = pct >= 80 ? '🔥 Forged' : pct >= 60 ? '⚒️ Craftsman' : '🔨 Keep forging';

  document.getElementById('scoreBreakdown').innerHTML = `
    <div class="score-stat"><div class="score-stat-num">${state.correct}</div><div class="score-stat-label">Correct</div></div>
    <div class="score-stat"><div class="score-stat-num">${state.total - state.correct}</div><div class="score-stat-label">Review</div></div>
    <div class="score-stat"><div class="score-stat-num">${pct}%</div><div class="score-stat-label">${grade}</div></div>
  `;

  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function restart() {
  Object.assign(state, { answers: {}, submitted: {}, tfSelections: {}, correct: 0 });
  document.getElementById('scorePanel').classList.remove('show');
  document.getElementById('progressFill').style.width = '0%';
  renderQuestions();
  window.scrollTo(0, 0);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderPassage();
renderQuestions();
</script>
</body>
</html>
